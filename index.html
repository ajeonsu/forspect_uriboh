ーで話す内容よりも、ここで誰が来るか？を把握する方が3倍重要</h4>\n<div class=\"ph-img\" data-near=\"セミナーで話す内容よりも、ここで誰が来るか？を把握する方が3倍重要\"></div>\n<h3>セミナー本編フェーズ(45分版)</h3>\n<h4>このフェーズの目的</h4>\n<p>「この方の話を聞きたい」「この方に相談したい」と思っていただくことです。情報量で圧倒するのではなく、人柄と実績で信頼を築きます。</p>\n<h4>構成</h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>時間</strong></th><th><strong>パート</strong></th><th><strong>内容</strong></th></tr></thead><tbody><tr><td>0〜3分</td><td>オープニング</td><td>ご挨拶・ゴール宣言・「後半は交流会です」と予告します</td></tr><tr><td>3〜13分</td><td>自己紹介・実績</td><td>数字3つ・どん底→転機→現在のストーリーをお話しします</td></tr><tr><td>13〜23分</td><td>問題提起</td><td>業界の現状・3つの間違い・未来の痛みをお伝えします</td></tr><tr><td>23〜38分</td><td>ノウハウ提供</td><td>3本柱でさらっとお伝えします(深入りはしません)</td></tr><tr><td>38〜43分</td><td>事例紹介</td><td>お客様の変化を2〜3例ご紹介します</td></tr><tr><td>43〜45分</td><td>交流会への橋渡し</td><td>「ここからが本番です」とお伝えします</td></tr></tbody></table></div>\n<h4>各パートの詳細</h4>\n<h5>オープニング(0〜3分)</h5>\n<p>トーク要素</p>\n<ul class=\"docx-list\"><li>本日のご挨拶</li><li>本日のゴール宣言(「今日は3つのことをお持ち帰りいただきます」)</li><li>ルール説明(メモ推奨・スマホは机に伏せていただく)</li><li>約束事(「最後に大事なお知らせがありますので最後までいてください」)</li></ul>\n<h5>自己紹介・実績(3〜13分)</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_83ec511e.png\" alt=\"自己紹介・実績(3〜13分)\" loading=\"lazy\"></figure>\n<p>構成は以下の流れを厳守していただきます。</p>\n<ul class=\"docx-list\"><li>現在の実績(数字3つ:売上・顧客数・実績年数など)</li><li>過去のどん底ストーリー(共感を生む素材)</li><li>転機となった出来事</li><li>現在に至るまでのプロセス</li><li>今日伝える内容の根拠</li></ul>\n<p>ポイント</p>\n<ul class=\"docx-list\"><li>どん底→転機→現在の流れは必須です(実績だけだと反発を生んでしまいます)→特別ではなくて誰でもできる感は訴求しないと〇〇さんだから出来たと思われてしまう\n</li><li>自慢話に聞こえないよう、失敗談を3割入れます</li><li>写真・スクリーンショット・お客様の声を画面に出します</li></ul>\n<h5>問題提起(13〜23分)</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_c5204f1c.png\" alt=\"問題提起(13〜23分)\" loading=\"lazy\"></figure>\n<p>「このままだとマズい」を全員に思っていただくパートです。</p>\n<p>構成</p>\n<ul class=\"docx-list\"><li>業界の現状・トレンド(データ・統計を提示します)</li><li>多くの方が陥っている3つの間違い</li><li>間違いを続けるとどうなるか(未来の痛みを言語化します)</li><li>一方、正しくやれば何が起こるか(理想の未来を提示します)</li></ul>\n<p>ポイント</p>\n<ul class=\"docx-list\"><li>痛みパートを省略しないでください(ここが弱いと交流会で響きません)</li><li>統計・第三者データを必ず混ぜます</li></ul>\n<div class=\"ph-img\" data-near=\"問題提起(13〜23分)\"></div>\n<h5>ノウハウ提供(23〜38分)</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_605509c1.png\" alt=\"ノウハウ提供(23〜38分)\" loading=\"lazy\"></figure>\n<p>3本柱で構成します。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>柱</strong></th><th><strong>時間</strong></th><th><strong>内容例</strong></th></tr></thead><tbody><tr><td>柱1:○○の本質</td><td>5分</td><td>概念・考え方</td></tr><tr><td>柱2:○○の手順</td><td>5分</td><td>具体的な進め方</td></tr><tr><td>柱3:○○の事例</td><td>5分</td><td>受講生の成功例</td></tr></tbody></table></div>\n<p>ポイント</p>\n<ul class=\"docx-list\"><li>出し惜しみしないでください(出し惜しみは信頼を下げます)→SNSの社会で当たり前の事はみんな知ってます。\n</li><li>ただし「やり方は教えますが、再現には型が必要です」という構造でお話しします</li><li>具体的な数字で語ります(「3ヶ月で月30万」など)</li><li>こんなに情報を出してもいいのか？？とありますが、9.9割の人は情報を持って帰ってもやりません→なので商談ができます</li></ul>\n<h5>事例紹介(38〜43分)</h5>\n<p>受講生・お客様の変化を2〜3例ご紹介します。</p>\n<ul class=\"docx-list\"><li>ビフォーアフターを数字で示します</li><li>写真・スクリーンショット・実際のお声を使います</li><li>参加者と近い属性の事例を選びます</li></ul>\n<div class=\"ph-img\" data-near=\"事例紹介(38〜43分)\"></div>\n<h5>交流会への橋渡し(43〜45分)</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_ed931eb6.png\" alt=\"交流会への橋渡し(43〜45分)\" loading=\"lazy\"></figure>\n<p>ここが最重要です。次のトークを必ず入れていただきます。</p>\n<p>「ここまで45分間、ありがとうございました。</p>\n<p>実はここからが本日のメインです。30〜40分の交流会で、皆様同士、そして私と直接お話しできる時間をお取りします。</p>\n<p>セミナーで聞けなかった個別のご質問や、皆様の状況に合わせた具体的なアドバイスは、ここでお伝えします。</p>\n<p>私も皆様全員とお話ししたいので、お気軽にお声がけください」</p>\n<div class=\"ph-img\" data-near=\"交流会への橋渡し(43〜45分)\"></div>\n<p>ポイント</p>\n<ul class=\"docx-list\"><li>「メイン」と明言します(参加者の意識を切り替えます)</li><li>「個別アドバイスは交流会で」とご誘導します</li><li>講師から声をかける姿勢を見せます</li></ul>\n<h4>このセミナーで「やってはいけないこと」</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_06e64f16.png\" alt=\"このセミナーで「やってはいけないこと」\" loading=\"lazy\"></figure>\n<p>販売型セミナーとの最大の違いです。以下は厳禁とします。</p>\n<ul class=\"docx-list\"><li>オファーをしない(価格・商品紹介は禁止です)</li><li>クロージングしない(その場成約を狙いません)</li><li>ノウハウを出し切らない(「もっと聞きたい」を残します)</li></ul>\n<div class=\"ph-img\" data-near=\"このセミナーで「やってはいけないこと」\"></div>\n<h3>交流会フェーズ(30〜40分)</h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_5a234e38.png\" alt=\"交流会フェーズ(30〜40分)\" loading=\"lazy\"></figure>\n<h4>このフェーズの目的</h4>\n<p>参加者を1人ずつヒアリングし、A/B/C層に分類しながら、A層の方に対しては個別面談予約をその場で確定させることです。</p>\n<div class=\"ph-img\" data-near=\"このフェーズの目的\"></div>\n<h4>交流会の設計原則</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_464754f7.png\" alt=\"交流会の設計原則\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>講師が動き回ります(待っていてもどなたも来られません)</li><li>A/B/Cの3層に分類しながら回ります</li><li>15人なら全員と1回はお話しします(30分で15人 = 1人2分計算)</li></ul>\n<div class=\"ph-img\" data-near=\"交流会の設計原則\"></div>\n<h4>場づくりのルール</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_31bb6cd1.png\" alt=\"場づくりのルール\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>座りではなく立ちでやる</li><li>軽いドリンクのみでOKで軽食は出さない→集中が別にいく</li><li>BGMは小さめにします(会話を妨げないようにします)</li><li>ホワイトボードは安っぽいのでプロジェクター表示で公式ライン表示</li><li>自分から巻き込んで話して、他の人も繋ぐ</li></ul>\n<div class=\"ph-img\" data-near=\"場づくりのルール\"></div>\n<h4>1on1トーク・4ステップ</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_2204a45d.png\" alt=\"1on1トーク・4ステップ\" loading=\"lazy\"></figure>\n<h5>ステップ1:アイスブレイク(30秒〜1分)</h5>\n<p>入りはセミナー内容へのご感想からです。</p>\n<p>トーク例</p>\n<p>「今日はありがとうございました。セミナーの内容、○○様の状況だと特にどの部分が気になりましたか?」</p>\n<p>ポイント</p>\n<ul class=\"docx-list\"><li>お名前を呼びます(受付で覚えたお名前を使います)</li><li>セミナー内容を起点にすると自然に深い話に入れます</li></ul>\n<div class=\"ph-img\" data-near=\"ステップ1:アイスブレイク(30秒〜1分)\"></div>\n<h5>ステップ2:現状ヒアリング(1〜2分)</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_28c0bb91.png\" alt=\"ステップ2現状ヒアリング(1〜2分)\" loading=\"lazy\"></figure>\n<p>3つの質問を必ずお聞きします。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>質問</strong></th><th><strong>目的</strong></th></tr></thead><tbody><tr><td>「今、お仕事はどんな状況ですか?」</td><td>現状把握</td></tr><tr><td>「一番解決したい課題は何ですか?」</td><td>痛みの言語化</td></tr><tr><td>「それを解決できたらどうなりたいですか?」</td><td>理想の言語化</td></tr></tbody></table></div>\n<p>ポイント</p>\n<ul class=\"docx-list\"><li>質問は3つだけにします(多いと尋問になってしまいます)</li><li>相手の答えに深掘り質問を1つ入れます(「具体的には?」「いつから?」)</li><li>講師は話さず聞きます(7:3で相手が話す比率にします)</li></ul>\n<h5>ステップ3:課題の言語化と価値提示(1〜2分)</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_62aa6250.png\" alt=\"ステップ3課題の言語化と価値提示(1〜2分)\" loading=\"lazy\"></figure>\n<p>聞いた内容をその場で整理してお返しします。</p>\n<p>トーク例</p>\n<p>「なるほど、つまり○○様の場合、課題はAではなくBの方ですね。多くの方がここを勘違いされています。</p>\n<p>実はこれ、3ヶ月で解決できるんです。具体的には〜〜という流れで」</p>\n<p>ポイント</p>\n<ul class=\"docx-list\"><li>課題を講師の言葉で再定義します(「自分のことを分かってくれた」と思っていただきます)</li><li>解決の方向性は示しますが、詳細は出しません</li><li>「3ヶ月で」など期間と成果を具体的にお伝えします</li></ul>\n<div class=\"ph-img\" data-near=\"ステップ3:課題の言語化と価値提示(1〜2分)\"></div>\n<h5>ステップ4:面談誘導(30秒〜1分)</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_7df7e7e3.png\" alt=\"ステップ4面談誘導(30秒〜1分)\" loading=\"lazy\"></figure>\n<p>ここが本日のゴールです。</p>\n<p>トーク例</p>\n<p>「このお話、もう少し詳しく○○様の状況に合わせてお伝えしたいので、後日30分だけ個別でお話ししませんか?→その場で調整で\n</p>\n<p>ポイント</p>\n<ul class=\"docx-list\"><li>その場で日程を決めます(「後日連絡」は予約率が激減します)</li><li>「強引な勧誘はしない」はしないが当たり前のように日程調整する</li><li>二択でお聞きします(「どうですか?」ではなく「火曜と木曜どちらが?」)</li><li>スマホでカレンダーをその場で開きます</li></ul>\n<div class=\"ph-img\" data-near=\"ステップ4:面談誘導(30秒〜1分)\"></div>\n<h4>1人あたりの時間配分</h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>ステップ</strong></th><th><strong>時間</strong></th></tr></thead><tbody><tr><td>アイスブレイク</td><td>30秒〜1分</td></tr><tr><td>現状ヒアリング</td><td>1〜2分</td></tr><tr><td>課題の言語化</td><td>1〜2分</td></tr><tr><td>面談誘導</td><td>30秒〜1分</td></tr><tr><td>合計</td><td>4〜5分</td></tr></tbody></table></div>\n<p>5分以上お話しすると他の方とお話しできなくなります。30分で15人とお話しするには1人2分換算が必要です。</p>\n<h4>A/B/C分類の基準</h4>\n<p>交流会中に頭の中で参加者を3層に分類します。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>層</strong></th><th><strong>特徴</strong></th><th><strong>対応</strong></th></tr></thead><tbody><tr><td>A:即面談</td><td>課題明確・予算感覚あり・本気度高</td><td>その場で日程確定します</td></tr><tr><td>B:可能性あり</td><td>興味あるが迷っている</td><td>面談を勧めますが押しません・後日LINEで継続接触します</td></tr><tr><td>C:教育リスト</td><td>まだ温度低</td><td>軽くご挨拶のみで離脱します</td></tr></tbody></table></div>\n<p>判定の具体的な指針</p>\n<ul class=\"docx-list\"><li>A層:「具体的に困っている」「期限がある」「予算の話を自分から出される」</li><li>B層:「興味はある」「考えたい」「価格を聞いてこられる」</li><li>C層:「勉強したいだけ」「他の参加者目当て」「すぐ帰りたそう」→前提自社SNSからわざわざ来てるので全員と組んでいいA~Cは商談後につけてもOK\n\n</li></ul>\n<h4>講師動線の設計</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_9f9c8fd8.png\" alt=\"講師動線の設計\" loading=\"lazy\"></figure>\n<p>15人を30〜40分で回るには動き方が重要です。</p>\n<h5>推奨動線</h5>\n<ul class=\"docx-list\"><li>開始直後:受付メモを見てA層候補からお声がけします</li><li>中盤:B層とお話ししながらA層の決断状況を見極めます</li><li>終盤10分:A層でまだ予約が取れていない方を再訪問します</li><li>最後5分:全体に「ありがとうございました」とお伝えしつつ、未予約のA層をお引き止めします</li></ul>\n<div class=\"ph-img\" data-near=\"推奨動線\"></div>\n<h5>C層から離脱するトーク</h5>\n<p>C層に長く捕まると致命的です。離脱トーク例です。</p>\n<p>「すごく面白いお話ですね、後ほどもう少しお聞きしてもいいですか?他の方とも少しお話ししてきます」</p>\n<p>「後ほど」と言って実際は戻りません(C層は気にされません)。</p>\n<h4>交流会で実施するNG行動</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_2cec3942.png\" alt=\"交流会で実施するNG行動\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>講師同士・スタッフ同士で固まってお話しする</li><li>1人の参加者と15分以上お話し込む</li><li>売り込みトークを始める(あくまでヒアリングです)</li><li>スマホばかり見ている</li><li>受付メモを見ない(誰がどなたか分からなくなります)</li></ul>\n<div class=\"ph-img\" data-near=\"交流会で実施するNG行動\"></div>\n<h3>クロージング(最後2~5分)</h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_60d44c10.png\" alt=\"クロージング(最後2~5分)\" loading=\"lazy\"></figure>\n<h4>全体への締めトーク</h4>\n<p>「本日はありがとうございました。お話しできた方も、まだの方もLINEで繋がっておきましょう。</p>\n<p>個別相談ご希望の方は今日中にLINEいただければ、優先的に枠をお取りします」</p>\n<p>ポイント</p>\n<ul class=\"docx-list\"><li>LINE登録を全員に再度促します(C層からも将来の見込みが出る可能性があります)</li><li>「今日中」で締切を作ります(先延ばしを防ぎます)</li></ul>\n<div class=\"ph-img\" data-near=\"全体への締めトーク\"></div>\n<h4>退出時の対応</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_026bdac0.png\" alt=\"退出時の対応\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>出口で講師が立ち、全員に直接「ありがとうございました」とお伝えします</li><li>A層で未予約の方には「日程、一緒に決めましょう」とその場で再アプローチします</li><li>アンケート用紙をお渡しします(連絡先・満足度・購入決め手をご記入いただきます)</li></ul>\n<div class=\"ph-img\" data-near=\"退出時の対応\"></div>", "sales/07": "<h3>当日の数字目標(合格ライン)</h3>\n<h4>KPI一覧</h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>指標</strong></th><th><strong>合格ライン</strong></th><th><strong>備考</strong></th></tr></thead><tbody><tr><td>出席率</td><td>80〜90%</td><td>事前決済推奨</td></tr><tr><td>交流会全員と話せた率</td><td>100%</td><td>1人2〜3分なら可能です</td></tr><tr><td>A層判定数</td><td>参加者の30〜40%</td><td>15人なら5〜6人</td></tr><tr><td>その場面談予約率(A層)</td><td>80%以上</td><td>15人参加で4〜5人予約</td></tr><tr><td>後日LINE経由予約(B層)</td><td>30%</td><td>追加1〜2人</td></tr><tr><td>最終面談予約数</td><td>参加者の40〜50%</td><td>15人で6〜8人</td></tr><tr><td>面談実施率</td><td>80%以上</td><td>3日以内設定なら達成可能です</td></tr><tr><td>面談成約率</td><td>40〜60%</td><td>&nbsp;</td></tr><tr><td>全体成約率</td><td>20〜30%</td><td>15人で3〜5名成約</td></tr></tbody></table></div>\n<h4>現実的なシミュレーション</h4>\n<p>15名参加の場合の理想形です。</p>\n<p>参加者15名</p>\n<p>├─ A層 5名 → 面談予約 4名 → 成約 2〜3名</p>\n<p>├─ B層 6名 → 後日LINE経由予約 2名 → 成約 1名</p>\n<p>└─ C層 4名 → 将来見込みリスト化</p>\n<p>合計成約:3〜4名</p>\n<p></p>\n<p>15名参加で3〜4名成約が標準ラインです。販売型のその場成約と比べて成約率は下がりますが、売り込み臭がなく、口コミで広がりやすいのが強みです。</p>\n<p>まとめ0-3</p>\n<h3>失敗パターンと対処法</h3>\n<h4>失敗パターン1:交流会で誰も話しかけてこない</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_87a0c23b.png\" alt=\"失敗パターン1交流会で誰も話しかけてこない\" loading=\"lazy\"></figure>\n<p>原因</p>\n<ul class=\"docx-list\"><li>セミナーで売り込み臭を出してしまった</li><li>講師が真ん中に立っている</li><li>BGMが大きすぎる・場が硬い</li></ul>\n<p>対処</p>\n<ul class=\"docx-list\"><li>セミナーで売り込みを完全に排除します</li><li>講師から声をかけに行きます</li><li>立食形式・軽食をご用意して動きを作ります</li></ul>\n<div class=\"ph-img\" data-near=\"失敗パターン1:交流会で誰も話しかけてこない\"></div>\n<h4>失敗パターン2:A層が見つからない</h4>\n<p>原因</p>\n<ul class=\"docx-list\"><li>集客段階でターゲットが合っていない</li><li>セミナーで痛み提起が弱い</li></ul>\n<p>対処</p>\n<ul class=\"docx-list\"><li>SNS発信内容を見直し、悩みのある層にリーチさせます</li><li>セミナーの問題提起パートを強化します</li></ul>\n<div class=\"ph-img\" data-near=\"失敗パターン2:A層が見つからない\"></div>\n<h4>失敗パターン3:その場で日程が決まらない</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_b5cb1122.png\" alt=\"失敗パターン3その場で日程が決まらない\" loading=\"lazy\"></figure>\n<p>原因</p>\n<ul class=\"docx-list\"><li>「後日連絡します」を許してしまう</li><li>スマホでカレンダーを開かない</li></ul>\n<p>対処</p>\n<ul class=\"docx-list\"><li>二択で日程を提示します</li><li>スマホでカレンダーを開いてその場で予定を入れます</li><li>紙の予約表を持参してご記入いただきます</li></ul>\n<div class=\"ph-img\" data-near=\"失敗パターン3:その場で日程が決まらない\"></div>\n<h4>失敗パターン4:交流会の時間が足りない</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_71a43393.png\" alt=\"失敗パターン4交流会の時間が足りない\" loading=\"lazy\"></figure>\n<p>原因</p>\n<ul class=\"docx-list\"><li>セミナーが時間オーバー</li><li>C層に捕まっている</li></ul>\n<p>対処</p>\n<ul class=\"docx-list\"><li>セミナーは45分で必ず終わります</li><li>C層は2分で離脱する離脱トークを習得します</li></ul>\n<div class=\"ph-img\" data-near=\"失敗パターン4:交流会の時間が足りない\"></div>\n<h4>失敗パターン5:個別面談に来られない</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_3cd1a528.png\" alt=\"失敗パターン5個別面談に来られない\" loading=\"lazy\"></figure>\n<p>原因</p>\n<ul class=\"docx-list\"><li>面談日程が遠すぎる(1週間以上先)</li><li>リマインドが届いていない</li></ul>\n<p>対処</p>\n<ul class=\"docx-list\"><li>面談は3日以内に設定します</li><li>当日LINE・前日LINEで2回リマインドします</li></ul>\n<div class=\"ph-img\" data-near=\"失敗パターン5:個別面談に来られない\"></div>\n<h4>1. 完璧なセミナーを目指さない\n\n</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_be9d527d.png\" alt=\"1. 完璧なセミナーを目指さない\" loading=\"lazy\"></figure>\n<p>セミナーは交流会への入口です。情報量で圧倒するのではなく、人柄をお伝えする場と割り切ります。</p>\n<h4>2. 売り込まない勇気を持つ</h4>\n<p>セミナーで売り込むと交流会で警戒されてしまいます。価値提供だけに徹し、オファーは個別面談で行います。</p>\n<h4>3. 全員の成約を狙わない</h4>\n<p>15人中3〜4名成約で十分です。残りはB層として継続接触、C層は将来の見込みリスト化いたします。</p>\n<div class=\"ph-img\" data-near=\"3. 全員の成約を狙わない\"></div>\n<h3>実施前チェックリスト</h3>\n<h4>1週間前</h4>\n<ul class=\"docx-list\"><li>会場予約完了</li><li>参加者リスト確定</li><li>セミナースライド完成</li><li>配布資料準備</li><li>当日タイムスケジュール最終確認</li></ul>\n<h4>前日</h4>\n<ul class=\"docx-list\"><li>参加者全員にリマインドLINE送信</li><li>軽食・ドリンク調達</li><li>スライド・機材動作確認</li><li>受付メモ用紙印刷</li><li>アンケート用紙印刷</li></ul>\n<h4>当日(開始1時間前)</h4>\n<ul class=\"docx-list\"><li>会場入り・設営</li><li>BGM・照明セット</li><li>スライド投影テスト</li><li>ネームプレート準備</li><li>軽食セット</li><li>受付メモ確認</li></ul>\n<h4>セミナー終了後</h4>\n<ul class=\"docx-list\"><li>アンケート回収</li><li>LINE登録誘導</li><li>A層全員の面談予約確定確認</li><li>B層に当日中にお礼LINE送信</li><li>当日のKPI記録(KPIシートに入力)</li></ul>\n<div class=\"ph-img\" data-near=\"セミナー終了後\"></div>\n<h3>当日のKPI記録シート(記入項目)</h3>\n<p>セミナー後、必ず以下を記録します。次回改善のためのデータとなります。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>項目</strong></th><th><strong>記入欄</strong></th></tr></thead><tbody><tr><td>開催日</td><td>&nbsp;</td></tr><tr><td>集客数</td><td>&nbsp;</td></tr><tr><td>出席数</td><td>&nbsp;</td></tr><tr><td>出席率</td><td>&nbsp;</td></tr><tr><td>男女比・年齢層</td><td>&nbsp;</td></tr><tr><td>A層判定数</td><td>&nbsp;</td></tr><tr><td>B層判定数</td><td>&nbsp;</td></tr><tr><td>C層判定数</td><td>&nbsp;</td></tr><tr><td>その場面談予約数</td><td>&nbsp;</td></tr><tr><td>後日LINE経由予約数</td><td>&nbsp;</td></tr><tr><td>合計面談予約数</td><td>&nbsp;</td></tr><tr><td>想定成約見込み</td><td>&nbsp;</td></tr><tr><td>セミナー満足度(アンケート平均)</td><td>&nbsp;</td></tr><tr><td>良かった点</td><td>&nbsp;</td></tr><tr><td>改善点</td><td>&nbsp;</td></tr></tbody></table></div>\n<p>このデータを月次で蓄積し、3〜4回開催した時点でパターンが見えてきます。</p>\n<h3>まとめ</h3>\n<h4>最重要ポイント3つ</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_b89427ef.png\" alt=\"まとめ 最重要ポイント3つ\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li><strong>セミナーは45分で終わらせ、交流会を本番にします</strong></li><li><strong>交流会では1on1トーク4ステップ(アイスブレイク→ヒアリング→課題言語化→面談誘導)を全員に実施します</strong></li><li><strong>個別面談はその場でスマホカレンダーを開いて日程確定します</strong></li></ul>\n<p>この3つを守れば、初心者の方でも15名参加で3〜4名成約が再現できます。</p>\n<div class=\"ph-img\" data-near=\"最重要ポイント3つ\"></div>\n<p>オンライン型セミナー</p>\n<p><strong>｜オンライン型セミナー</strong></p>\n<p><strong>02｜オンライン型セミナー</strong></p>\n<p>オンライン型セミナーは、会場の手配・移動・設営といった対面特有の手間が一切不要なため、運営コストと準備時間を大幅に削減できます。結果として、短いスパンで複数回開催しやすくなり、より多くの方にリーチする機会を増やすことができます。</p>\n<p>一方で、オフラインと異なり参加者のリアクションをリアルタイムで把握しにくい点には注意が必要です。うなずきや表情の変化が見えないため、「伝わっているかどうか」の判断が難しく、一方通行になりやすいという構造的な課題があります。そのため、進行の設計においてはオフラインとは異なるアプローチが求められます。具体的には、チャット機能を活用したインタラクションの挿入、アンケートや挙手機能を使った参加者の反応確認、適切なタイミングでの問いかけなど、意図的に双方向性を生み出す工夫が必要です。</p>\n<p>加えて、オンラインセミナーはいつでも退出・再入室が可能な形式であるため、参加者の集中力や関与度を維持することが難しいという特性があります。そのため、着座（参加）前の段階でいかに十分な教育・情報提供を行っておくかが、セミナー当日の受注率を大きく左右します。事前にメールやLINEなどを通じてコンテンツを届け、「このセミナーに参加する意味・期待値」をしっかりと醸成した上で当日を迎えることが、成果を出すための鍵となります。</p>\n<div class=\"ph-img\" data-near=\"最重要ポイント3つ\"></div>", "sales/08": "<h3>当日の全体タイムスケジュール(75分版)</h3>\n<p>ウェビナーは集中力が持たないため、オフラインの90分よりも短く60~75分が標準です。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>時間</strong></th><th><strong>パート</strong></th><th><strong>内容</strong></th></tr></thead><tbody><tr><td>-10〜0分</td><td>入室・接続確認</td><td>カメラON誘導・名前確認</td></tr><tr><td>0〜5分</td><td>オープニング</td><td>挨拶・ルール・「最後に大事なお知らせがあります」</td></tr><tr><td>5〜15分</td><td>自己紹介・実績</td><td>数字3つ・どん底→転機→現在</td></tr><tr><td>15〜25分</td><td>問題提起</td><td>業界の現状・3つの間違い・痛み</td></tr><tr><td>25〜45分</td><td>ノウハウ提供</td><td>3本柱(各6〜7分)</td></tr><tr><td>45〜55分</td><td>事例紹介</td><td>お客様の変化2〜3例</td></tr><tr><td>55〜57分</td><td>ブリッジトーク</td><td>ノウハウから誘導への橋渡し</td></tr><tr><td>57〜65分</td><td>個別面談のご案内</td><td>内容・価値・予約方法</td></tr><tr><td>65〜70分</td><td>質疑応答</td><td>チャット質問への回答</td></tr><tr><td>70〜75分</td><td>クロージング</td><td>予約確認・お礼</td></tr></tbody></table></div>\n<p>オフラインとの最大の違いは、第55〜65分の「面談誘導パート」が独立した10分間のコンテンツとして存在する点です。</p>\n<h3>入室・接続確認フェーズ(-10〜0分)</h3>\n<h4>このフェーズの目的</h4>\n<p>カメラONを促し、参加者の本気度を見極めること、接続トラブルを潰すことです。</p>\n<h4>講師がやるべきこと</h4>\n<h5>入室時の対応</h5>\n<ul class=\"docx-list\"><li>開始10分前から入室可能にしておきます</li><li>カメラON・マイクの動作を確認していただきます</li><li>時間ぴったりにつけるでOK</li></ul>\n<p>ウェビナーの場合、A/B/C分類は本編後の対応優先順位を決めるために使います。本編中に呼び分けはいたしませんが、未予約のA層に対して翌日以降の個別フォローLINEを優先的に行います。</p>\n<h4>カメラONを促すトーク</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_ee2227e9.png\" alt=\"カメラONを促すトーク\" loading=\"lazy\"></figure>\n<p>「カメラがOFFの方、お顔を見せていただけますと嬉しいです。私も画面の向こうで皆様と話している実感がほしいので。難しい場合は無理にとは申しませんが、ぜひONでお願いします」</p>\n<p>ポイント</p>\n<ul class=\"docx-list\"><li>命令調にしないでください(プレッシャーで離脱されてしまいます)</li><li>「私のため」というスタンスでお願いします</li><li>それでもOFFの方は無理に強要しないでください(本気度判定材料として記録します)</li></ul>\n<div class=\"ph-img\" data-near=\"カメラONを促すトーク\"></div>\n<h4>機材・環境チェックリスト(講師側)</h4>\n<ul class=\"docx-list\"><li>PCのバッテリー残量(電源接続必須)</li><li>通信回線(有線推奨、Wi-Fiなら速度テスト済)</li><li>外付けマイクの音量</li><li>カメラの位置(目線がやや上向きになる高さ)</li><li>照明(顔の正面 or 斜め前)</li><li>背景の整理整頓</li><li>スライド共有テスト</li><li>チャット送信用URL一覧の準備</li><li>録画設定(必要に応じて)</li></ul>\n<h3>オープニング(0〜5分)</h3>\n<h4>トーク構成</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_51dcf557.png\" alt=\"トーク構成\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>本日のご挨拶</li><li>ルール説明</li><li>「カメラはぜひONでお願いします」</li><li>「気になることがあればチャットでどんどんご質問ください」</li><li>「メモを取られる方は、画面共有のスライドをご活用ください」</li><li>本日のゴール宣言</li><li>「今日は3つのことをお持ち帰りいただきます」</li><li><strong>最重要:離脱防止予告</strong></li><li>「最後に皆様に大事なお知らせがありますので、必ず最後までいてください」</li></ul>\n<div class=\"ph-img\" data-near=\"トーク構成\"></div>\n<h4>「最後にお知らせ」の予告がなぜ重要か</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_67e0faf7.png\" alt=\"「最後にお知らせ」の予告がなぜ重要か\" loading=\"lazy\"></figure>\n<p>ウェビナーは「ノウハウを聞いたら離脱」される構造です。冒頭で予告しないと、価値提供パート終了時点で半数が落ちてしまいます。</p>\n<p>予告することで「最後まで聞かないと損する」と思っていただき、面談誘導パートまで残っていただけます。</p>\n<div class=\"ph-img\" data-near=\"「最後にお知らせ」の予告がなぜ重要か\"></div>\n<h3>自己紹介・実績(5〜15分)</h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_0440cbd6.png\" alt=\"自己紹介・実績(5〜15分)\" loading=\"lazy\"></figure>\n<p>オフライン版と同じ構成ですが、画面越しの伝わりやすさを意識します。</p>\n<h4>構成</h4>\n<ul class=\"docx-list\"><li>現在の実績(数字3つ:売上・顧客数・実績年数)</li><li>過去のどん底ストーリー</li><li>転機となった出来事</li><li>現在に至るまでのプロセス</li><li>今日伝える内容の根拠</li></ul>\n<p>ポイント</p>\n<ul class=\"docx-list\"><li>どん底→転機→現在の流れは必須です(実績だけだと反発を生んでしまいます)</li><li>自慢話に聞こえないよう、失敗談を3割入れます</li><li>写真・スクリーンショット・お客様の声を画面に出します</li></ul>\n<h4>ウェビナー特有のポイント</h4>\n<ul class=\"docx-list\"><li>スライドにご自身の顔写真を必ず入れてください(画面越しの存在感補強)</li><li>実績はスクリーンショット・図解で見せてください(口頭だけだと残りません)</li><li>1〜2分に1回はチャットで反応を求めてください(「ここまで大丈夫ですか?」)</li></ul>\n<div class=\"ph-img\" data-near=\"ウェビナー特有のポイント\"></div>\n<h3>問題提起(15〜25分)</h3>\n<p>「このままだとマズい」を全員に思っていただくパートです。</p>\n<h4>構成</h4>\n<ul class=\"docx-list\"><li>業界の現状・トレンド(データ・統計を提示します)</li><li>多くの方が陥っている3つの間違い</li><li>間違いを続けるとどうなるか(未来の痛みを言語化します)</li><li>一方、正しくやれば何が起こるか(理想の未来を提示します)</li></ul>\n<h4>離脱対策の仕掛け(必ず3回入れます)</h4>\n<ul class=\"docx-list\"><li>「この3つの間違い、当てはまるものがある方、チャットで番号を入れてください」</li><li>「この事実、ご存知でしたか?知らなかった方、👍を押してください」</li><li>「ここまでで質問はありますか?チャットでお気軽にどうぞ」</li></ul>\n<h4>ポイント</h4>\n<ul class=\"docx-list\"><li>痛みパートを省略しないでください(後の面談誘導が響かなくなります)</li><li>統計・第三者データを必ず混ぜてください</li><li>参加者と同じ業種・属性の事例を使ってください</li></ul>\n<div class=\"ph-img\" data-near=\"ポイント\"></div>\n<h3>ノウハウ提供(25〜45分)</h3>\n<p>3本柱で構成します。各6〜7分です。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>柱</strong></th><th><strong>内容例</strong></th><th><strong>時間</strong></th><th><strong>巻き込み技術</strong></th></tr></thead><tbody><tr><td>柱1:○○の本質</td><td>概念・考え方</td><td>6分</td><td>投票機能で「どっち派ですか?」</td></tr><tr><td>柱2:○○の手順</td><td>具体的な進め方</td><td>7分</td><td>「メモしておいてください」</td></tr><tr><td>柱3:○○の事例</td><td>受講生の成功例</td><td>6分</td><td>チャットで感想を募る</td></tr></tbody></table></div>\n<h4>ウェビナー特有のポイント</h4>\n<ul class=\"docx-list\"><li>スライドは1枚あたり40〜60秒で切り替えてください(動かないと離脱します)</li><li>文字は最小限、図と数字で語ってください</li><li>動画素材があれば30秒程度で挟むと効果的です</li></ul>\n<h4>出し惜しみのバランス</h4>\n<p>オフライン版と違い、ウェビナーは「出し切らないと信頼が築けない」構造です。出し惜しみすると面談誘導が響きません。</p>\n<p>ただし「やり方」は教えても「型・仕組み・伴走」はバックエンド側に置きます。</p>\n<p>トーク例</p>\n<p>「ここまでお伝えしたやり方、実行できそうですか?正直、ご自身一人で全部できる方は1割もいません。残り9割の方は、伴走してくれる方が必要です。後ほど、その伴走の話をします」</p>\n<p>ここでも面談誘導の伏線を張ります。</p>\n<div class=\"ph-img\" data-near=\"出し惜しみのバランス\"></div>\n<h3>事例紹介(45〜55分)</h3>\n<p>ビフォーアフターを画面で見せます。</p>\n<h4>構成</h4>\n<ul class=\"docx-list\"><li>スクリーンショットを大きく表示</li><li>数字を強調(「3ヶ月で月10万→月80万」など)</li><li>短い動画素材があれば理想的(15〜30秒程度)</li><li>参加者と近い属性の事例を選んでください</li></ul>\n<h4>事例選定のポイント</h4>\n<p>面談誘導につなげるため、「最初は同じような状況だった」事例を選びます。</p>\n<ul class=\"docx-list\"><li>知識ゼロから始めた事例</li><li>副業から始めた事例</li><li>50代から始めた事例</li></ul>\n<p>参加者が「自分にもできる」と思える事例が必須です。</p>\n<div class=\"ph-img\" data-near=\"事例選定のポイント\"></div>\n<h3>面談誘導パート(55〜65分) </h3>\n<p>オフライン版にはない、ウェビナー版だけの独立パートです。</p>\n<h4>このパートの目的</h4>\n<p>ウェビナー終了前に、参加者の半数以上に個別面談予約を完了していただくことです。</p>\n<h4>構成</h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>時間</strong></th><th><strong>内容</strong></th></tr></thead><tbody><tr><td>55〜57分</td><td>ブリッジトーク(ノウハウから誘導への橋渡し)</td></tr><tr><td>57〜60分</td><td>個別面談のご案内(内容・価値)</td></tr><tr><td>60〜63分</td><td>予約方法のご案内・URL送信</td></tr><tr><td>63〜65分</td><td>「今ここで予約してください」と促します</td></tr></tbody></table></div>\n<h4>ステップ1:ブリッジトーク(55〜57分)</h4>\n<p>ノウハウ提供から誘導への橋渡しです。ここが下手だと売り込み臭くなります。</p>\n<p>トーク例</p>\n<p>「ここまでお話ししたノウハウ、いかがでしたか?</p>\n<p>正直、お伝えしたい内容の20%程度です。残りの80%は、皆様お一人お一人の状況に合わせてお伝えしないと意味がないので、本日はお話しできません。</p>\n<p>そこで、本日参加された皆様限定で、私が直接30分間、皆様の状況に合わせた戦略をお伝えする<strong>個別戦略相談</strong>をご用意しています」</p>\n<p>ポイント</p>\n<ul class=\"docx-list\"><li>「20%しか話していない」と明言します(残りへの興味を引きます)</li><li>「お一人お一人に合わせる必要がある」と必然性を作ります</li><li>「皆様限定」と希少性を作ります</li></ul>\n<div class=\"ph-img\" data-near=\"ステップ1:ブリッジトーク(55〜57分)\"></div>\n<h4>ステップ2:個別面談のご案内(57〜60分)</h4>\n<p>スライドで以下を提示します。</p>\n<h5>スライド構成</h5>\n<ul class=\"docx-list\"><li>個別戦略相談のご案内(タイトル)</li><li>得られる3つのこと</li><li>あなたの現状分析</li><li>3ヶ月後・6ヶ月後の目標設定</li><li>最短ルートの道筋</li><li>通常価格 vs 本日特別</li><li>通常:○万円</li><li>本日参加された方:無料</li><li>重要な約束</li><li>強引な勧誘は一切いたしません</li><li>合わないと感じたらお断りいただいて結構です</li><li>対象者</li><li>本気で○○を解決したい方のみ</li><li>冷やかしの方はご遠慮ください</li></ul>\n<div class=\"ph-img\" data-near=\"スライド構成\"></div>\n<h4>ステップ3:予約方法のご案内(60〜63分)</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_119fa465.png\" alt=\"ステップ3予約方法のご案内(60〜63分)\" loading=\"lazy\"></figure>\n<p>トーク例</p>\n<p>「予約方法をご案内します。</p>\n<p>今、チャットに予約URLをお送りします。クリックしていただくと、私のカレンダーが開きますので、ご都合の良い日時をお選びください。</p>\n<p>枠は今後3日以内で15枠ご用意しています。今日のお話を覚えているうちに、できるだけ近い日程でお会いしたいので、3日以内とさせていただいています。</p>\n<p>早い者勝ちですので、ご希望の方は今この場で予約をお取りください」</p>\n<h5>この時の操作</h5>\n<ul class=\"docx-list\"><li>チャットに予約URLを送信します</li><li>「今、チャットを見てください」と促します</li><li>「今、URLをクリックしてください」と促します</li><li>「画面共有をやめますので、ご自身で予約画面を開いてください」と切り替えます</li></ul>\n<div class=\"ph-img\" data-near=\"この時の操作\"></div>\n<h4>ステップ4:「今ここで予約してください」の促し(63〜65分)</h4>\n<p>トーク例</p>\n<p>「皆様、予約画面は開きましたか?今、画面に予約画面が出ている方、チャットで『開いた』と入れてください。</p>\n<p>開いた方は、そのまま日時をお選びください。3分間お時間を取ります。私はここで待っています。</p>\n<p>ご質問があれば、予約しながらでもチャットでお寄せください」</p>\n<p>ポイント</p>\n<ul class=\"docx-list\"><li><strong>3分間の予約タイム</strong>を取ります(これがないと予約率が激減します)</li><li>「開いた」と入力させることで行動を促します</li><li>沈黙を恐れないでください(参加者の予約時間を守ります)</li><li>講師は3分間、画面に映りながら待機します</li></ul>\n<div class=\"ph-img\" data-near=\"ステップ4:「今ここで予約してください」の促し(63〜65分)\"></div>\n<h4>ステップ5:予約完了確認(後半2分)</h4>\n<p>トーク例</p>\n<p>「ご予約いただいた方、ありがとうございます。</p>\n<p>予約完了画面が出た方は、チャットで『予約完了』とお入れいただけますか?私の方でも確認します。</p>\n<p>まだ迷っている方、後ほどご質問の時間がありますので、その時に判断いただいても構いません」</p>\n<p>ポイント</p>\n<ul class=\"docx-list\"><li>予約完了の方をチャットで把握します</li><li>迷っている方には「後で質問できる」と逃げ道を残します</li><li>ここで強引に押すと逆効果です</li></ul>\n<div class=\"ph-img\" data-near=\"ステップ5:予約完了確認(後半2分)\"></div>\n<h4>よくある反論への対処(本編内で先回り)</h4>\n<p>参加者が予約を躊躇する理由を先回りで解消します。スライドに以下を入れてください。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>不安</strong></th><th><strong>先回り回答</strong></th></tr></thead><tbody><tr><td>「強引に売り込まれそう」</td><td>強引な勧誘は一切いたしません</td></tr><tr><td>「合わなかったらどうしよう」</td><td>合わないと感じたらお断りいただいて結構です</td></tr><tr><td>「お金がかかりそう」</td><td>本日参加の方は無料です</td></tr><tr><td>「忙しくて時間がない」</td><td>30分だけです</td></tr><tr><td>「準備が必要そう」</td><td>何も準備不要、お話しするだけです</td></tr></tbody></table></div>\n<h3>質疑応答(65〜70分)</h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_b2c061cf.png\" alt=\"質疑応答(65〜70分)\" loading=\"lazy\"></figure>\n<h4>このパートの目的</h4>\n<p>予約を迷っている方の不安を解消し、追加予約を取ることです。</p>\n<h4>進め方</h4>\n<ul class=\"docx-list\"><li>「ここまでで質問はありますか?チャットでお寄せください」</li><li>チャット質問に1つずつ回答(1問1分程度)</li><li>「個別面談についてのご質問」も歓迎します</li><li>「○○様、迷われていますか?」と名前を呼んで確認するのも有効です</li></ul>\n<h4>よくある質問への準備</h4>\n<p>事前に想定問答を用意しておきます。</p>\n<ul class=\"docx-list\"><li>「個別面談ではどんなことを話すのですか?」</li><li>「強引な営業はないですか?」</li><li>「初心者でも参加できますか?」</li><li>「どんな方が対象ですか?」</li><li>「料金はかかりますか?」</li></ul>\n<h4>追加予約を促す</h4>\n<p>質疑応答中も、迷っている方に向けて「予約画面まだ開けます」と何度かアナウンスします。</p>\n<p>「ご質問にお答えしながらですが、予約画面まだ受け付けていますので、ご希望の方はぜひこの時間にお取りください」</p>\n<div class=\"ph-img\" data-near=\"追加予約を促す\"></div>\n<h3>クロージング(70〜75分)</h3>\n<h4>全体への締めトーク</h4>\n<p>「本日は最後までお付き合いいただき、ありがとうございました。</p>\n<p>ご予約いただいた方、後ほど確認メールが届きますのでご確認ください。お会いできるのを楽しみにしています。</p>\n<p>予約をお迷いの方、本日中であればチャットの予約URLは有効です。後ほどLINEでもお送りしますので、ご都合に合わせてお考えください。</p>\n<p>また、本日のアンケートをチャットでお送りしますので、ご退出前にぜひご記入ください」</p>\n<div class=\"ph-img\" data-near=\"全体への締めトーク\"></div>\n<h4>チャット送信物(クロージング時)</h4>\n<ul class=\"docx-list\"><li>予約URL(再掲)</li><li>LINE登録URL(未登録の方向け)</li><li>アンケートURL</li><li>本日の資料(必要に応じて)</li></ul>\n<h4>退出前の最後の一押し</h4>\n<p>「最後に1つだけお伝えします。</p>\n<p>今日のノウハウ、明日からご自身で実行できる方もいらっしゃると思います。ぜひ実践してください。</p>\n<p>ただ、もし『一人だと続かないかも』『もっと早く結果を出したい』とお感じの方は、ぜひ個別相談にお越しください。</p>\n<p>ありがとうございました!」</p>\n<div class=\"ph-img\" data-near=\"退出前の最後の一押し\"></div>\n<h3>セミナー直後のフォロー(必須)</h3>\n<p>ウェビナーは直後のフォローが命です。</p>\n<h4>セミナー終了10分後</h4>\n<ul class=\"docx-list\"><li>予約完了者全員に個別LINEでお礼+面談日確認</li><li>未予約のA層(カメラON・反応高)に個別LINEで「予約URLお送りします」</li></ul>\n<h4>セミナー終了2時間後</h4>\n<ul class=\"docx-list\"><li>未予約のB層全員に個別LINEで「ご感想いかがでしたか?」+予約URL再送</li><li>アンケート未回答者にリマインド</li></ul>\n<h4>翌日</h4>\n<ul class=\"docx-list\"><li>未予約者全員に再度個別LINE</li><li>「もしご都合つけば来週○曜日も空いています」と日程提示</li></ul>\n<h4>3日後</h4>\n<ul class=\"docx-list\"><li>最終リマインド</li><li>「個別相談、検討していただけましたか?」</li></ul>\n<div class=\"ph-img\" data-near=\"3日後\"></div>", "sales/09": "<h3>当日の数字目標(合格ライン)</h3>\n<h4>KPI一覧</h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>指標</strong></th><th><strong>オフライン</strong></th><th><strong>オンライン(今回)</strong></th><th><strong>備考</strong></th></tr></thead><tbody><tr><td>出席率</td><td>80〜90%</td><td>50〜70%</td><td>オンラインは大幅低下</td></tr><tr><td>カメラON率</td><td>-</td><td>70%以上</td><td>オンライン特有指標</td></tr><tr><td>最後まで残った率</td><td>-</td><td>80%以上</td><td>「最後にお知らせ予告」次第</td></tr><tr><td>本編内予約率</td><td>-</td><td>30〜50%</td><td>ウェビナー版の核心指標</td></tr><tr><td>後日LINE経由予約</td><td>B層の30%</td><td>B層の20〜30%</td><td>同程度</td></tr><tr><td>最終面談予約数</td><td>参加者の40〜50%</td><td>参加者の40〜50%</td><td>同等を目指します</td></tr><tr><td>面談実施率</td><td>80%以上</td><td>70%以上</td><td>バックレ多発</td></tr><tr><td>面談成約率</td><td>40〜60%</td><td>40〜60%</td><td>同等</td></tr><tr><td>全体成約率</td><td>20〜30%</td><td>15〜25%</td><td>やや低下</td></tr></tbody></table></div>\n<h4>現実的なシミュレーション(申込15名)</h4>\n<p>申込数 15名</p>\n<p>出席数 10名(出席率67%)</p>\n<p>最後まで残った数 8名(80%)</p>\n<p>├─ 本編内予約 3〜4名(残った人の40〜50%)</p>\n<p>└─ 当日〜翌日のLINE経由予約 1〜2名</p>\n<p>合計面談予約 4〜6名(参加者の40〜60%)</p>\n<p>面談実施 3〜5名(実施率80%)</p>\n<p>最終成約 1〜3名(成約率40〜60%)</p>\n<p></p>\n<p>オフライン15名で3〜4名成約に対し、ウェビナー15名で1〜3名成約が標準ラインです。</p>\n<p>集客はオフラインの<strong>1.5倍</strong>を目指してください(オフライン15名 ≒ ウェビナー20〜25名集客)。</p>\n<p>まとめ1-3</p>\n<h3>ウェビナー特有の失敗パターンと対処法</h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_ce172aa1.png\" alt=\"ウェビナー特有の失敗パターンと対処法\" loading=\"lazy\"></figure>\n<h4>失敗パターン1:本編内予約がゼロ</h4>\n<p>原因</p>\n<ul class=\"docx-list\"><li>冒頭で「最後にお知らせ」を予告していない</li><li>面談誘導パートが弱い・短い</li><li>「3分間の予約タイム」を取っていない</li></ul>\n<p>対処</p>\n<ul class=\"docx-list\"><li>冒頭予告を必ず入れます</li><li>面談誘導パートに10分しっかり取ります</li><li>沈黙を恐れず3分間予約時間を確保します</li></ul>\n<div class=\"ph-img\" data-near=\"失敗パターン1:本編内予約がゼロ\"></div>\n<h4>失敗パターン2:価値提供パートで離脱される</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_95b0cfe5.png\" alt=\"失敗パターン2価値提供パートで離脱される\" loading=\"lazy\"></figure>\n<p>原因</p>\n<ul class=\"docx-list\"><li>ノウハウが抽象的で退屈</li><li>一方通行で参加者を巻き込んでいない</li><li>スライドが動かない</li></ul>\n<p>対処</p>\n<ul class=\"docx-list\"><li>5分に1回、参加者を巻き込みます(チャット・投票)</li><li>スライドは40〜60秒で切り替えます</li><li>数字・図解・スクショで視覚的に訴えます</li></ul>\n<div class=\"ph-img\" data-near=\"失敗パターン2:価値提供パートで離脱される\"></div>\n<h4>失敗パターン3:予約URLを送ったのに誰もクリックしない</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_a7978b8c.png\" alt=\"失敗パターン3予約URLを送ったのに誰もクリックしない\" loading=\"lazy\"></figure>\n<p>原因</p>\n<ul class=\"docx-list\"><li>URLを送るだけで終わっている</li><li>「今、開いてください」と促していない</li><li>予約タイム(待機時間)がない</li></ul>\n<p>対処</p>\n<ul class=\"docx-list\"><li>「今、チャットを見てください」と明示的に促します</li><li>「画面共有をやめるので、各自予約画面を開いてください」と切り替えます</li><li>3分間の予約タイムを必ず確保します</li></ul>\n<div class=\"ph-img\" data-near=\"失敗パターン3:予約URLを送ったのに誰もクリックしない\"></div>\n<h4>失敗パターン4:売り込み臭が強くなり、参加者が冷める</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_21b80eb4.png\" alt=\"失敗パターン4売り込み臭が強くなり、参加者が冷める\" loading=\"lazy\"></figure>\n<p>原因</p>\n<ul class=\"docx-list\"><li>価値提供が不十分なまま誘導に入った</li><li>「特別」「限定」を多用しすぎている</li><li>スライドが完全に販売モードになっている</li></ul>\n<p>対処</p>\n<ul class=\"docx-list\"><li>ノウハウ提供を出し惜しみしません(20〜25分しっかり取ります)</li><li>「合わなければお断りください」と逃げ道を提示します</li><li>「強引な勧誘はしない」と何度も明言します</li></ul>\n<div class=\"ph-img\" data-near=\"失敗パターン4:売り込み臭が強くなり、参加者が冷める\"></div>\n<h4>失敗パターン5:出席率が30〜40%になる</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_8396d5b0.png\" alt=\"失敗パターン5出席率が30〜40%になる\" loading=\"lazy\"></figure>\n<p>原因</p>\n<ul class=\"docx-list\"><li>申込から開催日まで時間が空きすぎ</li><li>リマインドが不足</li><li>「無料」感が強くて軽く扱われる</li></ul>\n<p>対処</p>\n<ul class=\"docx-list\"><li>申込から開催まで1週間以内にします</li><li>前日・当日朝・開始2時間前の3回リマインドを必須化します</li><li>1,000円〜3,000円の参加費で本気度を上げます</li></ul>\n<div class=\"ph-img\" data-near=\"失敗パターン5:出席率が30〜40%になる\"></div>\n<h4>1. 売り込み臭を恐れない</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_36f27ee9.png\" alt=\"1. 売り込み臭を恐れない\" loading=\"lazy\"></figure>\n<p>ウェビナー版は構造上、売り込み臭がゼロにはなりません。「売る」のではなく「個別面談を取る」と割り切ってください。</p>\n<p>価値提供を十分にした上での面談誘導は、参加者から見ても自然です。</p>\n<div class=\"ph-img\" data-near=\"1. 売り込み臭を恐れない\"></div>\n<h4>2. 「3分間の沈黙」を恐れない</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_3ddbe96e.png\" alt=\"2. 「3分間の沈黙」を恐れない\" loading=\"lazy\"></figure>\n<p>予約タイムの3分間は講師にとって永遠に感じます。しかし、ここで予約していただかないと意味がありません。沈黙を耐える勇気が必要です。</p>\n<div class=\"ph-img\" data-near=\"2. 「3分間の沈黙」を恐れない\"></div>\n<h4>3. 直後フォローを徹底する</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_ca9d793b.png\" alt=\"3. 直後フォローを徹底する\" loading=\"lazy\"></figure>\n<p>ウェビナーは予約タイムで取り切れなくても、直後LINEで予約が入ります。10分以内・2時間以内・翌日・3日後の4段階フォローを必ず実施してください。</p>\n<div class=\"ph-img\" data-near=\"3. 直後フォローを徹底する\"></div>\n<h3>配布テンプレ・ツール一覧</h3>\n<h4>当日運営に必要なテンプレ(受講生の方にご提供します)</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_c557eaba.png\" alt=\"当日運営に必要なテンプレ\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>ウェビナー入室確認シート(参加者プロフィール記録用)</li><li>75分タイムスケジュール表(ウェビナー版)</li><li>セミナースライドテンプレ(ウェビナー用・離脱対策入り)</li><li>面談誘導パート専用スライドテンプレ(本カリキュラム特有)</li><li>ブリッジトーク・スクリプト</li><li>予約タイム時のトーク・スクリプト</li><li>想定問答集(質疑応答用)</li><li>リマインドLINEテンプレ集(前日・当日朝・2時間前)</li><li>セミナー後フォローLINEテンプレ集(直後・2時間後・翌日・3日後)</li><li>A/B/C分類シート(カメラON/OFF判定軸入り)</li></ul>\n<div class=\"ph-img\" data-near=\"当日運営に必要なテンプレ(受講生の方にご提供します)\"></div>\n<h4>推奨機材・ツール</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_afaabd0b.png\" alt=\"推奨機材・ツール\" loading=\"lazy\"></figure>\n<h5>必須ツール</h5>\n<ul class=\"docx-list\"><li>Zoom Pro以上(または同等のウェビナーツール) /最悪meet</li><li>予約ツール:TimeRex /Googleカレンダー</li><li>LINE公式アカウント</li><li>アンケート:Googleフォーム</li></ul>\n<div class=\"ph-img\" data-near=\"必須ツール\"></div>\n<h3>実施前チェックリスト</h3>\n<h4>1週間前</h4>\n<ul class=\"docx-list\"><li>Zoomリンク発行</li><li>申込者全員にZoomリンク送付</li><li>スライド完成(面談誘導パート含む)</li><li>予約URL準備</li><li>アンケートフォーム準備</li></ul>\n<h4>前日</h4>\n<ul class=\"docx-list\"><li>全申込者にリマインドLINE/メール送信(1回目)</li><li>スライド・機材動作確認</li><li>接続テスト</li><li>講師用メモ準備</li><li>想定問答の最終確認</li></ul>\n<h4>当日朝</h4>\n<ul class=\"docx-list\"><li>全申込者に2回目リマインド送信</li><li>機材最終確認</li><li>部屋の照明・背景チェック</li></ul>\n<h4>開始2時間前</h4>\n<ul class=\"docx-list\"><li>3回目リマインド送信</li><li>PC再起動</li><li>バッテリー・電源確認</li><li>通信回線確認</li></ul>\n<h4>開始10分前</h4>\n<ul class=\"docx-list\"><li>Zoom入室・ホスト確認</li><li>スライド共有テスト</li><li>録画開始準備</li><li>チャット送信用URL一覧の準備</li></ul>\n<h4>セミナー終了直後(10分以内)</h4>\n<ul class=\"docx-list\"><li>録画停止・保存</li><li>予約完了者にお礼LINE</li><li>未予約A層に個別LINE</li><li>当日のKPI記録</li></ul>\n<h4>セミナー後2時間以内</h4>\n<ul class=\"docx-list\"><li>B層全員にお礼LINE+予約URL再送</li><li>アンケート未回答者にリマインド</li></ul>\n<h4>翌日</h4>\n<ul class=\"docx-list\"><li>未予約者全員に個別LINE</li><li>録画を必要に応じて配信</li></ul>\n<h4>3日後</h4>\n<ul class=\"docx-list\"><li>最終リマインド送信</li></ul>\n<h3>KPI記録シート(記入項目)</h3>\n<p>セミナー後、必ず以下を記録します。次回改善のためのデータとなります。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>項目</strong></th><th><strong>記入欄</strong></th></tr></thead><tbody><tr><td>開催日</td><td>&nbsp;</td></tr><tr><td>申込数</td><td>&nbsp;</td></tr><tr><td>出席数</td><td>&nbsp;</td></tr><tr><td>出席率</td><td>&nbsp;</td></tr><tr><td>カメラON率</td><td>&nbsp;</td></tr><tr><td>最後まで残った数・率</td><td>&nbsp;</td></tr><tr><td>本編内予約数</td><td>&nbsp;</td></tr><tr><td>直後LINE経由予約数</td><td>&nbsp;</td></tr><tr><td>翌日以降LINE経由予約数</td><td>&nbsp;</td></tr><tr><td>合計面談予約数</td><td>&nbsp;</td></tr><tr><td>面談実施数</td><td>&nbsp;</td></tr><tr><td>想定成約見込み</td><td>&nbsp;</td></tr><tr><td>平均満足度</td><td>&nbsp;</td></tr><tr><td>良かった点</td><td>&nbsp;</td></tr><tr><td>改善点</td><td>&nbsp;</td></tr><tr><td>機材トラブル有無</td><td>&nbsp;</td></tr></tbody></table></div>\n<p>このデータを月次で蓄積し、3〜4回開催した時点でパターンが見えてきます。</p>\n<h3>まとめ</h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_c7887a92.png\" alt=\"まとめ\" loading=\"lazy\"></figure>\n<h4>オフラインとの最大の違い</h4>\n<ul class=\"docx-list\"><li>交流会・1on1がないため、本編内に「面談誘導パート」を組み込みます</li><li>冒頭で「最後にお知らせ」を予告して離脱を防ぎます</li><li>本編内に10分間の独立した面談誘導パートを作ります</li><li>3分間の予約タイムを必ず確保します</li><li>直後・2時間後・翌日・3日後の4段階フォローが必須です</li></ul>\n<h4>ウェビナー版の3原則(再確認)</h4>\n<ul class=\"docx-list\"><li>本編内で価値提供と面談誘導を両立させます</li><li>冒頭の「最後にお知らせ予告」で最後まで残っていただきます</li><li>予約はチャットURL+3分間の予約タイムで本編内に取り切ります</li></ul>\n<div class=\"ph-img\" data-near=\"ウェビナー版の3原則(再確認)\"></div>", "threads/06": "<h3><strong>初速15分を取る戦略</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_9f41a534.png\" alt=\"初速15分を取る戦略\" loading=\"lazy\"></figure>\n<p>Threadsのアルゴリズムは投稿直後15分の反応を極端に重視する。初速を取るために：</p>\n<ul class=\"docx-list\"><li><strong>投稿前に固定フォロワーへの告知</strong>(ストーリーズ／LINEで「今から投稿します」)</li><li><strong>いいね・返信してくれる仲間アカウントを確保</strong>(5〜10アカウント)</li><li><strong>投稿直後15分はスマホから離れない</strong>(即レス・即いいね返しで流入を加速)</li></ul>\n<div class=\"ph-img\" data-near=\"初速15分を取る戦略\"></div>\n<p>Threads集客投稿</p>\n<p><strong>｜集客投稿（CTA投稿）の出し方</strong></p>\n<p>CTA投稿のタイミング・書き方・タイプ別テンプレート</p>\n<p><strong>CTA投稿とは</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_8e59c49b.png\" alt=\"CTA投稿とは\" loading=\"lazy\"></figure>\n<p>CTA投稿とは、フォロワーに特定の行動（DM送信など）を促す投稿です。通常投稿とは明確に分けて運用してください。</p>\n<p>最も重要な原則：CTA投稿の比率は全投稿の5%以下（月120本なら6本以下）。これを超えると「売り込みアカウント」と認識され、通常投稿の信頼まで毀損されます。実績データ上、集客PR投稿の平均IMPは通常投稿の1/3以下。CTA投稿は「使うほど信頼を消費する」ものです。</p>\n<div class=\"ph-img\" data-near=\"初速15分を取る戦略\"></div>\n<p><strong>PR投稿を「始めていい」タイミングの判断</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_9a29b0fa.png\" alt=\"PR投稿を「始めていい」タイミングの判断\" loading=\"lazy\"></figure>\n<p>CTA投稿は早く出しすぎると逆効果です。フォロワー数だけでは判断できません。「自分の投稿を毎回見てくれる方がどれくらいいるか」「反応を返してくれる層がどれくらいいるか」を数値で確認してから始めてください。</p>\n<div class=\"ph-img\" data-near=\"初速15分を取る戦略\"></div>\n<p><strong>3つの判断指標の詳細</strong></p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>指標</strong></th><th><strong>基準値</strong></th><th><strong>なぜこの指標なのか</strong></th><th><strong>確認方法</strong></th></tr></thead><tbody><tr><td>①毎投稿の平均IMP</td><td>直近10投稿の平均が1,000以上</td><td>1,000IMP未満＝毎回見てくれる方がほぼいない状態。CTA投稿を出しても届きません</td><td>各投稿のインサイト→表示回数の平均</td></tr><tr><td>②反応してくれる方の数</td><td>いいね平均20以上 or コメント平均3以上</td><td>IMPがあっても反応がない＝「見てるだけで信頼は溜まっていない」。いいね20件は「共感している」層が一定数いる証拠です</td><td>各投稿のいいね数・コメント数の平均</td></tr><tr><td>③ゴースト投稿への反応</td><td>テスト用ゴースト投稿にDM返信が3件以上</td><td>ゴースト投稿は24時間で消えるため「わざわざ反応してくれる＝あなたに関心がある」方を可視化できます。3件以上あればCTA投稿にも反応が見込めます</td><td>ゴースト投稿後24時間のDM受信箱を確認</td></tr></tbody></table></div>\n<p><strong>ゴースト投稿でCTA投稿の「事前テスト」をする方法</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_525040b3.png\" alt=\"ゴースト投稿でCTA投稿の「事前テスト」をする方法\" loading=\"lazy\"></figure>\n<p>ゴースト投稿（24時間で消える投稿）は、CTA投稿の反応を事前に測る最適なツールです。本番のCTA投稿を出す前に、ゴースト投稿で反応を見て判断してください。</p>\n<div class=\"ph-img\" data-near=\"初速15分を取る戦略\"></div>\n<p>Step 1　テスト用ゴースト投稿を出す CTA投稿と同じテーマで、「○○について知りたい方いますか？」とだけ投げます。商品名やリンクは出さないでください。</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_b388e3f2.png\" alt=\"Step 1　テスト用ゴースト投稿を出す CTA投稿と同じテーマで\" loading=\"lazy\"></figure>\n<p>【ゴースト投稿の例】</p>\n<p>最近相談で一番多いのが 「スレッズ毎日投稿してるのに 全然フォロワー増えない」という悩みです</p>\n<p>これ、原因と対策まとめようと 思っているのですが知りたい方はいますか？</p>\n<p>→ DM返信が3件以上来たらテーマ確定。来なければ切り口を変えてもう一度</p>\n<p>Step 2　24時間でDM返信を数える ゴースト投稿への返信はDMとして届きます。3件以上のDM返信があれば「関心あり」の層がいます。</p>\n<p>Step 3　反応が足りなければ角度を変える テーマか切り口を変えてもう一度ゴースト投稿をしてください。反応があった切り口で本番のCTA投稿を作ります。</p>\n<p>Step 4　本番のCTA投稿を公開 ゴースト投稿で反応があったテーマ・文面をベースに、通常投稿としてCTA投稿を出してください。</p>\n<p>ゴースト投稿テストの良い点：24時間で消えるため、もし反応がゼロでもアカウントの信頼に一切影響がありません。CTA投稿は一度出すと残り続けるので、テスト→本番の2段階を踏むのが安全です。</p>\n<div class=\"ph-img\" data-near=\"初速15分を取る戦略\"></div>\n<p><strong>CTA投稿のタイミング設計（日々の運用）</strong></p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>タイミング</strong></th><th><strong>理由</strong></th><th><strong>判断基準</strong></th></tr></thead><tbody><tr><td>バズ投稿の48時間以内</td><td>バズ直後はプロフ閲覧数が急増します</td><td>IMP 5万超の投稿が出た翌日</td></tr><tr><td>週に最大1回</td><td>頻度が高いとセールス感が出ます</td><td>月曜〜日曜で1回まで</td></tr><tr><td>月に最大4回</td><td>CTA投稿は信頼を消費します</td><td>月2〜3回が理想、4回が絶対上限</td></tr></tbody></table></div>\n<p><strong>CTA投稿を出してはいけないタイミング</strong></p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>タイミング</strong></th><th><strong>理由</strong></th></tr></thead><tbody><tr><td>フォロワー500人未満</td><td>信頼貯金がゼロ。CTAは空振りし、信頼も毀損されます</td></tr><tr><td>直近1週間に投稿を休んでいた後</td><td>「久しぶりに来たと思ったら売り込み」に見えます</td></tr><tr><td>前回のCTA投稿から3日以内</td><td>連続CTAは最も嫌われるパターンです</td></tr></tbody></table></div>\n<p><strong>CTA投稿の4タイプ</strong></p>\n<h5>Step 1　コメント誘導型（DM向け）</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_11a3e66b.png\" alt=\"CTA投稿の4タイプ Step 1\" loading=\"lazy\"></figure>\n<p>「○○とコメントしてね」→コメントした方にDM。CVR最高。</p>\n<p>スレッズ始めて半年、 フォロワー0から相談月3件来るようになりました</p>\n<p>やったこと全部まとめました</p>\n<ul class=\"docx-list\"><li>プロフの構成（ビフォーアフター実物） ・最初の1ヶ月の投稿スケジュール ・反応取れた投稿と取れなかった投稿の違い</li></ul>\n<p>PDF22ページあります しかも無料です</p>\n<p>欲しい方はコメントで「導線」って書いてください DMで送ります。</p>\n<div class=\"ph-img\" data-near=\"初速15分を取る戦略\"></div>\n<h5>Step 2　プロフィール誘導型</h5>\n<p>プロフィールのリンクに誘導。固定投稿にも適しています。</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_f86c691b.png\" alt=\"Step 2　プロフィール誘導型\" loading=\"lazy\"></figure>\n<p>半年前、集客ゼロでした。</p>\n<p>変わったきっかけは 「投稿の数を増やす」のをやめて 「導線を1本作る」に集中したことです</p>\n<p>投稿→コメント→DM→面談</p>\n<p>この流れを作っただけで 月5件の相談が来るようになりました</p>\n<p>やり方はプロフにまとめてあります 必要な方だけどうぞ。</p>\n<div class=\"ph-img\" data-near=\"初速15分を取る戦略\"></div>\n<h5>Step 3　限定性・緊急性型（ローンチ時限定）</h5>\n<p>募集開始・締切前に使う型。頻度を必ず守ってください。</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_44065384.png\" alt=\"Step 3　限定性・緊急性型\" loading=\"lazy\"></figure>\n<p>1本目：募集開始日 → 2本目：締切5日前 → 3本目：前日 → 4本目：当日</p>\n<p>来週ちょっとやります</p>\n<p>うちのお客様で 固定費だけで月4万浮かせた方がいるのですが その方に「実際なにをやったか」全部聞く 30分のインスタライブをやります</p>\n<p>しかも無料です</p>\n<p>4/19（土）21時から スケジュール空けておいてください</p>\n<p>詳細はプロフに載せます。</p>\n<div class=\"ph-img\" data-near=\"初速15分を取る戦略\"></div>\n<h5>Step 4　DM直接誘導型</h5>\n<p>「DMに○○と送ってね」形式。</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_b688130b.png\" alt=\"Step 4　DM直接誘導型\" loading=\"lazy\"></figure>\n<p>家計の固定費、ちゃんと見直したことはありますか？</p>\n<p>去年やったのですが 保険2つ解約、サブスク7個止めて 通信費も乗り換えただけで月3万浮きました</p>\n<p>気になる方はDMに「家計」と送ってください 詳細をお送りします。</p>\n<div class=\"ph-img\" data-near=\"初速15分を取る戦略\"></div>\n<p><strong>CTA投稿で絶対やってはいけない書き方</strong></p>\n<p>NG例</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_5b0d52b6.png\" alt=\"CTA投稿で絶対やってはいけない書き方 NG例\" loading=\"lazy\"></figure>\n<p>今だけ無料！！ 月収100万稼ぐ方法教えます！！ 今すぐDMしてください！！！ 先着10名限定！！急いで！！</p>\n<p>→ 誇大表現・煽り・絵文字過多。スレッズの空気と完全に逆。スパム報告されてアカウントごと停止になります。</p>\n<div class=\"ph-img\" data-near=\"初速15分を取る戦略\"></div>\n<p>OK例</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_f1a29fda.png\" alt=\"CTA投稿で絶対やってはいけない書き方 OK例\" loading=\"lazy\"></figure>\n<p>副業始めて3ヶ月。 やっと月5万の収入ができました</p>\n<p>最初にやったことをまとめましたので 気になる方はコメントで「副業」って 書いてください。DMで送ります。</p>\n<p>→ 等身大の実績・押しつけない・1単語コメント誘導。スレッズの空気に合っています。</p>\n<div class=\"ph-img\" data-near=\"初速15分を取る戦略\"></div>\n<p><strong>クイズ型CTA投稿（コメント誘導の応用）</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_850ab0f0.png\" alt=\"クイズ型CTA投稿（コメント誘導の応用）\" loading=\"lazy\"></figure>\n<p>クイズ形式にすると「回答したくなる」心理で通常のCTA投稿よりコメント率が高くなります。回答者に特典を渡す設計にすればDM導線にもつながります。</p>\n<div class=\"ph-img\" data-near=\"初速15分を取る戦略\"></div>\n<p>【クイズ型CTA投稿の例】</p>\n<p>★スレッズクイズ★</p>\n<p>実はスレッズで集客している方が 「固定投稿」に絶対入れている要素、 3つあります。</p>\n<p>さて、なんでしょう？</p>\n<p>わかった方は天才です この投稿に返信する形で回答してください</p>\n<p>全問回答してくださった方には うちで使っている固定投稿テンプレを DMで送ります</p>\n<p>ポイント：クイズ型はコメントを「強制」する装置です。回答+特典の組み合わせでDM導線にスムーズに接続できます。ただし頻度は月1回まで。やりすぎると「またクイズか」になります。</p>\n<p><strong>CTA投稿に必ず入れる要素と入れない要素</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_1fa6383e.png\" alt=\"CTA投稿に必ず入れる要素と入れない要素\" loading=\"lazy\"></figure>\n<p>必ず入れること ・実績の数字（Before→After） ・具体的な提供物の内容 ・行動指示（「○○とコメント」など）</p>\n<p>絶対に入れないこと ・価格・料金（面談の中で伝えてください） ・外部リンク直貼り（アルゴリズム抑制されます） ・「今すぐ」「急いで」の煽り（胡散臭く見えます）</p>\n<div class=\"ph-img\" data-near=\"初速15分を取る戦略\"></div>", "threads/07": "<h3><strong>集客の全体像とKPI</strong></h3>\n<p><strong>集客の全体像とKPI</strong></p>\n<p>なぜ導線設計が必要なのか・3つの集客パターン・KPIの設計</p>\n<p><strong>「投稿する」と「集客できる」の違い</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_04_855d1659.png\" alt=\"「投稿する」と「集客できる」の違い\" loading=\"lazy\"></figure>\n<p>投稿ができるようになった段階で、多くの方が「投稿し続ければフォロワーが増えて、そのうち売上が立つ」とお考えになります。しかし実際にはそうなりません。</p>\n<div class=\"ph-img\" data-near=\"失敗③：有料オファーを初手で出す\"></div>\n<p>▶ なぜ投稿だけでは売上が立たないのか：ある運用事例で、心理テクニック系の投稿は平均IMP 15万7千と大きくバズしましたが、この投稿から直接DM相談に来た方はほぼゼロでした。「役に立つ投稿を見る」と「この人に相談したい」は別の心理だからです。投稿（認知）から成約（お金を払う行動）の間には「信頼構築→行動促進→ヒアリング→提案」という段階が必要で、これを設計するのが「集客導線」です。</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_04_7e5c924a.png\" alt=\"▶ なぜ投稿だけでは売上が立たないのか\" loading=\"lazy\"></figure>\n<div class=\"ph-img\" data-near=\"失敗③：有料オファーを初手で出す\"></div>\n<p><strong>Threads集客の最終ゴールは3パターン</strong></p>\n<p>最終ゴールによって、構築すべき導線が異なります。まずご自身のアカウントがどのパターンかを確定させてください。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>パターン</strong></th><th><strong>ゴール</strong></th><th><strong>主な導線</strong></th></tr></thead><tbody><tr><td>①面談・コンサル成約</td><td>ZoomやDMで個別相談を受注する</td><td>DM直接導線</td></tr><tr><td>②セミナー・講座集客</td><td>説明会や講座に参加してもらう</td><td>DM直接導線</td></tr><tr><td>③デジタルコンテンツ販売</td><td>PDF・動画などを販売する</td><td>DM直接導線</td></tr></tbody></table></div>\n<p><strong>KPIの設計 ― ゴールから逆算する</strong></p>\n<p>ゴールから逆算して、各段階の数値目標（KPI）を設定してください。KPIがないと「頑張っているけど結果が出ているか判断できない」状態になります。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>段階</strong></th><th><strong>KPI</strong></th><th><strong>目安（月次）</strong></th><th><strong>計測方法</strong></th></tr></thead><tbody><tr><td>認知</td><td>総IMP / 投稿本数</td><td>12万〜24万IMP / 120〜240本</td><td>各投稿のインサイト画面</td></tr><tr><td>興味</td><td>フォロワー純増数</td><td>月500人以上（成長期）</td><td>アカウント設定画面</td></tr><tr><td>検討</td><td>DM相談件数</td><td>月30件以上</td><td>DM受信箱</td></tr><tr><td>面談</td><td>DM→面談CVR</td><td>50%以上（目標70%）</td><td>面談件数÷DM件数×100</td></tr><tr><td>成約</td><td>面談→成約CVR</td><td>事業による（20〜40%が目安）</td><td>成約件数÷面談件数×100</td></tr></tbody></table></div>\n<p>▶ なぜ各段階にKPIを置くのか：「成約が少ない」という結果だけ見ても、原因がわかりません。IMPが足りないのか、フォロワーが増えていないのか、DMが来ないのか。各段階のKPIで「どこがボトルネックか」を特定でき、打ち手が明確になります。</p>\n<p><strong>逆算シミュレーション</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_04_244c52ef.png\" alt=\"逆算シミュレーション\" loading=\"lazy\"></figure>\n<p>実践上の補足：投稿テーマによってIMP差が大きい（心理テク157K vs ノウハウ3.3K）ので、バズ投稿で一気にIMP目標を達成し、ノウハウ投稿で信頼を積む組み合わせで進めてください。</p>\n<div class=\"ph-img\" data-near=\"失敗③：有料オファーを初手で出す\"></div>\n<p><strong>集客導線の基本構造</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_04_7b7d32f5.png\" alt=\"集客導線の基本構造\" loading=\"lazy\"></figure>\n<p>集客の絞り込み構造とは何か・各段階の役割・通常投稿と集客投稿の役割分担</p>\n<div class=\"ph-img\" data-near=\"失敗③：有料オファーを初手で出す\"></div>\n<p><strong>集客の絞り込み構造</strong></p>\n<p>集客の絞り込み構造とは、「大勢に知ってもらう」段階から「お金を払う方」に絞り込んでいく構造です。認知→興味→検討→成約の各段階でアクションが変わり、人数が絞られていきます。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>段階</strong></th><th><strong>ユーザーの状態</strong></th><th><strong>こちらのアクション</strong></th></tr></thead><tbody><tr><td>認知</td><td>投稿を見た</td><td>通常投稿で価値提供</td></tr><tr><td>興味</td><td>フォローした・プロフを見た</td><td>プロフ最適化・固定投稿設置</td></tr><tr><td>検討</td><td>DMを送ってきた</td><td>ヒアリング・信頼構築</td></tr><tr><td>成約</td><td>料金を払った</td><td>面談クロージング</td></tr></tbody></table></div>\n<p><strong>最も重要な設計原則 ― 通常投稿とCTA投稿の分離</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_04_b8426251.png\" alt=\"最も重要な設計原則 ― 通常投稿とCTA投稿の分離\" loading=\"lazy\"></figure>\n<p>通常投稿にCTAを入れないでください。「DMしてください」を通常投稿に入れると、「この人は結局売り込みたいんだな」と思われ、過去に積んだ信頼ごと毀損されます。通常投稿は100%価値提供。集客は専用のCTA投稿で行う。この分離が最も重要な設計原則です。</p>\n<div class=\"ph-img\" data-near=\"失敗③：有料オファーを初手で出す\"></div>\n<p><strong>「信頼の蓄積期間」という概念</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_04_99093766.png\" alt=\"「信頼の蓄積期間」という概念\" loading=\"lazy\"></figure>\n<p>集客の絞り込み構造における「興味→検討」の間には、2〜4週間の信頼蓄積期間が必要です。この期間に通常投稿で「この人の話は信用できる」と思っていただかないと、CTA投稿を出しても反応ゼロです。</p>\n<div class=\"ph-img\" data-near=\"失敗③：有料オファーを初手で出す\"></div>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>フォロワー数</strong></th><th><strong>信頼蓄積の目安</strong></th><th><strong>やっていいこと</strong></th><th><strong>やってはいけないこと</strong></th></tr></thead><tbody><tr><td>0〜500人</td><td>最低3週間は通常投稿のみ</td><td>通常投稿に専念</td><td>CTA投稿を出す</td></tr><tr><td>500〜1,000人</td><td>プロフ固定投稿を設置可能</td><td>プロフ固定＋週1のCTA</td><td>毎日のようにCTAを出す</td></tr><tr><td>1,000人〜</td><td>導線の最適化フェーズ</td><td>CTA投稿の型・頻度をテスト</td><td>CTA比率を5%超にする</td></tr></tbody></table></div>\n<p>▶ なぜフォロワー500人未満でCTAを出してはいけないのか：運用データ上、集客PR投稿の平均IMPは通常投稿の1/3以下です。フォロワーが少ない段階でCTAを出しても、表示される人数がそもそも少ない。さらに「売り込み感」で通常投稿の信頼まで毀損されるリスクがあります。500人は「一定のファン層が形成された状態」の目安です。</p>\n<div class=\"ph-img\" data-near=\"失敗③：有料オファーを初手で出す\"></div>\n<p><strong>DM直接導線の概要</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_04_36b00990.png\" alt=\"DM直接導線の概要\" loading=\"lazy\"></figure>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>項目</strong></th><th><strong>詳細</strong></th></tr></thead><tbody><tr><td>初期コスト</td><td>ゼロ</td></tr><tr><td>リスト蓄積</td><td>なし</td></tr><tr><td>自動化</td><td>不可</td></tr><tr><td>向き</td><td>面談→成約</td></tr><tr><td>おすすめ</td><td>まず最初に取り組む導線</td></tr></tbody></table></div>\n<p>迷ったらDM直接から始めてください。最もシンプルで、フィードバックが即座に得られます。DM導線でCVRデータを取ってから、他の導線に移行する方が効率的です。</p>\n<div class=\"ph-img\" data-near=\"失敗③：有料オファーを初手で出す\"></div>\n<p><strong>DM直接導線の設計</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_04_3c234a37.png\" alt=\"DM直接導線の設計\" loading=\"lazy\"></figure>\n<p>コメント誘導→DM→ヒアリング→面談→成約の具体的な設計と実施手順</p>\n<div class=\"ph-img\" data-near=\"失敗③：有料オファーを初手で出す\"></div>\n<p><strong>DM導線の全体フロー</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_04_922b6a9c.png\" alt=\"DM導線の全体フロー\" loading=\"lazy\"></figure>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>ステップ</strong></th><th><strong>アクション</strong></th><th><strong>ポイント</strong></th></tr></thead><tbody><tr><td>Step 1</td><td>CTA投稿を公開</td><td>コメント誘導キーワードを1単語に絞る</td></tr><tr><td>Step 2</td><td>コメントへDMを送る</td><td>気づいたらできるだけ早く送る</td></tr><tr><td>Step 3</td><td>ヒアリング（1〜3往復）</td><td>相手の悩みを聞くだけ。アドバイス厳禁</td></tr><tr><td>Step 4</td><td>面談提案</td><td>30分・無料・Zoom/Google Meet</td></tr><tr><td>Step 5</td><td>面談→成約</td><td>事業ごとのクロージング設計</td></tr></tbody></table></div>\n<p>▶ なぜ「いきなりDMしてね」ではなく「コメント→DM」なのか：「DMに○○と送ってね」は心理的ハードルが高いです。一方「コメントで○○と書いてね」は公開空間で参加しやすいです。コメント後にこちらからDMを送れば「返信してくれた」という受動的な体験になり、ハードルが大幅に下がります。この「コメント→DM」導線でCVR 71%を実現した事例があります。</p>\n<div class=\"ph-img\" data-near=\"失敗③：有料オファーを初手で出す\"></div>\n<h5>Step 1：CTA投稿のルール</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_04_e69b9534.png\" alt=\"Step 1：CTA投稿のルール\" loading=\"lazy\"></figure>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>要素</strong></th><th><strong>設計ルール</strong></th><th><strong>理由</strong></th></tr></thead><tbody><tr><td>頻度</td><td>週1回以下、月2〜4回</td><td>集客PR投稿のIMPは通常投稿の1/3以下。出しすぎると信頼毀損</td></tr><tr><td>タイミング</td><td>バズ投稿の48時間以内</td><td>バズ直後はプロフ閲覧数が急増し、CTA投稿の到達率が上がります</td></tr><tr><td>コメント誘導キーワード</td><td>1単語にする（「集客」「家計」など）</td><td>2単語以上だと面倒に感じてコメントされません</td></tr></tbody></table></div>\n<p>【DM導線用CTA投稿の例】</p>\n<p>スレッズ始めて半年、 フォロワー0から相談月3件来るようになりましたやったこと全部まとめました\n</p>\n<ul class=\"docx-list\"><li>プロフの構成（ビフォーアフター実物） ・最初の1ヶ月の投稿スケジュール ・反応取れた投稿と取れなかった投稿の違い</li></ul>\n<p>PDF22ページあります しかも無料です</p>\n<p>欲しい方はコメントで「導線」って書いてください DMで送ります。</p>\n<p>ポイント：「しかも無料」で心理ハードルを下げ、「PDF22ページ」で具体的な提供物のボリュームを見せています。コメントキーワードは「導線」の1単語。この構造をご自身のジャンル・実績に書き換えてご使用ください。</p>\n<div class=\"ph-img\" data-near=\"失敗③：有料オファーを初手で出す\"></div>\n<h5>Step 2：DMの送り方</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_04_ccbcdf7d.png\" alt=\"Step 2：DMの送り方\" loading=\"lazy\"></figure>\n<p>コメントしてくれた方へのDMは、気づいたらできるだけ早くお送りください。時間が空くほど反応率が落ちます。</p>\n<p>【DM 1通目のテンプレート】</p>\n<ul class=\"docx-list\"><li>○さん、コメントありがとうございます！ [アカウント名]です。</li></ul>\n<p>早速なのですが、○○さんは今[ジャンル]で 一番困っていることって何ですか？</p>\n<p>もしよかったら教えていただけますか。 お力になれることがあればお伝えしますね。</p>\n<p>DM 1通目で絶対にやってはいけないこと：1通目でサービスの説明やURLを送らないでください。「コメントありがとうございます！こちらが詳細です→URL」は最悪のパターンです。1通目は必ず「ヒアリング（相手の悩みを聞く質問）」にしてください。</p>\n<div class=\"ph-img\" data-near=\"失敗③：有料オファーを初手で出す\"></div>\n<h5>Step 3：ヒアリングの進め方</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_04_d320a341.png\" alt=\"Step 3：ヒアリングの進め方\" loading=\"lazy\"></figure>\n<p>ヒアリングは1〜3往復で完了させます。長引くと相手が疲れてフェードアウトします。</p>\n<p>ヒアリングのコツ：相手の言葉をそのまま繰り返すこと（オウム返し）が有効です。自分の意見やアドバイスはまだ出さないでください。ヒアリングの段階でアドバイスを始めると、「もう答えをもらったから面談はいいかな」と思われます。</p>\n<div class=\"ph-img\" data-near=\"失敗③：有料オファーを初手で出す\"></div>\n<h5>Step 4：面談提案のテンプレート</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_04_0529080f.png\" alt=\"Step 4：面談提案のテンプレート\" loading=\"lazy\"></figure>\n<p>【面談提案メッセージ】</p>\n<p>なるほど、[相手の具体的な悩み]で困っていらっしゃるんですね。</p>\n<p>正直、テキストだけだと伝えられる情報に限界があるので、 一度30分だけZoom（またはGoogle Meet）でお話しできませんか？</p>\n<ul class=\"docx-list\"><li>○さんの状況に合った具体的なアドバイスができると思います。 無料ですし、合わなければそれだけで大丈夫です。</li></ul>\n<p>もしよければ、都合のいい日時を2〜3個教えていただけると嬉しいです。</p>\n<div class=\"ph-img\" data-near=\"失敗③：有料オファーを初手で出す\"></div>\n<p><strong>DM導線の数値管理</strong></p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>指標</strong></th><th><strong>計算式</strong></th><th><strong>目標値</strong></th></tr></thead><tbody><tr><td>コメント→DM送信率</td><td>DM送信数÷コメント数×100</td><td>100%（全員に送る）</td></tr><tr><td>DM返信率</td><td>返信数÷DM送信数×100</td><td>50%以上</td></tr><tr><td>DM→面談CVR</td><td>面談数÷返信数×100</td><td>70%以上</td></tr><tr><td>面談→成約CVR</td><td>成約数÷面談数×100</td><td>事業による（20〜40%が目安）</td></tr></tbody></table></div>"};

function getRoute() {
  const h = (location.hash || "#/").replace(/^#/, "");
  const parts = h.split("/").filter(Boolean);
  if (parts[0] === "g" && parts[1]) {
    return { name: "detail", id: parts[1], topic: parts[2] || null };
  }
  return { name: "home" };
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

/* =====================================================
   SVG DIAGRAM HELPERS — reference-site style
   Centralised palette + builders for inline SVG figures.
   ===================================================== */
const FIG_C = {
  pink: "#e94560", red: "#c0392b",
  blue: "#3498db", indigo: "#2980b9",
  green: "#2ecc71", grass: "#27ae60",
  line: "#00b900",
  orange: "#f39c12", warn: "#e67e22",
  purple: "#9b59b6",
  brown: "#8B6914", navy: "#1a1a2e", gray: "#94a3b8"
};
function svgArrowDef(id, color) {
  return `<defs><marker id="${id}" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="${color || FIG_C.pink}"/></marker></defs>`;
}
function svgRect(x, y, w, h, color, title, sub) {
  const cx = x + w/2;
  return `
    <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8" fill="${color}"/>
    <text x="${cx}" y="${y + h/2 - 2}" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">${title}</text>
    ${sub ? `<text x="${cx}" y="${y + h/2 + 13}" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="9">${sub}</text>` : ''}`;
}
function svgPanel(x, y, w, h, color, fill, title, lines) {
  let txt = `<text x="${x + w/2}" y="${y + 26}" text-anchor="middle" fill="${color}" font-size="14" font-weight="bold">${title}</text>`;
  txt += `<line x1="${x + 30}" y1="${y + 36}" x2="${x + w - 30}" y2="${y + 36}" stroke="#ddd" stroke-width="1"/>`;
  (lines || []).forEach((ln, i) => {
    const yPos = y + 56 + i * 18;
    const c = ln.accent ? color : "#555";
    txt += `<text x="${x + w/2}" y="${yPos}" text-anchor="middle" fill="${c}" font-size="12">${ln.t}</text>`;
  });
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="12" fill="${fill}" stroke="${color}" stroke-width="2"/>${txt}`;
}
function svgBoxWrap(svg, title, caption) {
  return `
    <div class="svg-box">
      ${title ? `<div class="svg-box-title">${title}</div>` : ''}
      ${svg}
      ${caption ? `<div class="svg-box-caption">${caption}</div>` : ''}
    </div>`;
}

function figEdu7Steps() {
  const steps = [
    { n: "1", t: "目的",       s: "理想の未来",       c: FIG_C.pink },
    { n: "2", t: "問題",       s: "壁の認識",         c: FIG_C.orange },

    { n: "5", t: "再現性",     s: "自分にもできる",   c: FIG_C.green },
    { n: "6", t: "行動",       s: "迷ったら動こう",   c: FIG_C.red }
  ];
  let phones = "";
  const phoneW = 110, gap = 22;
  steps.forEach((s, i) => {
    const x = 28 + i * (phoneW + gap);
    // Phone shell + screen
    phones += `<rect x="${x}" y="22" width="${phoneW}" height="218" rx="16" fill="#0b1220"/>`;
    phones += `<rect x="${x + 7}" y="36" width="${phoneW - 14}" height="190" rx="11" fill="${s.c}"/>`;
    // Story progress bars (top)
    const segCount = 5, segW = (phoneW - 22) / segCount;
    for (let k = 0; k < segCount; k++) {
      phones += `<rect x="${x + 11 + k * segW + 1}" y="42" width="${segW - 2}" height="2" rx="1" fill="${k === 0 ? '#fff' : 'rgba(255,255,255,0.35)'}"/>`;
    }
    // Avatar + handle
    phones += `<circle cx="${x + 18}" cy="56" r="7" fill="rgba(255,255,255,0.3)"/>`;
    phones += `<text x="${x + 30}" y="59" fill="#fff" font-size="7" font-weight="bold">@your_account</text>`;
    // STEP label
    phones += `<text x="${x + phoneW/2}" y="92" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="9" font-weight="bold">STEP ${s.n}</text>`;
    // Title

    // Sub
    phones += `<text x="${x + phoneW/2}" y="148" text-anchor="middle" fill="rgba(255,255,255,0.92)" font-size="9.5">${s.s}</text>`;
    // Mock content lines

    phones += `<rect x="${x + 14}" y="174" width="${phoneW - 38}" height="3" rx="1.5" fill="rgba(255,255,255,0.25)"/>`;
    phones += `<rect x="${x + 14}" y="182" width="${phoneW - 50}" height="3" rx="1.5" fill="rgba(255,255,255,0.25)"/>`;
    // "糸" — pink dotted thread between phones
    if (i < steps.length - 1) {
      phones += `<line x1="${x + phoneW + 2}" y1="130" x2="${x + phoneW + gap - 2}" y2="130" stroke="${FIG_C.pink}" stroke-width="2.5" stroke-dasharray="2,3"/>`;
      phones += `<circle cx="${x + phoneW + gap/2}" cy="130" r="3" fill="${FIG_C.pink}"/>`;
    }
  });
  // Foundation row: STEP 7 信用
  const totalW = 28 + steps.length * (phoneW + gap) - gap + 28;
