trong></h5>\n<p>「興味ある方はDMください」「気軽にご相談ください」という抽象的なCTAは、実データでほぼ反応ゼロ。<strong>具体的な数字・限定・オファー</strong>がなければ動かない。</p>\n<h5><strong>失敗③：有料オファーを初手で出す</strong></h5>\n<p>いきなり「〇万円のコース募集」「高額サービス案内」は、信頼が積み上がっていない段階では刺さらない。<strong>まずは無料／モニター／キャンペーンで入口を作る</strong>のが鉄則。</p>", "threads/05": "<h2><strong>集客の全体像とKPI</strong></h2>\n<h3><strong>Threads集客ファネルの5階層</strong></h3>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th>[1] 閲覧数 (Threadsで投稿が届いた回数)<br/>       ↓<br/>[2] フォロワー増 (継続的に見たいと思った人)<br/>       ↓<br/>[3] プロフィール遷移 (アカウントへの関心)<br/>       ↓<br/>[4] DM／コメント応募 (具体的な問い合わせ行動)<br/>       ↓<br/>[5] 来店／成約 (実際の売上)</th></tr></thead></table></div>\n<h3><strong>各階層のCVR基準値(実データより)</strong></h3>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>転換段階</strong></th><th><strong>転換率の目安</strong></th><th><strong>診断</strong></th></tr></thead><tbody><tr><td>閲覧 → FW</td><td>0.2〜0.5%</td><td>0.1%未満は投稿内容見直し</td></tr><tr><td>FW → 応募</td><td>0.5〜2%</td><td>集客投稿の型改善余地</td></tr><tr><td>応募 → 面談・来店</td><td>30〜70%</td><td>DM対応の品質問題</td></tr><tr><td>面談・来店 → 成約</td><td>10〜50%</td><td>オファー内容・価格戦略</td></tr></tbody></table></div>\n<h3><strong>先行事例の数値実績</strong></h3>\n<p>ある先行事例(3ヶ月運用)の実数値：</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>指標</strong></th><th><strong>実績</strong></th><th><strong>計算</strong></th></tr></thead><tbody><tr><td>総投稿数</td><td>243本</td><td>—</td></tr><tr><td>総閲覧数</td><td>212万</td><td>—</td></tr><tr><td>総FW獲得</td><td>4,800人</td><td>CVR 0.22%(閲覧→FW)</td></tr><tr><td>総応募</td><td>27件</td><td>CVR 0.56%(FW→応募)</td></tr><tr><td>総成約</td><td>2件</td><td>CVR 7.4%(応募→成約)</td></tr><tr><td>最終CVR(閲覧→成約)</td><td>0.0001%</td><td>212万人→2成約</td></tr></tbody></table></div>\n<p>この数字が示す重要な事実：</p>\n<ul class=\"docx-list\"><li><strong>バズ型運用は「見られる数」と「売れる数」が極端に乖離する</strong></li><li>212万人に届いて、成約はわずか2件</li><li>「閲覧数を増やす」ことと「売上を増やす」ことは、別々の運用設計が必要</li></ul>\n<h3><strong>店舗オーナーが設定すべきKPI</strong></h3>\n<p>美容サロンでのThreads運用KPIは、閲覧数ではなく以下を主軸に設計する。</p>\n<h4><strong>月次KPI例(フォロワー1,000〜5,000のサロン)</strong></h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>指標</strong></th><th><strong>最低ライン</strong></th><th><strong>合格ライン</strong></th><th><strong>優秀</strong></th></tr></thead><tbody><tr><td>投稿本数</td><td>週3本</td><td>週5本</td><td>週7本</td></tr><tr><td>月間閲覧合計</td><td>50,000</td><td>150,000</td><td>300,000</td></tr><tr><td>閲覧中央値</td><td>500</td><td>1,500</td><td>3,000</td></tr><tr><td>月間FW増</td><td>50人</td><td>200人</td><td>500人</td></tr><tr><td>月間応募(モニター等)</td><td>1件</td><td>3件</td><td>10件</td></tr><tr><td>月間新規来店</td><td>1件</td><td>3件</td><td>5件</td></tr></tbody></table></div>\n<h3><strong>運用シート(週次記録テンプレート)</strong></h3>\n<p>毎週、以下の項目を記録し、週次で振り返る：</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>記録項目</strong></th><th><strong>例</strong></th></tr></thead><tbody><tr><td>投稿日・投稿時間・曜日</td><td>2026/5/3 土 20:15</td></tr><tr><td>テーマ</td><td>花嫁の頭皮ケア</td></tr><tr><td>文字数</td><td>28字</td></tr><tr><td>画像枚数</td><td>5枚</td></tr><tr><td>投稿層(第1／2／3層)</td><td>第1層(リーチ)</td></tr><tr><td>24h閲覧数</td><td>12,400</td></tr><tr><td>24hいいね</td><td>234</td></tr><tr><td>24h再投稿</td><td>8</td></tr><tr><td>24hコメント</td><td>5</td></tr><tr><td>24h FW増</td><td>34</td></tr><tr><td>発生した応募</td><td>0件</td></tr><tr><td>合否判定</td><td>◯(目標達成)</td></tr><tr><td>改善メモ</td><td>カギカッコを使わなかった点を次回改善</td></tr></tbody></table></div>\n<h3><strong>KPI未達時の診断フロー</strong></h3>\n<h4><strong>症状①：閲覧数が伸びない</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_05_cd3a9e3f.png\" alt=\"KPI未達時の診断フロー 症状①：閲覧数が伸びない\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>画像5枚になっているか → NOなら画像5枚化</li><li>30字以内になっているか → NOなら短縮</li><li>金曜投稿していないか → 土日に変更</li><li>カギカッコ・数字フレーズ・誰向けかの明示があるか → テンプレ見直し</li></ul>\n<div class=\"ph-img\" data-near=\"症状①：閲覧数が伸びない\"></div>\n<h4><strong>症状②：閲覧は取れるがFWが増えない</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_05_ecb9fa5c.png\" alt=\"症状②：閲覧は取れるがFWが増えない\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>プロフィール文が魅力的か → 改善</li><li>投稿テーマとプロフィールの一貫性 → 改善</li><li>「ついフォローしたくなる」固定投稿があるか → 設置</li></ul>\n<div class=\"ph-img\" data-near=\"症状②：閲覧は取れるがFWが増えない\"></div>\n<h4><strong>症状③：FWは増えるが応募が来ない</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_05_bdfdde64.png\" alt=\"症状③：FWは増えるが応募が来ない\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>集客投稿を月1〜2本出しているか → 頻度調整</li><li>モニター・無料オファーになっているか → オファー見直し</li><li>応募方法が明瞭か → CTA文言改善</li></ul>\n<div class=\"ph-img\" data-near=\"症状③：FWは増えるが応募が来ない\"></div>\n<h4><strong>症状④：応募は来るが成約しない</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_05_503da659.png\" alt=\"症状④：応募は来るが成約しない\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>DMの初動対応スピード → 24h以内返信</li><li>面談・来店への流れが明確か → フロー整備</li><li>価格・オファー内容が魅力的か → 再設計</li></ul>\n<div class=\"ph-img\" data-near=\"症状④：応募は来るが成約しない\"></div>\n<h3><strong>3ヶ月のロードマップ</strong></h3>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>期間</strong></th><th><strong>主目標</strong></th><th><strong>やること</strong></th></tr></thead><tbody><tr><td>1ヶ月目</td><td>勝ちテンプレ発見</td><td>画像5枚×30字テンプレを週5本投下・反応のあったテーマを特定</td></tr><tr><td>2ヶ月目</td><td>勝ちテンプレ量産</td><td>1ヶ月目で特定したテーマ＋画像5枚テンプレを週5本・閲覧中央値を1,500超に</td></tr><tr><td>3ヶ月目</td><td>集客投稿の実装</td><td>モニター募集など第3層投稿を月1〜2本投下・月3件以上の応募獲得</td></tr></tbody></table></div>\n<h3><strong>継続の覚悟</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_05_dd5d49b9.png\" alt=\"継続の覚悟\" loading=\"lazy\"></figure>\n<p>運用3ヶ月目以降、<strong>テーマ転換で失速する事例が圧倒的に多い</strong>のがThreadsの特徴。バズが出るテーマが見つかったら、安易に別テーマに変えない。</p>\n<ul class=\"docx-list\"><li>バズテーマは<strong>軸として維持</strong>する</li><li>集客テーマは<strong>バズテーマに混ぜ込む形</strong>で追加する</li><li>完全に別テーマに乗り換えると、過去の蓄積が全て無駄になる</li></ul>\n<div class=\"ph-img\" data-near=\"継続の覚悟\"></div>\n<h2><strong>全セクションを貫く運用指針</strong></h2>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>Threads運用の核心メッセージ</strong><br/>Threadsで勝つ公式は、「画像5枚 × 30字以内 × カギカッコ ＋ 数字フレーズ × 土曜投稿」。<br/>この条件を満たす投稿が全FW増の80%以上を生む。全投稿をこの型にハメる必要はないが、月に4〜8本はこのテンプレで投下することがリーチの土台になる。<br/>集客投稿は、バズ用とは別物として設計。「モニター募集 × 限定人数 × 実績数字 × 応募方法明記」の1本に月1〜2回賭ける。数を打つほど反応が落ちる構造。<br/>投稿と投稿の役割分担(リーチ／信頼／集客)を徹底し、1投稿1役を貫くことで、3ヶ月後に中央値・フォロワー・応募が全て上がる。</th></tr></thead></table></div>", "sales/01": "<h3>はじめに：このカリキュラムの位置づけ</h3>\n<p>本カリキュラムは、自社(自身)SNSで獲得したオーガニックリストを、オフラインセミナー＋交流会の場で個別面談に繋げ、最終的に成約まで持っていくためのhowtoです。</p>\n<h4>対象となる導線</h4>\n<p>自社SNS/既存リストで発信</p>\n<p>    ↓</p>\n<p>LINE登録 / DM経由で告知</p>\n<p>    ↓</p>\n<p>オフラインセミナー当日参加(10〜15名)</p>\n<p>    ↓</p>\n<p>セミナー本編(45〜60分)</p>\n<p>    ↓</p>\n<p>交流会(30〜40分)← 本番はここです</p>\n<p>    ↓</p>\n<p>個別面談予約(その場で確定)</p>\n<p>    ↓</p>\n<p>後日個別面談(30〜60分)</p>\n<p>    ↓</p>\n<p>　　成約</p>\n<h4>このカリキュラムで扱う範囲</h4>\n<p>セミナー当日(受付〜交流会終了まで)の運営フローに特化しております。</p>\n<h3>設計思想(最初に必ず叩き込む大原則)</h3>\n<h4>原則1:このセミナーは「セミナー」ではなく「交流会型クロージング」です</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_0114298f.png\" alt=\"原則1このセミナーは「セミナー」ではなく「交流会型クロージング」です\" loading=\"lazy\"></figure>\n<p>初心者の方は交流会を「余興・おまけ」と勘違いされがちですが、実際は逆です。</p>\n<p><strong>セミナーは交流会で話を聞いていただく権利を得るための時間です</strong></p>\n<ul class=\"docx-list\"><li>セミナー本編でガッツリ売り込みは行いません(売り込むと交流会で警戒されてしまいます)</li><li>セミナーは「人柄・実績・提供価値」をお見せするプレゼンの場です</li><li>交流会で1人ずつ話し、課題を抽出して個別面談へご誘導します</li><li>ゴールはセミナー満足度ではなく「この人に相談したい」と思っていただくことです\n（画像）</li></ul>\n<h4>原則2:時間配分はセミナー:交流会=1:1にします</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_d78e5c86.png\" alt=\"原則2\" loading=\"lazy\"></figure>\n<p>セミナーが長すぎると交流会の時間が削られて本末転倒です。90分なら45分セミナー+40分交流会+5分クロージングが標準となります。※交流会とクロージングはほぼ同じ時間認識で進めてOK\n</p>\n<div class=\"ph-img\" data-near=\"原則2:時間配分はセミナー:交流会=1:1にします\"></div>\n<h4>原則3:交流会の本質は「集団個別面談の前哨戦」です</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_91aa0242.png\" alt=\"原則3交流会の本質は「集団個別面談の前哨戦」です\" loading=\"lazy\"></figure>\n<p>交流会で「この方は面談にお呼びすべきか」を見極め、その場で日程を確定させるのがゴールです。</p>\n<div class=\"ph-img\" data-near=\"原則3:交流会の本質は「集団個別面談の前哨戦」です\"></div>\n<h4>3大ミス</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_1799ec28.png\" alt=\"3大ミス\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li><strong>セミナーを長くしすぎてしまう（今回のケースでいくと）</strong></li><li>60分以上行うと交流会が短くなり機会損失となります</li><li><strong>交流会で全員と均等にお話ししてしまう</strong></li><li>見込みの高い参加者に集中投下すべきです</li><li><strong>その場で日程を決めない</strong></li><li>「後日連絡します」は8割が連絡なしとなります。スマホでカレンダーを開いてその場で確定するのが鉄則です</li></ul>\n<div class=\"ph-img\" data-near=\"3大ミス\"></div>\n<h3>当日の全体タイムスケジュール</h3>\n<h4>90分版(標準)</h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>時間</strong></th><th><strong>パート</strong></th><th><strong>内容</strong></th></tr></thead><tbody><tr><td>-30〜0分</td><td>受付・開始前</td><td>全員と顔合わせ・お名前と業種を記憶します</td></tr><tr><td>0〜45分</td><td>セミナー本編</td><td>信頼構築・課題提起を行います</td></tr><tr><td>45〜85分</td><td>交流会(本番)</td><td>1on1ヒアリング・面談誘導を実施します</td></tr><tr><td>85〜90分</td><td>クロージング</td><td>お礼・LINE登録の再促進を行います</td></tr></tbody></table></div>\n<h4>75分版(短縮)</h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>時間</strong></th><th><strong>パート</strong></th><th><strong>内容</strong></th></tr></thead><tbody><tr><td>-20〜0分</td><td>受付・開始前</td><td>全員と顔合わせを行います</td></tr><tr><td>0〜35分</td><td>セミナー本編</td><td>信頼構築・課題提起を行います</td></tr><tr><td>35〜75分</td><td>交流会(本番)</td><td>1on1ヒアリング・面談誘導を実施します</td></tr><tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr></tbody></table></div>\n<p>短縮版でもセミナーと交流会の比率は1:1を守っていただきます。</p>\n<p>当日0-2</p>", "sales/02": "<h3>はじめに:このカリキュラムの位置づけ</h3>\n<p>本カリキュラムは、自社SNSで獲得したオーガニックリストを、オンラインウェビナーの場で個別面談に繋げ、最終的に成約まで持っていくための内容です。</p>\n<h4>対象となる導線</h4>\n<p>自社SNS発信 / 既存リスト</p>\n<p>    ↓</p>\n<p>LINE登録 / DM経由で告知</p>\n<p>    ↓</p>\n<p>ウェビナー当日参加(申込15名 → 出席10名前後)</p>\n<p>    ↓</p>\n<p>ウェビナー本編(75分)</p>\n<p>    ↓</p>\n<p>本編内で個別面談予約(チャットURL+3分間予約タイム)</p>\n<p>    ↓</p>\n<p>後日個別面談(30〜60分)</p>\n<p>    ↓</p>\n<p>成約</p>\n<p></p>\n<h3>設計思想</h3>\n<h4>このウェビナーは「販売型ウェビナー」です</h4>\n<p>オフラインの交流会型とは別物です。</p>\n<ul class=\"docx-list\"><li>本編内で価値提供と面談誘導を両立させます</li><li>売り込み臭が出るのは避けられません</li><li>ただし「商品を売る」のではなく「個別面談を取る」ことに集中します</li><li>ゴールはウェビナー終了時点で参加者の半数が面談予約完了している状態です</li></ul>\n<h4>オフライン版との構造の違い</h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>項目</strong></th><th><strong>オフライン版</strong></th><th><strong>ウェビナー版(今回)</strong></th></tr></thead><tbody><tr><td>セミナー本編の役割</td><td>信頼構築のみ・売り込まない</td><td>信頼構築+価値提供+面談誘導まで全部</td></tr><tr><td>交流会・1on1</td><td>あり(本番はここ)</td><td>なし</td></tr><tr><td>オファーパート</td><td>交流会で個別に</td><td>本編内で全員に向けて実施</td></tr><tr><td>面談予約</td><td>1on1で個別確定</td><td>本編内のチャット予約で一斉誘導</td></tr><tr><td>売り込み臭の強さ</td><td>低い</td><td>やや強くなる(避けられない)</td></tr></tbody></table></div>\n<h4>ウェビナー特有の3原則</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_2339bdcb.png\" alt=\"ウェビナー特有の3原則\" loading=\"lazy\"></figure>\n<h5>原則1:本編の中に「面談誘導パート」を組み込みます</h5>\n<p>オフラインのように交流会で個別誘導する場がないので、本編の最後に明確な誘導パートを入れます。ノウハウ提供で終わらせず、必ず「個別面談のご案内」をスライドで提示します。</p>\n<div class=\"ph-img\" data-near=\"原則1:本編の中に「面談誘導パート」を組み込みます\"></div>\n<h5>原則2:離脱対策が最重要です</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_14390b40.png\" alt=\"原則2離脱対策が最重要です\" loading=\"lazy\"></figure>\n<p>ウェビナーは離脱が容易です。最後の面談誘導まで残っていただくため、冒頭で「最後に大事なお知らせがあります」と必ず予告します。予告なしだとノウハウだけ聞いて途中離脱されてしまいます。</p>\n<div class=\"ph-img\" data-near=\"原則2:離脱対策が最重要です\"></div>\n<h5>原則3:面談予約はチャット即回答方式です</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_f8b7f94d.png\" alt=\"原則3面談予約はチャット即回答方式です\" loading=\"lazy\"></figure>\n<p>オフラインの「立ち話で日程決定」が使えないので、チャットに予約URLを流して、その場でクリックしていただく仕組みを作ります。「後日メールで予約URLを送ります」は予約率が激減します。ウェビナー終了前に必ず予約完了させる設計です。</p>\n<div class=\"ph-img\" data-near=\"原則3:面談予約はチャット即回答方式です\"></div>\n<h4>3大ミス</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_1799ec28.png\" alt=\"3大ミス\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li><strong>ノウハウ提供で終わらせてしまう</strong></li><li>「いいセミナーだった」で離脱され、面談予約ゼロになります</li><li><strong>冒頭で「最後にお知らせがあります」を予告しない</strong></li><li>価値提供パート終了時点で離脱されます</li><li><strong>予約URLを後日メールで送る運用にする</strong></li><li>予約率が10分の1になります</li></ul>\n<div class=\"ph-img\" data-near=\"3大ミス\"></div>\n<h4>オフラインとの最大の違い</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_02_14b66c07.png\" alt=\"オフラインとの最大の違い\" loading=\"lazy\"></figure>\n<p>オフラインは「全員と話して個別に誘導」、ウェビナーは「全員に向けて誘導し、行動した方だけ拾う」設計です。参加者の主体的な行動(チャットでの予約クリック)を促す仕掛けが命です。</p>\n<div class=\"ph-img\" data-near=\"オフラインとの最大の違い\"></div>\n<p>当日1-2</p>", "sales/03": "<h2>取次店構築</h2>\n<h3>はじめに</h3>\n<p>本カリキュラムは、取次店ネットワークを構築・運用するための実践教材です。本部が単独で集客・営業を行う体制から脱却し、取次店経由でアポイント・着座・成約を継続的に生み出す仕組みを構築することを目的としています。</p>\n<div class=\"ph-img\" data-near=\"はじめに\"></div>\n<h3>取次店構築の全体像</h3>\n<h4>なぜ取次店を作るのですか</h4>\n<p>アポイント構築施策の1つとして位置づけます。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>壁の種類</strong></th><th><strong>内容</strong></th></tr></thead><tbody><tr><td>時間の壁</td><td>商談・カスタマーサクセス対応で手が埋まり、新規開拓に動けません</td></tr><tr><td>属人の壁</td><td>自分の人脈が枯れた瞬間にパイプラインが止まります</td></tr><tr><td>信用の壁</td><td>自分のキャラクターが刺さらない層には届きません</td></tr></tbody></table></div>\n<p>取次店は、この3つの壁を「他人の経済圏・他人のキャラクター・他人の時間」で突破する仕組みです。本部事業の<strong>第二エンジン</strong>として位置づけます。</p>\n<h4>取次店モデルの基本構造</h4>\n<p>[本部]</p>\n<p>  ↑ 商材提供・トーク提供・着座対応</p>\n<p>  │</p>\n<p>[1次取次店] ──→ 紹介・着座セット</p>\n<p>  ↑</p>\n<p>  │ 商材を又紹介</p>\n<p>[2次取次店] ──→ 1次取次店の経済圏に紹介</p>\n<h5>重要な前提</h5>\n<ul class=\"docx-list\"><li>取次店は「クロージング営業」をしません。クロージングは本部が行います</li><li>取次店の役割は「適切な相手を見極めて、本部に繋ぐ」ことです</li><li>ただし、適切な相手を見極めるためには<strong>商品を理解している必要があります</strong></li><li>商品理解が浅いと、ペルソナ違いの方を紹介してしまい、着座しても受注に繋がりません</li></ul>\n<h4>3つの報酬モデル(選択制)</h4>\n<p>取次店には以下3つから選んでいただきます。ただし実質は①②のどちらかにご誘導する設計です。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>モデル</strong></th><th><strong>内容</strong></th></tr></thead><tbody><tr><td>①成約成果報酬型</td><td>成約成果の15%を成約時にバック</td></tr><tr><td>②着座成果報酬型</td><td>1着座2万円(税抜) ※着座条件あり</td></tr><tr><td>③代理店型</td><td>①+ロイヤリティ15%のうち5%をストックバック</td></tr></tbody></table></div>\n<ul class=\"docx-list\"><li><strong>③を残す理由</strong></li></ul>\n<p>選択肢として置くことで①②が「現実的な選択」に見えます。取次店候補との対話の中でも、一応選択肢として提示しておきます。</p>\n<h4>報酬支払いタイミング</h4>\n<p><strong>入金ベース支払いを採用します</strong></p>\n<ul class=\"docx-list\"><li>本部に売上が入金された月の締めで計算します</li><li>入金月の翌月末に取次店へお支払いします</li><li>分割契約の場合は、入金都度、按分してお支払いします</li></ul>\n<h5>理由</h5>\n<p>取次店に成果報酬型でお支払いする以上、本部のキャッシュフローを傷めずに継続的にお支払いできる設計が必要です。</p>\n<p>「成約=即支払い」にすると、分割や入金遅延が発生した際に自社が立て替える形になり、取次店ネットワークが拡大するほど本部のキャッシュが圧迫されてしまいます。</p>\n<h3>取次店候補の見極め【最重要】</h3>\n<h4>候補抽出の原則</h4>\n<p>取次店候補は、知り合い・顧客・自身の経済圏から探します。ただし、「知っているから」「仲がいいから」だけで選ぶと9割は機能しません。</p>\n<p>判断軸は主に2つです。</p>\n<h4>軸1:あなたとその人に「関係性」があるか</h4>\n<p>ここでいう関係性とは、単なる面識ではなく、「あなたの紹介する商材を信用してくれるレベルの関係性」を指します。</p>\n<h5>OK</h5>\n<ul class=\"docx-list\"><li>過去に仕事で成果を出した相手(あなたの実力を知っている方)</li><li>定期的に連絡を取り合っており、相互に近況を共有している方</li><li>一度はお金が動いた関係(顧客/取引先/パートナー)</li><li>互いに「この人の言うことなら聞く」と思える状態の方</li></ul>\n<h5>NG</h5>\n<ul class=\"docx-list\"><li>名刺交換しただけ・SNSで繋がっているだけの方</li><li>過去に1〜2回会ったが継続接点がない方</li><li>「知ってはいるが、何か頼める関係ではない」レベルの方</li><li>条件を話していないのに「紹介できる!」と即答する方は大体機能しません</li></ul>\n<h4>軸2:その人の周りに「本当にペルソナがいるか」</h4>\n<p>これが最も重要です。関係性があっても、その方の経済圏にウリボーターゲットがいなければ取次店として機能しません。</p>\n<p>その分、ペルソナがいる方に対するメリット提示はかなり重要になります。</p>\n<h5>判断基準</h5>\n<p>「率直に聞きたいんですけど、今この瞬間に『この人に○○紹介できそう』って3人くらい顔浮かびますか?」とお聞きして、10秒以内にお名前が出るかどうかを見ます。</p>\n<h4>候補抽出ワーク</h4>\n<p>候補リストを作る時、まず以下の3カテゴリで20名ずつ書き出します。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>カテゴリ</strong></th><th><strong>抽出元</strong></th></tr></thead><tbody><tr><td>知り合い</td><td>過去の同僚・経営者仲間・コミュニティの繋がり</td></tr><tr><td>顧客</td><td>既存・過去の取引先、コンサル先</td></tr><tr><td>自身の経済圏</td><td>SNSフォロワー上位、紹介ネットワーク、業界仲間</td></tr></tbody></table></div>\n<p>その上で、「軸1(関係性あり)×軸2(周りにペルソナあり)」の両方を満たす相手だけを残します。</p>\n<p>通常、60名抽出して残るのは10〜15名程度です。これが取次店スカウトリストになります。</p>\n<h4>スカウト時にお伝えする4要素</h4>\n<h5>1. 紹介に手間がかからないこと</h5>\n<ul class=\"docx-list\"><li>「LINEで一言『この方いいよ』とお繋ぎいただくだけです」</li><li>開拓しなくてもご自身の周りにいらっしゃる方にお声がけいただくだけ、ニーズを見ていただくだけで診断アポイント的な感じでも問題ないとお伝えします(報酬形態が①の場合のみ)</li></ul>\n<p>ここで言う「紹介の手間」とは、軽くお繋ぎいただくこと<strong>ではない</strong>ことに注意します。</p>\n<p>適当に繋がられると、決まらずに取次速度おちるのと商材理解しない事でコミュニケーションコストがかかる</p>\n<div class=\"ph-img\" data-near=\"1. 紹介に手間がかからないこと\"></div>\n<h5>2. 商材の強さ・実績(相手の関係性をカバーするレベル)</h5>\n<p>取次店が一番怖いのは「自分の信用が傷つくこと」です。以下5要素でご説明します。</p>\n<ul class=\"docx-list\"><li>直近の成約実績(数字・期間・規模)</li><li>リアルな成果事例(できれば動画 or 画像つき)</li><li>本部のサポート体制(紹介後どこまで手厚く対応されるか)</li><li>失敗した例 → 安心と「こういう方はうまくいかない」という訴求</li><li>既存取次店の成功事例</li></ul>\n<div class=\"ph-img\" data-near=\"2. 商材の強さ・実績(相手の関係性をカバーするレベル)\"></div>\n<h5>3. 受注率の高さを数字で示す</h5>\n<ul class=\"docx-list\"><li>着座率・成約率の実績数値</li><li>「あなたが3人ご紹介いただければ、平均○人成約します」</li><li>過去の成約データを可視化</li></ul>\n<div class=\"ph-img\" data-near=\"3. 受注率の高さを数字で示す\"></div>\n<h5>4. 「自分も儲かる」を具体数字で</h5>\n<p>相手の経済圏サイズに合わせて、月いくらになるかをその場で計算してお見せします。</p>\n<h5>シミュレーション例</h5>\n<p>月1人ご紹介 → 着座 → 成約で年○名 1次取次店なら成約報酬で○万、2次取次店なら○万。 これが副業で動くだけで入ってきます。※金額がある程度大きい場合\n</p>\n<div class=\"ph-img\" data-near=\"シミュレーション例\"></div>", "sales/04": "<h3>取次店への商材レクチャー設計【重要修正】</h3>\n<h4>レクチャーの3原則</h4>\n<h5>原則1:取次店にも商品を理解させます</h5>\n<p>取次店が商品を<strong>理解していないと、ペルソナ違いの方を紹介してしまい、変なアポイントになります</strong>。変なアポイントは着座しても受注に繋がらず、本部の時間を浪費するだけでなく、取次店自身の信用も傷つけます。</p>\n<p>ただし、取次店の役割はあくまで「クロージング営業」ではなく「適切な相手の見極めと本部への引き継ぎ」です。</p>\n<p>商品理解の深さは以下のように区別します。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>区分</strong></th><th><strong>役割</strong></th><th><strong>求められる商品理解レベル</strong></th></tr></thead><tbody><tr><td>取次店</td><td>適切な相手の見極めと引き継ぎ</td><td>中程度(誰がペルソナで、何が解決できるかを語れるレベル)</td></tr><tr><td>本部</td><td>商品説明・クロージング</td><td>完全(価格・契約条件・カスタマーサクセスまで)</td></tr></tbody></table></div>\n<h6>取次店に必ず覚えていただく5項目</h6>\n<ul class=\"docx-list\"><li><strong>どんな商品か</strong>(1分で説明できるレベル)</li><li><strong>誰がペルソナか</strong>(具体的な属性・状況・悩み)</li><li><strong>誰がペルソナでないか</strong>(NG属性・断る基準)</li><li><strong>どんな成果が出ているか</strong>(数字3つ・事例2〜3個)</li><li><strong>本部に繋いだ後、何が起こるか</strong>(着座→提案→契約までの流れ)</li></ul>\n<p>これらを覚えていないと、「とりあえず誰でも紹介する」状態になり、着座率は上がっても<strong>成約率が激減</strong>します。</p>\n<h5>原則2:商品説明の「クロージングトーク」は教えない</h5>\n<p>取次店に商品理解は持っていただきますが、価格交渉・契約条件・特典説明などの<strong>クロージングトーク</strong>は教えません。</p>\n<p>理由は以下です。</p>\n<ul class=\"docx-list\"><li>価格や条件は本部の判断で変わる(取次店が古い情報で語ると齟齬が生じる)</li><li>クロージングは本部のスキル・タイミング判断が必要</li><li>取次店が条件を話してしまうと、本部が再交渉できなくなる</li></ul>\n<p>「商品の魅力は語れる、ただし条件交渉は本部に渡す」という設計にします。</p>\n<div class=\"ph-img\" data-near=\"原則2:商品説明の「クロージングトーク」は教えない\"></div>\n<h5>原則3:紹介の型を1つに絞ります</h5>\n<p>複数パターンを教えると現場で混乱します。「これを言って、このリンクをお送りする」までを型化します。→チャットツールで繋いでもらうでもOKです\n</p>\n<div class=\"ph-img\" data-near=\"原則3:紹介の型を1つに絞ります\"></div>\n<h5>原則4:相手の周辺コミュニティを聞いてイメージさせます</h5>\n<p>レクチャー中に「あなたの周りで、こういう方いらっしゃいませんか?」と質問しながら、紹介相手を取次店の頭の中で具体化させます。</p>\n<div class=\"ph-img\" data-near=\"原則4:相手の周辺コミュニティを聞いてイメージさせます\"></div>\n<h4>取次店向け商品レクチャーの構成(60分)</h4>\n<p>レクチャーは1on1で実施します。所要時間は60分が標準です。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>時間</strong></th><th><strong>内容</strong></th></tr></thead><tbody><tr><td>0〜5分</td><td>レクチャーの目的説明・到達目標の共有</td></tr><tr><td>5〜20分</td><td>商品の概要・ペルソナ・解決する課題</td></tr><tr><td>20〜30分</td><td>成果事例(数字・お客様の声)</td></tr><tr><td>30〜40分</td><td>NG属性・断る基準</td></tr><tr><td>40〜50分</td><td>紹介の型・トークテンプレ</td></tr><tr><td>50〜55分</td><td>「あなたの周りで誰が思い浮かびますか?」質問ワーク</td></tr><tr><td>55〜60分</td><td>質疑応答・次のアクション確認</td></tr></tbody></table></div>\n<h4>レクチャー時の質問は作成しておく！</h4>\n<p>→この4つで1人は必ずお顔が出ます。出たら即「では、その方、お繋ぎいただけますか?」と動かします。</p>\n<div class=\"ph-img\" data-near=\"レクチャー時の質問は作成しておく！\"></div>\n<h4>取次店にお渡しする3点セット</h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>ツール</strong></th><th><strong>内容</strong></th><th><strong>用途</strong></th></tr></thead><tbody><tr><td>①紹介トーク集</td><td>LINE/DM/対面の3パターン</td><td>紹介する時のコピペ用</td></tr><tr><td>②サービス説明資料→楽だから</td><td>1枚PDF or LP</td><td>紹介相手にお送りする用</td></tr><tr><td>③実績エビデンス</td><td>受講者・顧客の成功事例</td><td>信頼補強用</td></tr></tbody></table></div>", "sales/05": "<h3>1次・2次の階層管理とKPI</h3>\n<h4>1次・2次の役割定義</h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>階層</strong></th><th><strong>役割</strong></th><th><strong>例-報酬(商材30万円の場合)</strong></th></tr></thead><tbody><tr><td>1次取次店</td><td>本部と直接契約。自身も紹介できますが、メインは2次取次店の開拓・育成</td><td>商材価格×3% = 9,000円</td></tr><tr><td>2次取次店</td><td>1次取次店の下に紐づきます。実働部隊。紹介して着座まで運びます</td><td>商材価格×12% = 36,000円</td></tr></tbody></table></div>\n<h4>報酬テーブル全体像</h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>商材価格</strong></th><th><strong>1次取次店(3%)</strong></th><th><strong>2次取次店(12%)</strong></th><th><strong>1次の合計※</strong></th></tr></thead><tbody><tr><td>300,000円</td><td>9,000円</td><td>36,000円</td><td>45,000円</td></tr><tr><td>400,000円</td><td>12,000円</td><td>48,000円</td><td>60,000円</td></tr><tr><td>500,000円</td><td>15,000円</td><td>60,000円</td><td>75,000円</td></tr><tr><td>600,000円</td><td>18,000円</td><td>72,000円</td><td>90,000円</td></tr></tbody></table></div>\n<p>※1次が直接ご紹介された場合は、1次自身が2次相当の12%を取得(合計15%まで取得可能)</p>\n<h4>なぜ2次の方が報酬が高いのですか</h4>\n<p>これは設計上の意図があります。</p>\n<ul class=\"docx-list\"><li>2次取次店=実働部隊なので、動かないと売上が立ちません。動機を強く設計する必要があります</li><li>1次取次店=ネットワーク管理者なので、自分が動かなくても2次が動けば収入が入るストック型です</li><li>1次は「2次を増やすこと」が仕事になる構造です</li></ul>\n<div class=\"ph-img\" data-near=\"なぜ2次の方が報酬が高いのですか\"></div>\n<h5>構造の本質</h5>\n<p><strong>1次は組織化のインセンティブ/2次は実行のインセンティブ</strong>という二段階構造です。</p>\n<h4>取次店KPI管理項目</h4>\n<h5>取次店個別KPI</h5>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>項目</strong></th><th><strong>月次目標</strong></th><th><strong>計測方法</strong></th></tr></thead><tbody><tr><td>紹介発生数</td><td>3件以上</td><td>紹介LINEの送付数</td></tr><tr><td>着座数</td><td>1件以上</td><td>商談の実施数</td></tr><tr><td>成約数</td><td>月0.3件以上(≒年4件)</td><td>契約数</td></tr><tr><td>着座率</td><td>紹介→着座が33%以上</td><td>着座数÷紹介数</td></tr><tr><td>成約率</td><td>着座→成約が30%以上</td><td>成約数÷着座数</td></tr><tr><td><strong>ペルソナ適合率</strong></td><td>紹介の80%以上が適合</td><td>ペルソナ判定OKの紹介÷全紹介</td></tr></tbody></table></div>\n<p>最後の「ペルソナ適合率」は商品理解レクチャーの効果測定指標です。これが低い場合、レクチャーを再実施します。</p>\n<h5>本部側のネットワークKPI</h5>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>項目</strong></th><th><strong>目標</strong></th><th><strong>用途</strong></th></tr></thead><tbody><tr><td>1次取次店数</td><td>半年で10名</td><td>パイプ太さの先行指標</td></tr><tr><td>2次取次店数</td><td>1次1人につき3〜5名</td><td>ネットワーク拡張度</td></tr><tr><td>取次店経由成約比率</td><td>全成約の30%以上</td><td>取次店事業の機能度</td></tr><tr><td>ドロップアウト率</td><td>月10%以下</td><td>制度の健全性</td></tr></tbody></table></div>\n<h4>取次店ヘルススコア(3段階)</h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>ランク</strong></th><th><strong>状態</strong></th><th><strong>対応</strong></th></tr></thead><tbody><tr><td>A:稼働中</td><td>月1件以上紹介発生</td><td>月次1on1継続・追加報酬枠</td></tr><tr><td>B:休眠</td><td>紹介3ヶ月ゼロ</td><td>リマインド+紹介イメージ再喚起+商品理解の再レクチャー</td></tr><tr><td>C:剥離</td><td>半年以上ゼロ</td><td>取次店契約終了 or 関係見直し</td></tr></tbody></table></div>\n<h4>階層管理の運用ルール</h4>\n<h5>1次取次店との運用</h5>\n<ul class=\"docx-list\"><li>月1回1on1(30分):先月の紹介状況・今月の見込み・困りごとヒアリング</li><li>2次取次店紹介ノルマ:3ヶ月で2次を1名以上連れてきていただくことを契約条件とします</li><li>本部主催の懇親会(四半期1回):1次同士の横連携を作ります</li></ul>\n<div class=\"ph-img\" data-near=\"1次取次店との運用\"></div>\n<h5>2次取次店との運用</h5>\n<ul class=\"docx-list\"><li>基本は1次経由でやり取りを行います(本部が直接管理しません)</li><li>紹介成功時に1次・2次両者に通知します(成果の見える化)</li><li>2次が高パフォーマンスの場合、1次に昇格させます</li></ul>\n<div class=\"ph-img\" data-near=\"2次取次店との運用\"></div>\n<h5>商品理解の継続維持</h5>\n<p>レクチャー後、商品理解は時間とともに薄れます。以下を実施します。</p>\n<ul class=\"docx-list\"><li>四半期に1回、最新の商品アップデート・成功事例を共有</li><li>半年に1回、ペルソナ判定の精度をテスト(クイズ形式で5問)</li><li>新しい成功事例が出たら都度LINEで配信</li></ul>\n<div class=\"ph-img\" data-near=\"商品理解の継続維持\"></div>\n<h3>絶対ルール</h3>\n<h4>6箇条</h4>\n<ul class=\"docx-list\"><li><strong>取次店に商品を理解させる</strong>(変なアポ防止)</li><li><strong>取次店にクロージングはさせない</strong>(価格交渉・条件提示は本部のみ)</li><li><strong>2次は1次経由で管理する</strong></li><li><strong>報酬は入金ベース・入金月の翌月末払い</strong>(本部キャッシュ保護)</li><li><strong>休眠3ヶ月で必ず1on1</strong>(剥離の予防+商品理解の再レクチャー)</li><li><strong>取次店の信用は本部の信用</strong>(クレーム対応は本部が前面に立ちます)</li></ul>\n<div class=\"ph-img\" data-near=\"6箇条\"></div>\n<h3>実施前チェックリスト</h3>\n<h4>取次店制度立ち上げ前</h4>\n<ul class=\"docx-list\"><li>商品レクチャー資料の完成</li><li>紹介トーク集3パターンの完成</li><li>サービス説明資料(1枚PDF)の完成</li><li>実績エビデンス集の完成</li><li>取次店契約書テンプレートの完成</li></ul>\n<h4>候補リスト作成期</h4>\n<ul class=\"docx-list\"><li>知り合い20名抽出</li><li>顧客20名抽出</li><li>自身の経済圏20名抽出</li><li>スカウトリスト10〜15名確定</li></ul>\n<h4>契約</h4>\n<ul class=\"docx-list\"><li>契約書締結</li></ul>\n<h3>KPI記録シート(記入項目)</h3>\n<p>月次で必ず以下を記録します。</p>\n<h4>取次店ネットワーク全体</h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>項目</strong></th><th><strong>記入欄</strong></th></tr></thead><tbody><tr><td>集計月</td><td>&nbsp;</td></tr><tr><td>1次取次店数</td><td>&nbsp;</td></tr><tr><td>2次取次店数</td><td>&nbsp;</td></tr><tr><td>稼働中(A)取次店数</td><td>&nbsp;</td></tr><tr><td>休眠(B)取次店数</td><td>&nbsp;</td></tr><tr><td>当月の紹介発生総数</td><td>&nbsp;</td></tr><tr><td>当月の着座総数</td><td>&nbsp;</td></tr><tr><td>当月の成約総数</td><td>&nbsp;</td></tr><tr><td>着座率</td><td>&nbsp;</td></tr><tr><td>成約率</td><td>&nbsp;</td></tr><tr><td>ペルソナ適合率</td><td>&nbsp;</td></tr><tr><td>取次店経由成約比率</td><td>&nbsp;</td></tr><tr><td>ドロップアウト数</td><td>&nbsp;</td></tr><tr><td>良かった点</td><td>&nbsp;</td></tr><tr><td>改善点</td><td>&nbsp;</td></tr></tbody></table></div>\n<h4>取次店個別</h4>\n<p>各取次店ごとに同様の項目を記録し、ヘルススコアを判定します。</p>\n<h3><strong>営業/商談フロー</strong></h3>\n<p>大まかな商談の流れです。</p>\n<p>※人によってや商材によって、商談の流入経路によって変わる場合もあるのでこの方法やフローが絶対ではないです</p>\n<ul class=\"docx-list\"><li>挨拶</li></ul>\n<p>↓</p>\n<ul class=\"docx-list\"><li>アイスブレイクで緊張をほぐす</li></ul>\n<p>↓</p>\n<ul class=\"docx-list\"><li>自己紹介</li></ul>\n<p>↓</p>\n<ul class=\"docx-list\"><li>課題のヒアリング</li></ul>\n<p>↓</p>\n<ul class=\"docx-list\"><li>提案</li></ul>\n<p>↓</p>\n<ul class=\"docx-list\"><li>クロージング</li></ul>\n<p>↓</p>\n<ul class=\"docx-list\"><li>契約書・連携</li></ul>\n<p>↓　</p>\n<ul class=\"docx-list\"><li>商談後</li></ul>\n<div class=\"ph-img\" data-near=\"取次店個別\"></div>", "shodan/01": "<h3><strong>商談トーク内容について</strong></h3>\n<h4><strong>1. 挨拶・自己紹介トーク構成</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_01_4496dbcb.png\" alt=\"1. 挨拶・自己紹介トーク構成\" loading=\"lazy\"></figure>\n<p>丁寧な挨拶、（※1自己紹介、連絡の理由） →お世話になっております。本日は貴重なお時間を頂きありがとうございます。〇〇（自分の名前）と申します。宜しくお願いします。\n</p>\n<p>※1　商談の中で入れ込むタイミングが違う</p>\n<div class=\"ph-img\" data-near=\"1. 挨拶・自己紹介トーク構成\"></div>\n<h4><strong>2. アイスブレイク：世間話はNG、あくまで次トークに繋げるため</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_01_2a235b59.png\" alt=\"2. アイスブレイク\" loading=\"lazy\"></figure>\n<p>早速お話しできればと思うんですが先に一点お伺いしたいことがございまして、今回〔流入経路：例）インスタ／セミナー／紹介等〕からお時間とっていただけたかと思うんですが 〔流入経路〕って色々な営業連絡来ると思うんですよね（イエス取り）。その中で本日お時間とろうと思っていただいたのはどこに興味持っていただけたのかなと思いまして。\n\n</p>\n<p>（上記聞く理由としてはなぜこの場に来たか、悩みはあるのかの部分を相手の口から聞き出すため）</p>\n<p><strong>相手返信パターン</strong> ①なんとなく ②〔商品・サービスに関連する悩み：例）困っていた／売上が上がらない等〕 ③逆に何で声かけたんですか？　※2 ④有名（伸びている）方なんで ⑤他の営業と違った ⑥催促が来たから ⑦その他</p>\n<div class=\"ph-img\" data-near=\"2. アイスブレイク：世間話はNG、あくまで次トークに繋げるため\"></div>\n<h4><strong>3. 自己紹介トーク構成</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_01_20200d1b.png\" alt=\"3. 自己紹介トーク構成\" loading=\"lazy\"></figure>\n<p>そうだったんですね。そうしたら先に自己紹介できればと思うんですが〜自身の自己紹介をする。①権威性/②他との違い/③実績の3ポイントを意識して自己紹介をしましょう。一個一個説明するのではなく、例)私は未経験から1年でInstagramを10万人増やし、1年の売上が1人で4,000万円あります。→この1文だけでダラダラ説明しなくても伝わります。また、未経験でも出来るという安心感も与えられます。\n\n\n\n\n\n\n\n（画像）</p>\n<h4><strong>※自己紹介後トーク構成（今回の商談背景）</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_01_b14c1ef9.png\" alt=\"※自己紹介後トーク構成（今回の商談背景）\" loading=\"lazy\"></figure><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_01_bc50639f.png\" alt=\"※自己紹介後トーク構成(続き)\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li><strong>営業していない理由</strong> 　→ 頻繁な営業活動はしていない／双方の時間を無駄にするから</li><li><strong>本職について説明</strong> 　→ なぜスクール事業を行っているかの大義名分\n</li><li><strong>なぜ今回来てくれたか？（相手の口から語らせる）</strong> 　\n</li><li><strong>あなたの目標やビジョンは何か？</strong>　\n</li><li><strong>目標に対しての現在地のギャップは？（ミラーリング）</strong> 　→ 行動のわりに成果が出ていない事を指摘／私もも全く同じだった</li></ul>\n<div class=\"ph-img\" data-near=\"※自己紹介後トーク構成（今回の商談背景）\"></div>\n<ul class=\"docx-list\"><li><strong>成果が出る構造の説明</strong> 　\n</li><li><strong>継続できない人が大半というデータの提示</strong> 　→ 〔データの出所〕でも出ている／結果が出ていない時の継続ができない人が大半\n</li><li><strong>私と商談先の共通点の強調</strong> 　→\n</li><li><strong>今日のゴール提示</strong> 　\n</li><li><strong>テストクロージング（二択提示）</strong> 　→ 実際に目標やこれからの為にお金をかけてでもやろうと思うか？であれば覚悟があると思うので説明する。→お金がかかるyes取りをして、”営業される”体制を取り警戒を消す。\n</li></ul>\n<div class=\"ph-img\" data-near=\"※自己紹介後トーク構成（今回の商談背景）\"></div>", "shodan/02": "<h3><strong>課題のヒアリング　構成</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_02_3d7f752a.png\" alt=\"課題のヒアリング　構成\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li><strong>相手職業/現状の確認</strong> 　→ 〇〇をやられているんですね、という確認\n</li><li><strong>〔手段〕の運営目的の確認</strong> 　→ 〔目的〕で運営している感じですか？（ズレがないか確認）\n</li><li><strong>現状の不満を聞き出す</strong> 　→ ぶっちゃけ満足いく結果でてますか？ 　① うまくいっている → いいですね！ 　② うまくいっていない → 何がうまくいってないんですか？\n</li><li><strong>独学かどうかの決めつけトーク</strong> 　→ これって独学でやられてますよね？（専門業者でないと解像度が低くて伸びないことを遠回しに伝える）\n</li><li><strong>ヒアリング項目（順不同）→ヒアリングは一方的に聞くのではなくてコミュニケーションなので”会話”を意識</strong> 　</li></ul>\n<div class=\"ph-img\" data-near=\"課題のヒアリング　構成\"></div>\n<p><strong>Budget（予算）/ Needs（必要性）：を知る・今他に自己投資は何をしているか？・他に使っているサービスはあるか？・今、私以外に検討しているサービスはあるか？・こういった話やサービスの説明は受けたことがある？・受けた事がある場合なんで買わなかったのか？・どうなっていきたいのか？（〔理想の未来〕を聞き出す） →他で聞いてたらスキップ→その未来はこのサービスで作れることは話していく\n\n\n\n\n\n\n</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_02_1ab47a45.png\" alt=\"Budget（予算）/ Needs（必要性）：を知る\" loading=\"lazy\"></figure>\n<div class=\"ph-img\" data-near=\"課題のヒアリング　構成\"></div>\n<p><strong>Authority（決裁権）：を知る・これを購入しようとする時は一人で決める？・（※夫/妻/その他いる場合）相談したらなんて言われそうか？ネックは？→最後は自分で決めないと意味がない旨は伝える\n\n\n</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_02_59639a75.png\" alt=\"Authority（決裁権）：を知る\" loading=\"lazy\"></figure>\n<div class=\"ph-img\" data-near=\"課題のヒアリング　構成\"></div>\n<p><strong>Timeframe（導入時期）：を知る・始めるとしたらいつが良いですか？（●月から始めることは出来ますか？）→若干クロージングトークなので最後\n\n</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_02_2b900b0d.png\" alt=\"Timeframe（導入時期）：を知る\" loading=\"lazy\"></figure>\n<p>※大体の人は直接的な答えを持っていないので導く事が前提です</p>\n<div class=\"ph-img\" data-near=\"課題のヒアリング　構成\"></div>\n<p>\n\n\n<strong>解説（営業資料）　構成→営業資料の順番通りに説明→理解してもらう\n</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_02_8d7d2d2b.png\" alt=\"解説（営業資料）構成\" loading=\"lazy\"></figure>\n<p><strong>※成果が出る3要素の提示</strong> 　→ 成果を出すには3つやればいい。1~3を決める。要はセンターピンを決める事で相手の迷いを断ち切る。あれもやるこれもやるは迷わせる</p>\n<div class=\"ph-img\" data-near=\"課題のヒアリング　構成\"></div>", "shodan/03": "<h3><strong>カリキュラム説明〜クロージング</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_03_844f8cb7.png\" alt=\"カリキュラム説明〜クロージング\" loading=\"lazy\"></figure>\n<p><strong>カリキュラム内容はこんな感じになります。ご質問とかってあったりしますか？\n</strong> →ここまでの先方の疑問点などを解決</p>\n<p>そうしたらどうやってこの内容を学ぶかなんですが〔競合：例）他のスクール／他のサービス等〕とかの話って聞いたことありますか？ →yesの場合もnoの場合も同じトーク\n</p>\n<p>弊社には〔業界・分野〕で唯一の特徴が４つありまして、 →〔競合〕と弊社〔サービス名〕の比較で魅力付けをする\n</p>\n<p><strong>↑上記他社比較を説明</strong> 説明時にpoint</p>\n<ul class=\"docx-list\"><li>〔競合〕は〔期間：例）半年～1年〕、弊社は〔期間：例）2か月〕、学習の時間使いすぎると身につかない時間は有限であり学習がメインではない →1回の講義時間は〔時間：例）30分〕、ベース〔頻度：例）1週間に一回〕、合計〔回数：例）8回〕の講義回数</li><li>基本は動画、教材を渡すのみ、あってもグループ授業。これでは身につかない</li><li>質疑応答は基本かえってこない。〔サービス種別：例）スクール〕は学校、質疑応答が出来ないは〔サービス種別〕ではない</li><li>〔知識・スキルの内容：例）アルゴリズム〕は定期的に変わる。今後も使えるためにアフターフォローは当たり前</li></ul>\n<div class=\"ph-img\" data-near=\"カリキュラム説明〜クロージング\"></div>\n<p>ここまで説明し説明は以上です。何か質問ありますか？（値段は？は聞き出す） →言い忘れてましたね。これ金額いくらだと思いますか？\n</p>\n<p><strong>回答パターン</strong></p>\n<ul class=\"docx-list\">\n<li><strong>① 〔金額帯：例）〜10万円〕</strong> → 相手が話を理解していない</li>\n<li><strong>② 〔金額帯：例）30〜50万〕</strong> → 価値を理解している</li>\n<li><strong>③ 〔金額帯：例）50万円〜〕</strong> → 付加価値がついている</li>\n</ul>\n<div class=\"ph-img\" data-near=\"カリキュラム説明〜クロージング\"></div>\n<ul class=\"docx-list\"><li><strong>・支払い方法（分割<figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_03_3b9eb3a2.png\" alt=\"支払い方法（分割など）聞かれたら\" loading=\"lazy\"></figure>など）聞かれたら</strong> 弊社はカードも使えますよ！その場合であればご自身でアプリなり電話なり対応してもらえれば分割も可能です！（現金の場合はMAX〔分割数：例）2〕分割）\n\n</li></ul>\n<div class=\"ph-img\" data-near=\"カリキュラム説明〜クロージング\"></div>\n<ul class=\"docx-list\"><li><strong>・いつまでに返事したら？</strong> いつでもいいですよ。明日でも半年後でも一年後でも。ただ一つ言えるのは検討理由によってはやらない方がいいですねとは思いますね。\n</li></ul>\n<p>例えば、〔検討が必要な正当な理由の例：例）専業主婦で学びたいけどお金は主人が出す等〕とかであればもちろん相談はした方がいいと思いますがやるかどうかで考えたいとかであればやらない理由しか考えないのでそうなるとやっても 何かしらの理由付けてやらなくなるのでこのままお金かけずにやった方がいいと思いますね。 ただ我々はこの〔サービス名〕と〔メインサービス〕しかやってないのでお返事自体はいつでも大丈夫です。</p>\n<p>ちなみに考えたい理由はなんですか？ →ネック返し（基本お金、どの場合は支払い方法などを一緒に考える。\n</p>\n<div class=\"ph-img\" data-near=\"カリキュラム説明〜クロージング\"></div>\n<ul class=\"docx-list\"><li><strong>・結果がでるかわからない</strong> →勿論絶対はないです。質問などちゃんとアクションをおこせてたらでます。 もちろん確実とか絶対なんてものはないのでその上ででなかったらすみません。\n\n\n</li></ul>\n<div class=\"ph-img\" data-near=\"カリキュラム説明〜クロージング\"></div>\n<figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_03_da95f243.png\" alt=\"クロージング後の流れ「やります！」（顧客）\" loading=\"lazy\"></figure>\n<p><strong>やります！（顧客）\n</strong> ↓ ありがとうございます。最高の講師付けるので一緒に頑張っていけたらと思います。そうしましたらお手続きできたらと思うのですが →契約フローシートへ\n\n</p>\n<div class=\"ph-img\" data-near=\"カリキュラム説明〜クロージング\"></div>\n<p>※契約でも検討でも必ずネクストアクションとその期日<figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_03_2902897e.png\" alt=\"いつまでに返事したら？\" loading=\"lazy\"></figure>時間は明確にしてください。</p>\n<p>→しないとなあなあになり行動をしないので、最初の約束を提案先としてください。</p>", "shodan/04": "<h3><strong>実績</strong></h3>\n<p>※商談用に実績をまとめる</p>\n<h3><strong>復習方法</strong></h3>\n<p>オンライン商談は録画するようにしましょう。</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_1e17b8bb.png\" alt=\"オンライン商談は録画するようにしましょう。\" loading=\"lazy\"></figure>\n<p>録画ツールはnottaやtldv、notionなどありますが googlemeetをしようするのであれば、</p>\n<p>搭載されているgeminiの録画ツールを使用しましょう。</p>\n<div class=\"ph-img\" data-near=\"カリキュラム説明〜クロージング\"></div>\n<h3><strong>商談復習フロー（推奨：商談後24時間以内）</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_58dea074.png\" alt=\"商談復習フロー（推奨：商談後24時間以内）\" loading=\"lazy\"></figure>\n<h3><strong>Step 1. 録画視聴</strong></h3>\n<p>具体的には以下3点をメモします言葉だけではなく、相手の目線や声のトーンで何にテンションが上がって興味がないのか？も録画の中で分析します。\n</p>\n<ul class=\"docx-list\"><li>顧客の反応が良かった瞬間（前のめりになった箇所）</li><li>顧客の反応が悪くなった瞬間（トーンが落ちた・話題を変えた箇所）</li><li>自分が詰まった・焦った瞬間</li></ul>\n<div class=\"ph-img\" data-near=\"Step 1. 録画視聴\"></div>\n<h3><strong>Step 2. 反対処理（反論）の書き起こしと再処理</strong></h3>\n<p>商談中に出た反対意見・懸念は、<strong>必ず原文に近い形で書き留めてください</strong>。意訳すると次回の対応精度が落ちます。\n</p>\n<p>以下のフォーマットで整理することを推奨します：</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>項目</strong></th><th><strong>内容</strong></th></tr></thead><tbody><tr><td>顧客の反対文言（原文）</td><td>「予算が今期は厳しくて…」</td></tr><tr><td>発言タイミング</td><td>提案直後 / クロージング時 等</td></tr><tr><td>自分の実際の返答</td><td>その場でどう返したか</td></tr><tr><td>理想の返答（再処理）</td><td>今振り返って最適な返し</td></tr><tr><td>背景にある本音の仮説</td><td>本当は◯◯を懸念している</td></tr></tbody></table></div>\n<p><strong>再処理のポイント</strong>：反対意見は「表面的な言葉」と「本音」がズレていることが多いです。「高い」は本当に価格の問題なのか、それとも価値が伝わっていないのか、決裁者が別にいるの\n\nか——ここを切り分けて次回の初回商談のトークスクリプトに反映します。</p>\n<p>反対処理集をNotionやスプレットシートなどに蓄積していくと、3ヶ月後には自社サービスの頻出反論TOP10が可視化されて、<strong>事前処理（先回りして不安を潰す）</strong>が組めるようになります。</p>\n<h3><strong>Step 3. 失注要因の分析はBANTのズレから逆算</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_556819ac.png\" alt=\"Step 3. 失注要因の分析はBANTのズレから逆算\" loading=\"lazy\"></figure>\n<p>失注・保留になった商談は、「なぜ失注したか」ではなく「BANTのどこがズレていたか」で分解します。感情論で「相性が悪かった」「タイミングが悪かった」と片付けると学びがゼロなので、必ず以下の4軸で振り返ります</p>\n<div class=\"ph-img\" data-near=\"Step 3. 失注要因の分析はBANTのズレから逆算\"></div>\n<p><strong>Budget（予算）のズレ</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_b2c3d894.png\" alt=\"Budget（予算）のズレ\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>そもそも商材単価に対して予算帯が合っていなかったか</li><li>予算があっても未来の見せ方が弱く「払う価値」として認識されなかったか</li><li>予算を使うタイミングと商談タイミングがズレていたか</li></ul>\n<div class=\"ph-img\" data-near=\"Step 3. 失注要因の分析はBANTのズレから逆算\"></div>\n<p><strong>Authority（決裁権）のズレ</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_75e10e7b.png\" alt=\"Authority（決裁権）のズレ\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>目の前の相手が決裁者ではなかったのに、決裁者に会う導線を作れなかったか</li><li>決裁プロセス（稟議・取締役会等）の確認を怠り、社内推進の武器を渡せなかったか</li></ul>\n<div class=\"ph-img\" data-near=\"Step 3. 失注要因の分析はBANTのズレから逆算\"></div>\n<p><strong>Needs（必要性）のズレ</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_de67fc14.png\" alt=\"Needs（必要性）のズレ\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>顕在ニーズに対応したが、潜在課題まで掘れずwant止まりだったか</li><li>提案内容のずれ</li><li>「困っている度合い」の見極めが甘く、温度感をあげられなかったか</li></ul>\n<div class=\"ph-img\" data-near=\"Step 3. 失注要因の分析はBANTのズレから逆算\"></div>\n<p><strong>Timeframe（導入時期）のズレ</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_26ca6a6a.png\" alt=\"Timeframe（導入時期）のズレ\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>導入時期が漠然としていたのに、こちらからデッドラインを設計できなかったか</li><li>競合検討期間・社内調整期間を織り込んだクロージング設計ができていなかったか</li></ul>\n<p>この4軸で振り返ると、「自分の失注の癖」が見えてきます。</p>\n<div class=\"ph-img\" data-near=\"Step 3. 失注要因の分析はBANTのズレから逆算\"></div>\n<h3><strong>Step 4. 次回アクションへの落とし込み</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_ff35c920.png\" alt=\"Step 4. 次回アクションへの落とし込み\" loading=\"lazy\"></figure>\n<p>最後に必ず以下3点を1行ずつメモします：</p>\n<ul class=\"docx-list\"><li>今回の商談で<strong>再現すべき良かった型</strong>（1つ）</li><li>次回必ず<strong>修正する悪い型</strong>（1つ）</li><li><strong>反対処理集に追加した新規パターン</strong>（1つ）</li></ul>", "cs/01": "<h3><strong>CS進行管理シートの使い方（最下部に添付）</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/cs_01_302b7216.png\" alt=\"CS進行管理シートの使い方\" loading=\"lazy\"></figure>\n<p>本カリキュラムでは、受講生の進捗管理・アップセル・クロスセルまでを一元管理するためのCSシートを配布しています。シートは6つのタブで構成されており、顧客管理マスタに情報を入力するだけで、ダッシュボード・今週のアクション・各集計が自動的に更新される設計になっています。</p>\n<div class=\"ph-img\" data-near=\"CS進行管理シートの使い方（最下部に添付）\"></div>\n<h4><strong>シート構成の全体像</strong></h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>シート名</strong></th><th><strong>役割</strong></th></tr></thead><tbody><tr><td>ダッシュボード</td><td>全顧客の状態をリアルタイムで俯瞰する</td></tr><tr><td>今週のアクション</td><td>今週対応すべき顧客を自動抽出する</td></tr><tr><td>顧客管理マスタ</td><td>すべての起点となるデータ入力シート</td></tr><tr><td>受講進捗</td><td>講義ごとの実施日・完了数を記録する</td></tr><tr><td>設定</td><td>商材・ヘルスルール・プルダウンを管理する</td></tr><tr><td>顧客一覧</td><td>担当者・商材の簡易一覧と郵送管理</td></tr></tbody></table></div>\n<h4><strong>01｜顧客管理マスタ — すべての起点</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/cs_01_1132ce87.png\" alt=\"01｜顧客管理マスタ — すべての起点\" loading=\"lazy\"></figure>\n<p>このシートがCSシート全体の中核です。ここに入力したデータが、ダッシュボード・今週のアクション・各集計にすべて自動反映されます。</p>\n<p><strong>入力項目と意味\n</strong>基本情報として、契約日・生徒名・法人or個人・商材名・契約金額・契約期間・営業担当・CS担当・リード流入経路・エリア・キックオフ日を入力します。</p>\n<p>受講進捗として、完了レッスン数と全レッスン数を入力すると、進捗ペース（実績÷期待）が自動計算されます。この進捗ペースは「契約期間に対する経過時間から算出した期待値」と実際の完了数を比較する仕組みのため、契約直後でも不当にリスク判定されません。</p>\n<p><strong>ヘルススコアの自動判定\n</strong>最終接触日と進捗ペースをもとに、以下の3段階でヘルススコアが自動的に付与されます。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>スコア</strong></th><th><strong>判定条件</strong></th><th><strong>意味</strong></th></tr></thead><tbody><tr><td>🟢 良好</td><td>進捗ペース80%以上 かつ 最終接触から14日以内</td><td>予定通り進んでいる</td></tr><tr><td>🟡 要注意</td><td>進捗ペース50%以上 かつ 最終接触から30日以内</td><td>少し遅れ・接触が空いている</td></tr><tr><td>🔴 リスク</td><td>上記以外</td><td>大幅な遅れ・長期未接触</td></tr></tbody></table></div>\n<p>このスコアを見ることで、どの受講生に今すぐ介入すべきかが一目でわかります。感覚値ではなく、データで優先順位を判断できるのがこのシートの最大のメリットです。</p>\n<p><strong>アップセル・クロスセルの推奨日\n</strong>契約日と設定シートの推奨日数設定をもとに、アップセル推奨日・クロスセル推奨日が自動計算されます。提案するタイミングを見逃さないよう、結果・金額・提案日の記録欄もあわせて管理します。</p>\n<p><strong>次回アクション管理\n</strong>次回アクションの内容と予定日を入力しておくと、今週のアクションシートに自動抽出されます。対応漏れを防ぐための仕組みです。</p>\n<div class=\"ph-img\" data-near=\"01｜顧客管理マスタ — すべての起点\"></div>", "cs/02": "<h4><strong>02｜ダッシュボード — 事業状態の俯瞰</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/cs_02_6758c3be.png\" alt=\"02｜ダッシュボード — 事業状態の俯瞰\" loading=\"lazy\"></figure>\n<p>顧客管理マスタの入力内容をもとに、以下の情報がリアルタイムで集計されます。</p>\n<p><strong>サマリー指標</strong> 契約顧客数・アクティブ顧客数・今月卒業予定数・リスク顧客数・今週要アクション数が一覧表示されます。週次のミーティングや日々の業務開始前にここを確認することで、事業全体の状態を素早く把握できます。</p>\n<p><strong>ヘルススコア分布</strong> 良好・要注意・リスク・未取得の件数と構成比が集計されます。リスク顧客の割合が高くなっていれば、CS対応のリソースを増やすか、フォロー施策を見直すサインです。</p>\n<p><strong>ステータス分布</strong> 新規・受講中・受講終盤・卒業・更新検討・継続契約・休会・解約・アップセル中・クロスセル中の件数と売上が集計されます。解約・休会が増えているタイミングで早期に検知し、原因分析に活用します。</p>\n<p><strong>アップセル・クロスセル進捗</strong> タイミング到来（未提案）・提案中・検討中・受注・失注の件数と金額が集計されます。「タイミング到来（未提案）」の件数が積み上がっている場合、提案機会を逃している状態です。今週のアクションシートと連動して、即対応に移してください。</p>\n<div class=\"ph-img\" data-near=\"02｜ダッシュボード — 事業状態の俯瞰\"></div>", "cs/03": "<h4><strong>03｜今週のアクション — 対応漏れをゼロにする</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/cs_03_33c24f36.png\" alt=\"03｜今週のアクション — 対応漏れをゼロにする\" loading=\"lazy\"></figure>\n<p>顧客管理マスタの「次回アクション予定日」が本日から14日以内の顧客、またはアップセル・クロスセルの推奨タイミングが到来している顧客が自動的にリストアップされます。</p>\n<p>毎週月曜日の業務開始時にこのシートを確認し、CS担当者ごとにタスクを割り振ることを推奨します。優先度・顧客名・商材・CS担当・ヘルススコア・ステータス・次回アクション内容・残日数が一覧で確認できるため、朝会やミーティングでそのまま使用できます。</p>\n<div class=\"ph-img\" data-near=\"03｜今週のアクション — 対応漏れをゼロにする\"></div>\n<h4><strong>04｜受講進捗 — 講義ごとの実施記録</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/cs_03_a07d52e3.png\" alt=\"04｜受講進捗 — 講義ごとの実施記録\" loading=\"lazy\"></figure>\n<p>顧客管理マスタの生徒名を選択し、キックオフ日と各講義（1〜8コマ）の実施日・備考を入力します。完了数は自動カウントされるため、その数値を顧客管理マスタの完了レッスン数欄に手入力することでヘルススコアに反映されます。録画URLや各回のメモも残せるため、CS担当者が変わった際の引き継ぎ資料としても機能します。</p>\n<div class=\"ph-img\" data-near=\"04｜受講進捗 — 講義ごとの実施記録\"></div>", "cs/04": "<h4><strong>05｜設定 — シート全体のルールを管理</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/cs_04_3f49ec73.png\" alt=\"05｜設定 — シート全体のルールを管理\" loading=\"lazy\"></figure>\n<p><strong>商材マスタ</strong> プランA〜Dの契約期間・標準契約金額・アップセル推奨日数・クロスセル推奨日数を設定します。ここを変更すると、顧客管理マスタの推奨日の計算に自動反映されます。自社のサービス構成に合わせて最初に設定してください。\n</p>\n<p><strong>ヘルススコア判定ルール</strong> 良好・要注意・リスクの判定閾値をここで変更できます。サービスの性質や受講期間に応じて、基準値を調整してください。\n</p>\n<p><strong>プルダウン候補</strong> ステータス・法人or個人・リード流入経路・アップセル結果・クロスセル結果・次回アクションの選択肢を管理します。自社の業務フローに合わせて追加・変更して使用してください。\n</p>\n<div class=\"ph-img\" data-near=\"05｜設定 — シート全体のルールを管理\"></div>\n<h4><strong>06｜顧客一覧 — 担当者と商材の簡易管理</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/cs_04_6de758eb.png\" alt=\"06｜顧客一覧 — 担当者と商材の簡易管理\" loading=\"lazy\"></figure>\n<p>月・連番・商材名・顧客名・営業担当者・メンター名・顧客シートURL・郵送管理・備考を管理するシートです。顧客管理マスタの詳細データとは別に、担当者アサインと郵送物の送付状況を一覧で確認するために使用します。</p>\n<div class=\"ph-img\" data-near=\"06｜顧客一覧 — 担当者と商材の簡易管理\"></div>\n<h4><strong>運用の基本フロー</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/cs_04_8e7f5e4f.png\" alt=\"運用の基本フロー\" loading=\"lazy\"></figure>\n<p><strong>日次</strong>：今週のアクションシートを確認し、当日対応が必要な顧客への連絡・フォローを実施。対応後は顧客管理マスタの最終接触日・次回アクションを更新する。\n</p>\n<p><strong>週次</strong>：ダッシュボードのヘルススコア分布とアップセル進捗を確認。リスク顧客が増加していれば原因を分析し、対応策を検討する。アップセル・クロスセルのタイミング到来顧客に対して提案を実施する。\n</p>\n<p><strong>月次</strong>：ステータス分布の変化（解約・休会の増減）を確認し、カリキュラムやサポート体制の改善要否を判断する。卒業予定顧客に対して更新・継続の提案を行う。\n</p>\n<div class=\"ph-img\" data-near=\"運用の基本フロー\"></div>\n<p>このシートは、CS業務を「なんとなく〜」から「データと仕組み」に移行させるためのツールです。入力の習慣さえ定着すれば、対応漏れの防止・アップセル機会の最大化・LTVの向上が自然と実現できる設計になっています。</p>\n<p>※コピーしてご使用ください\n</p>\n<p>CS管理_進行シート</p>", "legal/01": "<h4><strong>ルール1｜守秘義務と複製禁止</strong></h4>\n<p>本カリキュラムおよび付随する全シート・テンプレート・トークスクリプトは、加盟契約の範囲内でのみご利用いただけます。次の行為はお控えください。</p>\n<ul class=\"docx-list\"><li>第三者（加盟店スタッフを除く）への共有・転送・SNS投稿</li><li>加盟店事業以外への転用（別事業・別サービスでの利用）</li><li>内容を一部改変したうえで、自社オリジナルとして外部公開すること</li><li>AIへの学習素材としての提供（社内利用のAI壁打ちは問題ありません）</li></ul>\n<p>「自社のスタッフにどこまで共有してよいか」迷われたときは、遠慮なく本部にご確認ください。</p>", "legal/02": "<h4><strong>ルール2｜ブランド・商標の取扱</strong></h4>\n<p>「ウリボー」「URIBOH」「FORSPECT」の名称・ロゴ・実績数値を対外発信に使われる際は、事前に本部までひと声いただければと思います。SNS投稿・LP・営業資料での出典表記についても同様です。</p>", "legal/03": "<h4><strong>ルール3｜数値・実績の引用</strong></h4>\n<p>本カリキュラム内に登場する成約率・CVR・報酬テーブル・先行事例の数値は、FORSPECTおよび加盟店の実運用データに基づくものです。自社のLP・営業資料に転載される場合は、出典を明示いただくか、自社実績に置き換えてからお使いください。FORSPECTの数値を、ご自身の実績として記載することはお控えください。</p>", "legal/04": "<h4><strong>ルール5｜法令遵守</strong></h4>\n<p>本カリキュラムには特商法ページ・契約書・決済システム・取次店制度（紹介報酬）など、法令が関わる領域が含まれます。記載内容は実務の出発点であり、最終判断ではありません。次の領域は自社の顧問弁護士・税理士・行政書士に必ず確認してください。</p>\n<ul class=\"docx-list\"><li>特商法・景表法・薬機法・医療広告ガイドライン</li><li>契約書のクーリングオフ条項・解約条項</li><li>取次店への報酬支払（業務委託契約・源泉徴収・インボイス対応）</li><li>人材紹介を伴う場合の有料職業紹介事業許可</li></ul>", "legal/05": "<p>法務</p>\n<p>契約書など法務関連(LPへの特商法やプラポリなど)のカリキュラムになります。</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/legal_05_8237ac5b.png\" alt=\"契約書など法務関連\" loading=\"lazy\"></figure>\n<p>※最終的には必ず顧問弁護士やご自身の責任で進めていただけますと幸いです</p>\n<div class=\"ph-img\" data-near=\"運用の基本フロー\"></div>\n<p>契約書</p>\n<p>契約書と請求書業務は、基本的にマネーフォワードを無料契約することをお勧めします。</p>\n<p>顧客数や売上利益が増えてきたら、有料で月額定額を契約することをお勧めします。</p>\n<p>契約することによって、社内の財務管理であったり、契約書・請求書業務といったものが自動でクラウド管理できるため、決算であったり、事業の数字をまとめるようなところも楽になります。まずは無料で契約をしましょう。\n</p>\n<p>契約</p>\n<figure class=\"docx-figure\"><img src=\"img/image1.png\" alt=\"運用の基本フロー\" loading=\"lazy\"/><figcaption>運用の基本フロー</figcaption></figure>\n<p>契約書テンプレート</p>\n<p>※コピーして使用ください</p>\n<p>(法人様用)（サービス名）申込書兼利用書</p>\n<p>(個人様用)（サービス名）申込書兼利用書</p>\n<p>個人においてはクーリングオフが発生しますが、基本的に法人向けの場合は発生しないです。</p>\n<p><strong>また、個人のお客様には必ず御契約書の現物を電子で結んでいたとしてもコピーして郵送しましょう。</strong></p>\n<p><strong>現物が届いてからがクーリングオフの適用日開始となります。</strong></p>\n<p>請求書業務</p>\n<figure class=\"docx-figure\"><img src=\"img/image3.png\" alt=\"運用の基本フロー\" loading=\"lazy\"/><figcaption>運用の基本フロー</figcaption></figure>", "legal/06": "<h3><strong>特商法・クーリングオフについて</strong></h3>\n<p><strong>※HP/サービスページ記載用ーーーーーーーーーーーーーーー\n</strong></p>\n<p><strong>特定商取引法に基づく表記</strong></p>\n<p><strong>販売事業者名\n記載</strong></p>\n<p><strong>販売事業者所在地\n記載</strong></p>\n<p><strong>運営統括責任者\n記載</strong></p>\n<p><strong>ホームページ\nurl記載</strong></p>\n<p><strong>連絡先\n</strong>以下のフォームからお問い合わせください\n<strong>※HPで問題ないです</strong></p>\n<p><strong>販売価格帯\n</strong>商品ごとに表示された価格をご覧ください。</p>\n<p><strong>引渡方法\n</strong>商品ごとに表示された引渡日をご覧ください。</p>\n<p><strong>代金の支払時期および方法\n</strong>商品ごとに表示された支払時期および方法でお支払いください。</p>\n<p><strong>商品代金以外に必要な費用／送料、手数料\n</strong>消費税、受講に際して応じる通信の通信費、スマートフォンやPC等受講するための機材は自己負担となります。</p>\n<p><strong>申込の取消（クーリングオフ）\n</strong>申込書兼利用書等の契約書（以下、「本契約」といいます。）が特定商取引に関する法律の適用を受ける場合で、クーリングオフを行おうとする場合には、本書面の内容を十分に読んでください。特定商取引に関する法律の適用を受ける場合とは、訪問販売、電話その他による勧誘販売による取引の場合をいいます。1. 契約書等及び電子交付に関する真意に基づく承諾書の控えをユーザーが受領した日から換算して８日を経過するまでは、ユーザーは書面により本契約を解除（「クーリングオフ」といいます。）することができます。ただし次の場合にはクーリングオフの主張はできません。　① ユーザーが法人である場合やユーザーが本契約の目的を営業目的で利用する場合。　② ユーザーからの申請によりユーザーの自宅において本契約の申込み又は締結をした場合。　③ 商品を使用し又はその全部若しくは一部を消費したとき。2. 前項にかかわらず、当社が不実のことを告げたことによりユーザーが誤認をし、又は当社が脅迫したことによりユーザーが困惑し、これらによってユーザーがクーリングオフを行わなかった場合は、当社からクーリングオフ妨害の解消のための書面が交付され、その説明を受けた日から起算して8日が経過するまでは、ユーザーは、書面によるクーリングオフをすることができます。3. 第1項及び第2項の契約の解除は、ユーザーがクーリングオフに関わる書面を発したときにその効力を生じます。4. 第1項及び第2項の契約の解除があった場合、当社は、ユーザーに対し、その契約の解除に伴う損害賠償又は違約金の支払を請求することはできません。5. 第1項及び第2項の契約の解除があった場合、既に本契約に基づき役務が提供されたときにおいても、当社はユーザーに対し、本契約に係る役務の対価その他の金銭の支払を請求することができません。6. 第1項及び第2項の契約の解除があった場合、本契約に関連して金銭を受領しているときは、当社は、ユーザーに対し、速やかに、その全額を返還します。7. 第1項及び第2項の契約の解除があった場合、既に商品等の引渡しが行われているときは、その取引に要する費用は当社の負担とします。\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n</p>", "line/01": "<h3>LINE公式アカウントの開設手順</h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/line_01_f45d193b.png\" alt=\"LINE公式アカウントの開設手順\" loading=\"lazy\"></figure>\n<p>この導線では、LINEアカウントを2つご使用いただきます。まず両方のアカウントを開設してください。LINE公式アカウントは無料プラン（コミュニケーションプラン：月200通まで無料）からお始めいただけます。</p>\n<h4>STEP 1：LINE公式アカウントを作成する</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/line_01_07114656.png\" alt=\"STEP 1：LINE公式アカウントを作成する\" loading=\"lazy\"></figure>\n<p>LINE①とLINE②は必ず別のアカウントとして作成してください。名前を変えるだけでなく、独立した2つのLINE公式アカウントとして運用するようにしてください。</p>\n<h4>STEP 2：あいさつメッセージの設定</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/line_01_138fb9ce.png\" alt=\"STEP 2：あいさつメッセージの設定\" loading=\"lazy\"></figure>\n<p>友だち追加時に自動送信されるメッセージです。第一印象を決める最重要メッセージになりますので、丁寧に設定するようにしてください。</p>\n<p><strong>LINE①（本陣）のあいさつ</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/line_01_1cfe0fb4.png\" alt=\"LINE①（本陣）のあいさつ\" loading=\"lazy\"></figure>\n<p>目的：登録への感謝 ＋ 自己紹介 ＋ 普段の配信内容の予告</p>\n<p>例文テンプレート：</p>\n<p>「友だち追加ありがとうございます！◯◯（名前）です。このLINEでは ✅ ここでしか話せない裏話 ✅ セミナーや企画のご案内 ✅ 限定プレゼント をお届けしております！まずは一言、スタンプでも「見てます」でも構いませんので、送っていただけますと嬉しいです🙏」</p>\n<p><strong>LINE②（セミナー用）のあいさつ</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/line_01_1acdac49.png\" alt=\"LINE②（セミナー用）のあいさつ\" loading=\"lazy\"></figure>\n<p>目的：セミナー参加への導線 ＋ 申し込みフォームのご案内</p>\n<p>例文テンプレート：</p>\n<p>「セミナー専用LINEへのご登録ありがとうございます！🎉 セミナーにご参加いただくには、以下の手順で進めてください👇 ①下記リンクより申し込みフォームをご入力ください ②教育動画をご視聴ください（約◯分） ③セミナー当日にZOOMにてご参加ください ▼申し込みフォームはこちら [リンク]」</p>\n<h4>STEP 3：リッチメニューの設定</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/line_01_e3564e94.png\" alt=\"STEP 3：リッチメニューの設定\" loading=\"lazy\"></figure>\n<p>トーク画面下部に常時表示されるメニューです。LINE公式アカウント管理画面の「リッチメニュー」から作成してください。</p>\n<ul class=\"docx-list\"><li>LINE①のリッチメニュー例：自己紹介ページへのリンク／お客様の声・実績まとめ／最新セミナー情報／Instagram・その他SNSリンク</li><li>LINE②のリッチメニュー例：申し込みフォームリンク／教育動画視聴ページ／セミナー日程確認／よくある質問</li></ul>\n<h4>STEP 4：応答設定</h4>\n<p>LINE公式アカウント管理画面の「設定」→「応答設定」にて、以下の内容を設定してください。</p>\n<table><thead><tr><th>設定項目</th><th>LINE①</th><th>LINE②</th></tr></thead><tbody><tr><td>応答モード</td><td>チャット（手動返信可能に）</td><td>チャット（手動返信可能に）</td></tr><tr><td>あいさつメッセージ</td><td>ON（STEP2で設定した内容）</td><td>ON（STEP2で設定した内容）</td></tr><tr><td>応答メッセージ</td><td>OFF推奨（手動対応メイン）</td><td>ON（セミナー関連の自動応答を設定）</td></tr></tbody></table>\n<p>LINE②の自動応答キーワード例としては、「申し込み」→ フォームリンクを自動返信、「動画」→ 教育動画リンクを自動返信、「日程」→ セミナー日程を自動返信、といった設定が挙げられます。よくいただくご質問をキーワード応答で自動化しておくことで、運用の負荷を大幅に下げることができます。</p>\n<h4>STEP 5：InstagramとLINE①を連携する</h4>\n<p>Instagramのプロフィールおよびストーリーズのリンクスタンプから、LINE①へ流入する導線を設置してください。教育完了後のCTAで「LINE追加をしてください」とご案内する形が基本となります。</p>", "line/02": "<h3>なぜLINEを2アカウント運用するのか</h3>\n<p>LINE①からいきなりセールスを行わないようにしてください。LINE①はリスト集約の場として位置付け、セールス色の強い配信はLINE②に集約するようにしてください。LINE①でセールスを行うと、アカウントのBAN（利用停止）とフォロワー離脱の両方のリスクが発生します。</p>\n<h4>ファネル全体像（基本フロー）</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/line_02_f5795cfd.png\" alt=\"ファネル全体像（基本フロー）\" loading=\"lazy\"></figure>\n<p>Instagram → LINE①追加 → LINE②へ誘導 → 申込フォーム → 教育動画 → ZOOMセミナー → クロージング、という流れで設計します。LINE①は集めたリスト全員に対して情報配信を行うベース、LINE②はセミナーに興味を持った濃いリストにのみセールス情報を配信する場、という役割分担です。</p>\n<h4>分岐ロジック（反応なしへの対応）</h4>\n<p>すべての方がストレートに進むわけではありません。「反応なし」の層に対して繰り返しアプローチする分岐が、この導線の最も重要なポイントになります。LINE①での再呼びかけ、LINE②に追加済みかつ未申込の層への再送信、未視聴の層への教育動画再案内など、各段階で必ず再アプローチを設計してください。</p>\n<h3>LINE配信メッセージの設定テンプレート</h3>\n<p>各段階で配信するメッセージのテンプレートをご用意しておりますので、ご活用ください。</p>\n<h4>LINE①：セミナー呼びかけメッセージ（初回）</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/line_02_cd1406ad.png\" alt=\"LINE①：セミナー呼びかけメッセージ（初回）\" loading=\"lazy\"></figure>\n<p>「こんにちは！◯◯です。突然ではございますが、今「◯◯（悩み）」でお困りではありませんか？実は今度、少人数限定で【◯◯セミナー】を開催いたします💡 このセミナーでは ✅ ◯◯の具体的な解決方法 ✅ 実際に◯◯を達成された方の事例 ✅ あなただけの◯◯プラン作成 をお伝えいたします。ご興味のある方は「参加したい」とご返信ください。」</p>\n<h4>LINE①：再呼びかけメッセージ（反応なしの方向け）</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/line_02_aa142eba.png\" alt=\"LINE①：再呼びかけメッセージ（反応なしの方向け）\" loading=\"lazy\"></figure>\n<p>「◯◯です！先日ご案内いたしました【◯◯セミナー】ですが、おかげさまで残り◯席となりました。前回ご参加いただいた方からは「もっと早く聞いておきたかった」というお声を多数いただいております✨ ◯月◯日（◯）開催です。ご興味がございましたら、お気軽にメッセージをお送りください！」</p>\n<h4>LINE②：教育動画案内メッセージ</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/line_02_a59ca68c.png\" alt=\"LINE②：教育動画案内メッセージ\" loading=\"lazy\"></figure>\n<p>「お申し込みいただきありがとうございます！🎉 セミナー当日をより充実していただけるよう、【事前動画】をご用意いたしました📹 ▼こちらからご視聴いただけます [動画リンク] 約◯分の動画となっております。セミナー前に必ずご視聴いただくようお願いいたします！ご視聴いただきましたら「見ました！」とお送りいただけますと幸いです。」</p>\n<h3>セミナー導線の設計ポイントまとめ</h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/line_02_67a5f654.png\" alt=\"セミナー導線の設計ポイントまとめ\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li><strong>LINE①への集客：</strong>Instagramプロフィールおよびストーリーズのリンクスタンプからご誘導ください。教育完了後のCTAで「LINE追加をしてください」とご案内する形が基本となります。</li><li><strong>セミナーの呼びかけ：</strong>LINE①にて定期配信を行い、ご興味を持っていただいた方にLINE②をご案内します。反応がなかった方に対しては、時間を空けた上で再呼びかけを行ってください。</li><li><strong>LINE②→申込→教育動画：</strong>LINE②への追加→フォームのご入力→教育動画のご視聴という流れで進めていただきます。こちらでも反応がなかった方には再呼びかけを実施してください。</li><li><strong>ZOOMセミナー→クロージング：</strong>教育動画で事前の理解を深めていただいた上でZOOMセミナーを開催し、当日クロージングを行う流れとなります。</li></ul>", "line/03": "<h3>ローンチ前の教育設計（2〜4週間前から）</h3>\n<p>ローンチは「当日の打ち上げ花火」ではなく、2〜4週間前からの教育で作ります。Instagram・LINE①での情報発信を通じて見込み客の温度感を上げ、当日のCTAを受け取れる状態に整えていきます。</p>\n<h4>ローンチ前チェックリスト</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/line_03_8434aa43.png\" alt=\"ローンチ前チェックリスト\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>教育7ステップの①〜⑥が一通り完了しているかご確認ください</li><li>LINE①の登録者数が目標値に達しているかご確認ください</li><li>LINE②の準備が完了しているかご確認ください</li><li>申し込みフォーム・教育動画が完成しているかご確認ください</li><li>ZOOMセミナーの日程・内容が確定しているかご確認ください</li></ul>\n<h3>ローンチ当日の動き</h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/line_03_ce88e82c.png\" alt=\"ローンチ当日の動き\" loading=\"lazy\"></figure>\n<h4>朝：リマインド</h4>\n<p>「今日の夜、重要なお知らせをいたします」といった内容のストーリーズを投稿し、期待感を高めておいてください。</p>\n<h4>夕方〜夜：セールスストーリーズ投下</h4>\n<p>共感→問題提起→解決策→証拠→限定感→CTAの流れで、5〜8本の糸を構成して投稿してください。CTAはLINE追加へのご案内となります。</p>\n<h4>CTA後：DM対応</h4>\n<p>お送りいただいたDMには即座にご返信ください。ご質問や不安点に丁寧にお答えすることが、最後の一押しになります。</p>\n<h3>ローンチ後のフォロー</h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/line_03_4ab856e5.png\" alt=\"ローンチ後のフォロー\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li><strong>LINE①で再呼びかけ：</strong>初回に反応がなかった層に対して、時間を空けた上で再配信を行ってください（分岐ロジックに沿って対応）。</li><li><strong>LINE②で再呼びかけ：</strong>LINE②に追加済みではあるものの未申込の方に対して、再送信を行ってください。</li><li><strong>参加者フォロー：</strong>未購入の方にはDMで個別フォローを行い、ご購入いただいた方には感謝のDMをお送りした上で口コミの回収を行ってください。</li><li><strong>成果をシェア：</strong>セミナーの様子や参加者の感想をストーリーズでシェアしてください。次回開催への伏線として活用することができます。</li></ul>\n<p>ローンチは1回で終わりではありません。<strong>教育→ローンチ→分析→改善→再教育</strong>のサイクルを継続的に回し続けることが重要です。</p>", "line/04": "<h3>LINE導線チェックリスト</h3>\n<p>ローンチ前に必ず通過していただく確認項目です。1つでも漏れがある状態でローンチを迎えると、想定どおりの数字が出ないリスクがあります。</p>\n<ul class=\"docx-list\"><li>LINE①（本陣）のアカウント開設・プロフィール設定が完了しているか</li><li>LINE②（セミナー用）のアカウント開設・プロフィール設定が完了しているか</li><li>LINE①のあいさつメッセージが設定されているか</li><li>LINE②のあいさつメッセージが設定されているか</li><li>LINE②のキーワード自動応答が設定されているか</li><li>リッチメニューが作成・設定されているか</li><li>InstagramプロフィールリンクがLINE①に設定されているか</li><li>セミナー呼びかけ配信テンプレートが作成されているか</li><li>再呼びかけメッセージのテンプレートが作成されているか</li><li>申し込みフォームの作成・動作テストが完了しているか</li><li>教育動画のアップロード・配信設定が完了しているか</li><li>ZOOMセミナーの日時・内容が確定しているか</li></ul>", "shodan/05": "<h3><strong>反対処理（Q&A集）</strong></h3>\n<p><strong>※ 随時更新していきましょう。貴社のサービスに合わせて変更してください。</strong></p>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">講義時間30分で学べるんですか？</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">可能。なぜかというと〇〇さんはこうなどコンサルではなくノウハウの提供の為。そのために質疑応答し放題にしている。</div></div></div>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">自信がない・できる気がしない</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">従来の他社スクールだと独学スタイルなので気持ちはわかるが、弊社の場合は専属の講師がつくので誰もがきちんと学べる。</div></div></div>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">検討したい</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">いつ返事もらってももちろんOKだが、内容次第ではやらない方がいい。なぜかというと検討はやらない理由しか考えないし、費用を出すにも受講するのも自分。費用をパートナーや会社が出す場合はもちろん相談した方がいい。</div></div><div class=\"qa-note\">→ 引きトークです。「ガンガン買ってください」より引いた方が購入欲が高まります。</div></div>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">結果はちゃんと出るのかどうか</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">自分次第、やれば成果は出ます。伸び方は行動量次第。</div></div><div class=\"qa-note\">→ 「絶対」という言葉は合理的でなく、絶対は存在しないので使用しないように気をつけてください。受注したいがためにその言葉を使うと、CSで顧客にずっとそのことを言われる可能性があり、自身の首を締めます。</div></div>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">分割できるか？</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">クレカであればご自身で設定は必要だが可能。現金の場合は受講前半額、月内末残りの2分割なら可能。</div></div><div class=\"qa-note\">→ 分割は多くなればなるほど、追いかけのコストがかかります。</div></div>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">実績は後ほど送ってもらえるか</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">NDAの都合上送ることはできないが、この場で画面共有でお見せすることは可能（実績は別シート参照）。</div></div><div class=\"qa-note\">→ お任せします。</div></div>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">なぜ自分？</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">「あなたならできる」を、今までの会話の中で探してあてる。</div></div><div class=\"qa-note\">→ 泥臭さ、ビジュアル、ブランディング力など、その人の強みを当ててください。</div></div>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">誰が講師やるの？</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">講師になる方の背景や、あなたでなくても成立する理由を語りましょう。</div></div><div class=\"qa-note\">※ 社長自身で行う分には問題ございません。</div></div>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">〇〇も教えてくれるの？</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">サービス外のことを教えてくれと言われた場合 → 基本的にはNo。</div></div></div>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">コンサルみたいなアドバイスも可能？</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">Yes or No（提供範囲に応じて判断）。</div></div></div>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">どれくらい〇〇になる？（売上や定量指標）</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">行動量次第。急激な伸びは広告とは違うので起こりづらい。行動量を担保することが必要。ただ、むやみやたらでは意味がないので、学びながら量も担保していきましょう。</div></div></div>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">伸びなかったら返金可能？</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">不可。</div></div></div>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">会社概要ありますか？</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">URL（サイト）でご案内。</div></div></div>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">携帯でも可能？</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">可能。</div></div></div>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">教材・営業資料はもらえる？</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">営業資料は送付不可。教材も「あとで見たらいい屋」になるので送っていない。過去に受講生と知的財産権の関連でもめてしまったこともあるため。</div></div></div>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">進め方は？</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">契約書の締結 → ご入金＆グループ制作 → 受講開始。</div></div></div>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">タイミングが今じゃない気がする</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">いつでもいいと思うが後発は不利。急激な伸びは広告とは違うので、先発組を超すには相当の量が必要。全体の2割しかまだ動いていない今がチャンス。</div></div><div class=\"qa-note\">※ 「今じゃない」という人は、ずっと同じことを言い続けます。</div></div>\n<div class=\"qa-item\"><div class=\"qa-q\"><span class=\"qa-label qa-label--q\">Q</span><div class=\"qa-text\">時間がない</div></div><div class=\"qa-a\"><span class=\"qa-label qa-label--a\">A</span><div class=\"qa-text\">週1講義時間30分もとれない？ そんな人は存在しない。やらない理由を言い訳しているだけ。そういった方は伸びないので、やらない方がいい。</div></div><div class=\"qa-note\">（言い方はオブラートに）</div></div>", "shodan/06": "<h3><strong>受注後のフロー</strong></h3>\n<p><strong>01｜受注後の書類対応</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_a646adac.png\" alt=\"01｜受注後の書類対応\" loading=\"lazy\"></figure>\n<p>受注後に必要な書類手続きの目的と手順を理解し、確実に実行できるようになります。</p>\n<p>【解説】</p>\n<p>toc（個人への直接販売）が発生した場合、契約の透明性と法的保護のために、現物の契約書を必ず郵送にてお送りする必要があります。この手続きは他のタブにも明記されていますが、受注のたびに確実に実施してください。</p>\n<p>【実施手順】</p>\n<ul class=\"docx-list\"><li>　・現物の契約書を準備する</li><li>　・郵送にてお客様へ発送する</li><li>　・CS進行シートに受注結果を記載し、CSへ連携する</li></ul>\n<p>CS進行シートの活用方法の詳細は、CSの管理マニュアルタブをご確認ください。シートへの記載はCS連携の起点となる重要な作業です。</p>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p><strong>02｜クーリングオフと受注後フロー 要注意</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_6d13d0f0.png\" alt=\"02｜クーリングオフと受注後フロー 要注意\" loading=\"lazy\"></figure>\n<p>クーリングオフの仕組みを理解し、受注後のお客様対応において離脱リスクを最小化できるようになります。</p>\n<p>【解説】</p>\n<p>スクール事業においては、法律上クーリングオフの権利がお客様に認められています。そのため、受注後のフローは売上を守る上で最も重要なプロセスのひとつです。特に、その場のテンションで契約を決定されたお客様は、冷静になった後に心が離れやすい傾向があります。契約書の存在だけでお客様の継続を担保することはできません。「契約書がすべてではない」という認識を常に持ってください。</p>\n<p>受注後にコミュニケーションを怠ると、支払いの滞納・連絡不通・解約申請が増加します。コミュニケーションコストが高くなる前に、最初の段階で必ず手を打ってください。</p>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p><strong>03｜キックオフミーティングの設計</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_c1779bff.png\" alt=\"03｜キックオフミーティングの設計\" loading=\"lazy\"></figure>\n<p>受注後2日以内にキックオフミーティングを設定・実施し、お客様のモチベーションと継続意欲を高められるようになります。</p>\n<p>【実施ルール】</p>\n<ul class=\"docx-list\"><li>　・受注後2日以内にキックオフミーティングを設定する（絶対厳守）</li><li>　・お客様の目標を具体的にヒアリングし、目標設計を行う</li><li>　・サービスの全体像・進め方を具体的に説明する</li><li>　・次回アクションを明確に設定し、お客様が動き出せる状態をつくる</li></ul>\n<p>【キックオフで達成すること】</p>\n<ul class=\"docx-list\"><li>　・モチベーションの維持・向上</li><li>　・目標と期待値の明確化</li><li>　・「このサービスに入ってよかった」という安心感の醸成</li><li>　・心が離れない関係性の初期構築</li></ul>\n<p>キックオフは「サービスの説明会」ではなく、「お客様の未来を一緒に描く場」として設計してください。最初の接点の質が、その後の継続率・支払い率に直結します。</p>", "shodan/07": "<h3><strong>アップセル/クロスセルについて</strong></h3>\n<p><strong>アップセル／クロスセルとは？</strong></p>\n<p><strong>アップセル vs クロスセル ― 定義と違い</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_25ecee9a.png\" alt=\"アップセル vs クロスセル ― 定義と違い\" loading=\"lazy\"></figure>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th>&nbsp;</th><th><strong>アップセル</strong></th><th><strong>クロスセル</strong></th></tr></thead><tbody><tr><td>目的</td><td>より上位・高価格のものに変更していただく</td><td>関連する別商品・サービスを追加購入していただく</td></tr><tr><td>方向</td><td>縦（グレードアップ）</td><td>横（品揃え拡大）</td></tr><tr><td>タイミング</td><td>購入前〜購入時</td><td>購入時〜購入後</td></tr></tbody></table></div>\n<p><strong>具体例</strong></p>\n<p>飲食店 ・アップセル：「Mサイズにしますか？Lサイズは+100円です」 ・クロスセル：「ドリンクはいかがですか？」</p>\n<p>サブスク ・アップセル：ベーシックプランの顧客に「プロプランなら機能が3倍です」とご提案する ・クロスセル：会計ソフトの顧客に「給与計算オプションもございます」とご提案する</p>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p><strong>1顧客からどれだけの売上を獲得できるか？</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_e9d71129.png\" alt=\"1顧客からどれだけの売上を獲得できるか？\" loading=\"lazy\"></figure><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_84283358.png\" alt=\"1顧客からどれだけの売上を獲得できるか？（続き）\" loading=\"lazy\"></figure>\n<p>この考え方はスクールに限った話ではありませんが、非常に重要な項目です。</p>\n<p>1つの商品のみでは売上に限界が生じてしまいます。そのため、現在の商品よりグレードアップした上位商材や、クロスセルできる関連商材を揃えておくことで、1顧客に対して提供できる価値が広がり、1年以上を見据えたロードマップを設計することができます。結果として、新規集客への依存度を下げることにつながります（前提として集客は継続していきます）</p>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p>8割以上の事業者が新規顧客の開拓にコミットしていますが、最も早く売上を上げる方法は既存の成果が出ている顧客への営業です。改めて一から信頼を構築する必要がなく、クレームも起きにくく、関係性もすでに構築されているという点が、既存顧客への営業の大きなメリットになります。</p>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p><strong>アップセル・クロスセルの設計について</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_7fd0bbef.png\" alt=\"アップセル・クロスセルの設計について\" loading=\"lazy\"></figure><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_714fa845.png\" alt=\"アップセル・クロスセルの設計について（続き）\" loading=\"lazy\"></figure>\n<p>アップセル営業を行う際は、さらに高額の商材をご提案することになるため、失注確率が上がる可能性があります。その際に備えて、失注した場合の補填として機能するクロスセル商材もあわせて準備しておくことを徹底してください。</p>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p>「やりたいけれど金額的に難しい」という金銭的な理由による失注は、クロスセル商材で補填することが可能です。金銭的な理由が本音であれば、より低価格の商材であれば購入していただける可能性があります。</p>\n<p>なお、金銭的なネックをしっかりとヒアリングで把握し処理できる場合は、アップセル商材での成約も十分に可能です。どの販売方法を採用するかは、商材や事業者様の状況によって異なります。</p>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p>以下にいくつかの例をご紹介します。</p>\n<ul class=\"docx-list\"><li><strong>①SNS系の例</strong></li></ul><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_2ed6c313.png\" alt=\"①SNS系の例\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\">\n<li><strong>フロント商材</strong>：49,800円のSNS運用教科書</li>\n<li>↓（アップセル）</li>\n<li><strong>エンド商材</strong>：498,000円のスクール</li>\n</ul><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_b85f642b.png\" alt=\"②エンド商材の例\" loading=\"lazy\"></figure>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<ul class=\"docx-list\"><li><strong>②サロン系の例</strong></li></ul><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_8f5cab81.png\" alt=\"②サロン系の例\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\">\n<li><strong>フロント商材</strong>：3時間2,000円のネイル講師ワークショップ</li>\n<li><strong>クロスセル①</strong>：ネイル系物販／ネイルサロン</li>\n<li><strong>クロスセル②</strong>：無料コミュニティ</li>\n<li>↓（アップセル）</li>\n<li><strong>エンド商材</strong>：498,000円のスクール</li>\n</ul>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p>また、最初から高額商材を販売した後に、ダウンセルするという方法もあります。コンサルティング→月額コミュニティへの移行、といったイメージです。</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_3aad0e43.png\" alt=\"ダウンセル\" loading=\"lazy\"></figure>\n<p>サービスを設計する段階で、商品を1つだけでなく複数持っておく準備をしておくことが理想です。各商品のコンテンツ内容まであらかじめ構想しておけると、さらに理想的です。</p>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p><strong>商品の考え方</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_e4dc8654.png\" alt=\"商品の考え方\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>フロント商材の例 ・教科書 ・コミュニティ ・ワークショップ（WS） ・動画コンテンツ ・有料相談 など</li></ul>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<ul class=\"docx-list\"><li>エンド商材の例 ・スクール ・コンサルティング ・コミュニティ ・グループコンサル など</li></ul>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p>フロント商材を間に挟む目的は、エンド商材を販売するための教育という側面もあります。この概念を持たずに販売を進めている事業者も存在しますが、意識しておくことで成約率に大きな差が生まれます。</p>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p><strong>タイミングについて</strong></p>\n<p><strong>アップセルのタイミング</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_66f72450.png\" alt=\"アップセルのタイミング\" loading=\"lazy\"></figure>\n<p>最初にご提案したサービスが終了する1週間前に、顧客に60〜90分のミーティング時間をいただき、クロージングを行ってください。</p>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p><strong>クロスセルのタイミング</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_30609c8b.png\" alt=\"クロスセルのタイミング\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>アップセルと同じタイミングで実施する方法と、②新しい商材が完成した際に既存顧客へ一斉にご案内する方法の2種類があります。</li><li>を実施する際は、いきなりご案内するのではなく、「こういったものを現在制作しています。その理由は〜」という形で、顧客と接触するたびにコミュニケーションを重ねていってください。そうすることで、顧客は「○○がいつ頃完成する」ということをあらかじめ把握した状態になります。</li></ul>\n<p>ご案内の際は、営業トーンで話すことは避けてください。以下の4つの観点を意識して伝えるようにしてください。</p>\n<ul class=\"docx-list\"><li>Why（なぜ開発中なのか？機能的な背景） ・Who（誰の要望で作っているのか？） ・Vision（どのような大義があるのか？） ・Achievements（似たような実績はあるか？）</li></ul>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p><strong>具体的なトーク例</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_3e9ae350.png\" alt=\"具体的なトーク例\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li><strong>▼ 導入（Why：なぜ今開発中なのか）</strong></li></ul>\n<p>「実はいま、○○さんのような受講生からいただいたフィードバックをもとに、新しいサービスを制作しております。スクールで学んでいただいて知識はついてきていると思うのですが、正直『では実際に使いこなせているか』と聞かれると、そこに壁を感じていらっしゃる方が多くて。その部分を埋めるためのサービスです。」</p>\n<ul class=\"docx-list\"><li><strong>▼ 背景（Who：誰の要望で作っているか）</strong></li></ul>\n<p>「これは外部からのアイデアではなく、うちのスクール生が『ここが足りない』とおっしゃっていたことをそのまま形にしているんです。実際に受講してくださった方の声を聞いていると、インプットはできた、でも現場で使えないとおっしゃる方が多くて。だからそこに特化して制作しております。」</p>\n<ul class=\"docx-list\"><li><strong>▼ 大義（Vision：何のために作っているか）</strong></li></ul>\n<p>「正直に申し上げると、スクールというのは知識を増やすことは得意なんです。ただ、私が本当に目指しているのは、学んだ方が実際に稼げるようになることでして。学んで終わりではなく、ちゃんと結果まで出せる方を増やしたいという想いで動いております。」</p>\n<ul class=\"docx-list\"><li><strong>▼ 実績（Achievements：似た事例・信頼の根拠）</strong></li></ul>\n<p>「似たような形でサポートさせていただいた方でいうと、○○さんという方がいらっしゃって、スクール卒業後に個別で伴走させていただいたところ、3ヶ月で月30万円の案件を獲得できるようになったんです。まだすべての方に提供できているわけではないのですが、取り組んだ方の結果がよかったので、きちんとサービス化しようと思って現在動いております」</p>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p>このトークをローンチの約1.5ヶ月前から開始し、PRを進めていってください。事前にコミュニケーションを積み重ねておくことで、顧客側の「営業された」という心理的なハードルを下げることができます。結果として、いざご提案する際の話しやすさが大きく変わります。</p>", "shodan/08": "<h3><strong>リスト管理について</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_f7d00563.png\" alt=\"リスト管理について\" loading=\"lazy\"></figure>\n<p><strong>リスト管理について</strong></p>\n<p>リストは必ず商談進捗シートに記録を残すようにしてください。商談は確率論をいかに高めるかのゲームであるため、失注の割合の方が通常は多くなります。</p>\n<p>現時点での失注は要因によりますが、〜12ヶ月後に再アプローチが可能になります。実際に弊社の受注顧客の3割は、過去の失注リストへの再アプローチによるものです。</p>\n<p>いつ再アプローチするかは、失注理由によって異なります。そのため、どのような流入経路からであっても、一度営業・打ち合わせを行い、関係性を持った上で商品を販売するという行為は、リスト化のためにも必要な作業です。 ※情報交換目的のアポイントは基本的にNGとしてください。\n</p>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p><strong>失注リストへの再アプローチについて</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_ca1947e1.png\" alt=\"失注リストへの再アプローチについて\" loading=\"lazy\"></figure>\n<p>以下の点を理解した上で、再アプローチを進めてください。</p>\n<ul class=\"docx-list\"><li>決裁者＝本人であるため、本人の状況が変われば即受注に転じる可能性があります</li><li>競合は「他社」ではなく「迷い・不安・先延ばし・家族の反対」であることが多いです</li><li>失注直後の感情（気まずさ・断った罪悪感）が落ち着く時期を見極める必要があります</li><li>toC（個人向け）のお客様は「感情の温度」で意思決定されるため、関心が冷め切る前・熱が戻ったタイミングを逃さないことが重要です</li></ul>\n<p>弊社受注顧客の3割が失注リストからの再アプローチ経由であるという事実は、「toCのお客様は一度断られても、状況が整えば購入意思がある」ことを示しています。</p>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p><strong>失注理由別 再アプローチ定義表</strong></p>\n<div class=\"loss-grid\">\n<div class=\"loss-card\">\n  <div class=\"loss-card__head\">\n    <span class=\"loss-card__num\">①</span>\n    <div class=\"loss-card__title\">お金がない・分割NG</div>\n    <span class=\"loss-card__time loss-card__time--urgent\">3ヶ月後</span>\n  </div>\n  <div class=\"loss-card__body\">\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">断り文句</span><p>「今はお金がなくて」「支払いが厳しい」</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">理由</span><p>給与・賞与のサイクル（四半期）、生活費の見直しタイミングで状況が変わります。信販審査が通らなかった方も3ヶ月で与信情報が更新されます。</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">切り口</span><p>「新しい分割プランができました」「キャンペーン価格のご案内」「別件でお話しがありまして〜」</p></div>\n  </div>\n</div>\n<div class=\"loss-card\">\n  <div class=\"loss-card__head\">\n    <span class=\"loss-card__num\">②</span>\n    <div class=\"loss-card__title\">家族・パートナーの反対</div>\n    <span class=\"loss-card__time loss-card__time--mid\">3〜6ヶ月後</span>\n  </div>\n  <div class=\"loss-card__body\">\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">断り文句</span><p>「夫（妻・親）に反対された」「相談したらダメと言われた」</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">理由</span><p>家族の反対理由は「急すぎる」「金額が高い」「怪しい」のいずれか。時間の経過で本人の意思が固まり、家族を説得できる状態になります。</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">切り口</span><p>「ご家族と一緒にご覧いただける無料説明会」「ご家族説明用の資料」「別件でお話しがありまして〜」</p></div>\n  </div>\n</div>\n<div class=\"loss-card\">\n  <div class=\"loss-card__head\">\n    <span class=\"loss-card__num\">③</span>\n    <div class=\"loss-card__title\">迷い・決めきれない</div>\n    <span class=\"loss-card__time loss-card__time--short\">2週間〜1ヶ月後 / 4ヶ月後</span>\n  </div>\n  <div class=\"loss-card__body\">\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">断り文句</span><p>「もう少し考えます」「即決できないタイプで」</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">理由</span><p>toCで最も多い失注理由。感情のピークが冷め切る前に再接触しないと、他のことに気を取られて検討自体がなくなります。</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">切り口</span><p>改めて時間をいただき「○○様向けのプランを作成しましたので、もう一度お時間をいただけますか」</p></div>\n  </div>\n</div>\n<div class=\"loss-card\">\n  <div class=\"loss-card__head\">\n    <span class=\"loss-card__num\">④</span>\n    <div class=\"loss-card__title\">タイミングが悪い（多忙・繁忙期）</div>\n    <span class=\"loss-card__time loss-card__time--urgent\">3ヶ月後</span>\n  </div>\n  <div class=\"loss-card__body\">\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">断り文句</span><p>「今は仕事が忙しくて」「子どもが小さくて」「○○で手が離せない」</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">理由</span><p>繁忙期・家庭事情は3ヶ月単位で変化。落ち着いた頃の再接触で「覚えていてくれた」という好印象にもつながります。</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">切り口</span><p>「あれから落ち着かれましたか」と近況確認から入り、別プランや別件の話に会話をずらしながらアポイントを取得</p></div>\n  </div>\n</div>\n<div class=\"loss-card\">\n  <div class=\"loss-card__head\">\n    <span class=\"loss-card__num\">⑤</span>\n    <div class=\"loss-card__title\">他社サービス検討中・申込済</div>\n    <span class=\"loss-card__time loss-card__time--mid\">3〜6ヶ月後</span>\n  </div>\n  <div class=\"loss-card__body\">\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">断り文句</span><p>「他のスクールを見ている」「別のところに申し込んだ」</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">理由</span><p>他社サービスは3〜6ヶ月で効果実感の有無がはっきり。「思ったほど成果が出ない」タイミングでご連絡が来る確率が高いです。</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">切り口</span><p>「その後、成果は出ていますか」という現状の無料診断という名目でアポイントを取得</p></div>\n  </div>\n</div>\n<div class=\"loss-card\">\n  <div class=\"loss-card__head\">\n    <span class=\"loss-card__num\">⑥</span>\n    <div class=\"loss-card__title\">必要性を感じない・緊急度低</div>\n    <span class=\"loss-card__time loss-card__time--long\">6ヶ月後</span>\n  </div>\n  <div class=\"loss-card__body\">\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">断り文句</span><p>「今すぐじゃなくていい」「まだ困っていないので」</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">理由</span><p>本人が「困った」と実感するには時間が必要。半年で状況が悪化している可能性が高いです。</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">切り口</span><p>現状の無料診断という名目でアポイントを取得</p></div>\n  </div>\n</div>\n<div class=\"loss-card\">\n  <div class=\"loss-card__head\">\n    <span class=\"loss-card__num\">⑦</span>\n    <div class=\"loss-card__title\">自分にできるか不安</div>\n    <span class=\"loss-card__time loss-card__time--short\">1〜3ヶ月後</span>\n  </div>\n  <div class=\"loss-card__body\">\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">断り文句</span><p>「自分にできる自信がない」「続けられるか心配」</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">理由</span><p>不安は時間の経過で増幅または軽減されます。他の受講生の成功事例や、初心者向けの新コンテンツが出たタイミングで再接触してください。</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">切り口</span><p>「同じ不安をお持ちだった方の体験談」「無料体験セッション」でアポイントを取得</p></div>\n  </div>\n</div>\n<div class=\"loss-card\">\n  <div class=\"loss-card__head\">\n    <span class=\"loss-card__num\">⑧</span>\n    <div class=\"loss-card__title\">情報収集中・他と比較したい</div>\n    <span class=\"loss-card__time loss-card__time--urgent\">2週間〜1ヶ月後</span>\n  </div>\n  <div class=\"loss-card__body\">\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">断り文句</span><p>「もう少し情報を集めてから」「他と比べたい」</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">理由</span><p>比較検討は長引くほど関心が冷めます。早めに再接触して比較ポイントを整理してさしあげてください。</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">切り口</span><p>「○○様向けのプランを作成しましたので、もう一度お時間をいただけますか」</p></div>\n  </div>\n</div>\n<div class=\"loss-card\">\n  <div class=\"loss-card__head\">\n    <span class=\"loss-card__num\">⑨</span>\n    <div class=\"loss-card__title\">感情的な反発・不信感</div>\n    <span class=\"loss-card__time loss-card__time--cool\">6〜12ヶ月後</span>\n  </div>\n  <div class=\"loss-card__body\">\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">断り文句</span><p>「営業がしつこかった」「怪しいと思った」</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">理由</span><p>負の感情は時間が解決します。同じ担当者ではなく、別の担当者・別の切り口（セミナー・メルマガ経由）で再接触してください。</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">切り口</span><p>「別件でお話しがありまして〜」。感情的なネックは難しいですが、まず一度メッセージをお送りしてください</p></div>\n  </div>\n</div>\n<div class=\"loss-card\">\n  <div class=\"loss-card__head\">\n    <span class=\"loss-card__num\">⑩</span>\n    <div class=\"loss-card__title\">ライフイベント（結婚・出産・転職・引越）</div>\n    <span class=\"loss-card__time loss-card__time--long\">6ヶ月後</span>\n  </div>\n  <div class=\"loss-card__body\">\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">断り文句</span><p>「引越しが決まって」「転職活動中で」「出産を控えていて」</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">理由</span><p>ライフイベントは半年で一段落。新生活が落ち着いたタイミングで「改めて自分のことを考える」という心理が働きます。</p></div>\n    <div class=\"loss-card__row\"><span class=\"loss-card__label\">切り口</span><p>「新生活は落ち着かれましたか」と生活の変化に寄り添った一言からお声がけ</p></div>\n  </div>\n</div>\n</div>\n<p><strong>必須ルール</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_3df040a5.png\" alt=\"必須ルール\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>商談進捗シート（年間KPIシート）に失注理由を必ずカテゴリで記録してください（①〜⑩のいずれか、またはその他で記載）</li><li>失注時点で次回アプローチ予定日を入力し、ご自身のカレンダーのタスクに設定することで、ネクストアクションを漏れなく管理してください（失注と同時に次のアクション日を確定させてください）</li><li>再アプローチ前に前回の会話内容・失注理由を必ず確認してください（会話が噛み合わない状態はNGです）</li><li>同じ営業トークを繰り返さないでください。前回から「何が変わったか」を必ず切り口に入れるようにしてください</li></ul>\n<p><strong>注意点</strong></p>\n<ul class=\"docx-list\"><li>しつこい連絡は即ブロック・拒否につながるため、再接触は月1回以下を厳守してください</li><li>「売り込む」ではなく「気にかけている」姿勢を見せることを徹底し、情報提供型のアプローチを心がけてください</li></ul>\n<p><strong>禁止事項</strong></p>\n<ul class=\"docx-list\"><li>失注理由を「なんとなく」「タイミング」で片付けた記録をしないでください</li><li>再アプローチの予定日を決めないままにしないでください</li><li>前回の失注理由を把握せずに再アプローチしないでください（「覚えていない」という状態は致命的な不信感につながります）</li><li>失注直後の追撃営業は絶対に行わないでください（逆効果となり、二度と取り返せなくなります）</li></ul>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p><strong>再アプローチの切り口3パターン</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_11411770.png\" alt=\"再アプローチの切り口3パターン\" loading=\"lazy\"></figure>\n<p>再アプローチは必ず以下のいずれかを起点にしてください。売り込みから入ると即ブロックされるため、相手に「話を聞いてみようかな」と思っていただける導入が必須です。</p>\n<ul class=\"docx-list\"><li><strong>① 気にかけ型（近況伺い）</strong></li></ul>\n<p>「あれからいかがですか」「その後、お変わりありませんか」という言葉から入り、前回の失注理由に寄り添った一言を添えてください。</p>\n<p>例：「あの時はお忙しいとのことでしたが、少し落ち着かれましたか？」</p>\n<ul class=\"docx-list\"><li><strong>② 情報提供型（有益情報の共有）</strong></li></ul>\n<p>「新しいコースができました」「キャンペーンが始まりました」「体験会を開催します」といった内容を、売り込みではなく「お知らせ」のトーンでお伝えください。</p>\n<p>例：「○○さんがご興味をお持ちいただけそうな内容ですので、ご案内だけさせていただきます」</p>\n<ul class=\"docx-list\"><li><strong>③ アポ特化型メッセージ</strong></li></ul>\n<p>「別件でお話しがありまして〜」といった、「前回とは違う話をするのか」という印象を与える切り口でアポイントを取得してください。</p>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>\n<p><strong>運用フローのまとめ</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/shodan_04_e2f2b48c.png\" alt=\"運用フローのまとめ\" loading=\"lazy\"></figure>\n<p>失注発生 ↓ 失注理由をカテゴリ①〜⑩で記録する ↓ 次回アプローチ予定日をカレンダーに設定する ↓ 予定日到来 ↓ 前回の会話・失注理由を確認する ↓ 3パターンのいずれかの切り口で再接触する ↓ 反応あり → 商談を再セットする 反応なし → さらに3〜6ヶ月後に再設定する（最大2〜3回まで） ↓ 3回反応なし → 休眠リストへ移行（年1回の情報提供のみ）クレームや周りに影響がでるレベルになったら停止\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n</p>\n<p>失注リストは「捨てるリスト」ではなく、「熟成させる資産」です。状況が変われば必ず戻ってきていただける可能性があるため、関係性を切らずに温め続ける運用を徹底してください。\n</p>\n<div class=\"ph-img\" data-near=\"Step 4. 次回アクションへの落とし込み\"></div>", "sales/06": "<h3>受付・開始前フェーズ</h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_02bd2cac.png\" alt=\"受付・開始前フェーズ\" loading=\"lazy\"></figure>\n<h4>このフェーズの目的</h4>\n<p>全員のお顔・お名前・業種・現状を覚えることです。交流会で誰に何をお話しするかの事前準備となります。</p>\n<div class=\"ph-img\" data-near=\"このフェーズの目的\"></div>\n<h4>セミナー登壇者がやるべきこと</h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/sales_01_bf43568b.png\" alt=\"セミナー登壇者がやるべきこと\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>受付に立ち、参加者全員と1〜2分の雑談を行います</li><li>名刺交換を必ず行います</li><li>可能であれば席順/誰でどういう人がくるのか？属性を事前に知れる状態がベスト→ニーズをわかってれば交流会で優先的に話せるため\n</li></ul>\n<p>15人いらっしゃれば、この時点で個別面談に持ち込めそうな方を3〜5人選別しておきます。</p>\n<h4>セミナ
