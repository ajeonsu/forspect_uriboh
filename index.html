/* =====================================================
   BODY DECORATION
   Transform extracted docx HTML into visually richer
   blocks (pattern cards, callouts, OK/NG compares, etc.)
   WITHOUT changing the source text — only re-wrapping it.
   ===================================================== */
function decorateBody(html, key) {
  // Use a sandbox div to manipulate as DOM
  const wrap = document.createElement("div");
  wrap.innerHTML = html;

  // Pattern definitions: { regex (matched against heading text), class suffix, label }
  // Order matters — first match wins.
  const PATTERNS = [
    { rx: /^(原則\s*\d+\b|原則[①-⑩])/,           cls: "rule",  label: "原則" },
    { rx: /^(ルール\s*\d+\b|ルール[①-⑩])/,        cls: "rule",  label: "ルール" },
    { rx: /^(アクション\s*\d+\b)/,                cls: "rule",  label: "アクション" },
    { rx: /^(Step\s*\d+\b|ステップ\s*\d+\b)/i,    cls: "step",  label: "STEP" },
    { rx: /^(フック[①-⑩]|フック\s*\d+)/,          cls: "hook",  label: "FOOK" },
    { rx: /^(要素[①-⑩]|要素\s*\d+)/,              cls: "hook",  label: "要素" },
    { rx: /^(特性[①-⑩]|特性\s*\d+)/,              cls: "hook",  label: "特性" },
    { rx: /^(パターン[①-⑩]|パターン\s*\d+)/,      cls: "step",  label: "パターン" },
    { rx: /^(失敗パターン\s*\d+|負けパターン[①-⑩]|負けパターン\s*\d+|失敗[①-⑩])/, cls: "ng", label: "失敗パターン" },
    { rx: /^(成功パターン\s*\d+|成功[①-⑩])/,      cls: "ok",    label: "成功" },
    { rx: /^(症状[①-⑩]|症状\s*\d+)/,              cls: "warn",  label: "症状" },
    { rx: /^(第\s*[1-9]+\s*層[:：])/,              cls: "rule",  label: "第N層" }
    // 【】 pattern removed: full bracket text was too long for badge (caused vertical wrap)
  ];

  // 1) Wrap H4/H5 that match patterns into pattern-cards
  // Each matched heading consumes following siblings (until next heading or end)
  // and wraps them as a card.
  const candidates = Array.from(wrap.querySelectorAll("h4, h5"));
  candidates.forEach(h => {
    const text = (h.textContent || "").trim();
    let pat = null;
    for (const P of PATTERNS) {
      if (P.rx.test(text)) { pat = P; break; }
    }
    if (!pat) return;

    // Collect following siblings until next heading
    const collected = [];
    let n = h.nextSibling;
    while (n) {
      if (n.nodeType === 1 && /^H[1-6]$/.test(n.tagName)) break;
      const next = n.nextSibling;
      collected.push(n);
      n = next;
    }
    // Build pattern card
    const card = document.createElement("div");
    card.className = `pat-card pat-card--${pat.cls}`;
    const badge = document.createElement("div");
    badge.className = "pat-card__badge";
    // Extract the leading marker (e.g., "原則1") for the badge
    const m = text.match(pat.rx);
    badge.textContent = (m && m[0]) ? m[0] : pat.label;
    const main = document.createElement("div");
    const t = document.createElement("div");
    t.className = "pat-card__title";
    // Title = text after the matched leading marker (with separators)
    let title = text.replace(pat.rx, "").replace(/^[\s:：、,，\-—｜|]+/, "").trim();
    if (!title) title = text;
    t.textContent = title;
    main.appendChild(t);
    const bodyDiv = document.createElement("div");
    bodyDiv.className = "pat-card__body";
    collected.forEach(c => bodyDiv.appendChild(c));
    main.appendChild(bodyDiv);
    card.appendChild(badge);
    card.appendChild(main);
    h.replaceWith(card);
  });

  // 2) Convert sibling H4/H5 pairs into a 2-column compare
  // Patterns: OK/NG, 良い例/悪い例, メリット/デメリット, Before/After, 現状/理想, 長所/短所
  const allH = Array.from(wrap.querySelectorAll("h4, h5"));
  for (let i = 0; i < allH.length; i++) {
    const a = allH[i];
    const b = allH[i + 1];
    if (!b) continue;
    const aT = (a.textContent || "").trim();
    const bT = (b.textContent || "").trim();
    // Positive vs Negative class
    const isPos = t => /^(OK|良い例|◯|○|◎|メリット|長所|Pro|成功)$/i.test(t) || /^良い例[（(]/.test(t) || /^Before$/i.test(t) || /^現状$/i.test(t);
    const isNeg = t => /^(NG|悪い例|×|✕|✗|デメリット|短所|Con|失敗)$/i.test(t) || /^悪い例[（(]/.test(t) || /^After$/i.test(t) || /^理想$/i.test(t);
    const aIsOk = isPos(aT);
    const bIsNg = isNeg(bT);
    const aIsNg = isNeg(aT);
    const bIsOk = isPos(bT);
    if ((aIsOk && bIsNg) || (aIsNg && bIsOk)) {
      const collect = (start, end) => {
        const items = [];
        let n = start.nextSibling;
        while (n && n !== end) {
          const next = n.nextSibling;
          if (n.nodeType === 1 && /^H[1-6]$/.test(n.tagName)) break;
          items.push(n);
          n = next;
        }
        return items;
      };
      const aItems = collect(a, b);
      // For b, collect until next heading
      const bItems = (() => {
        const arr = [];
        let n = b.nextSibling;
        while (n) {
          const next = n.nextSibling;
          if (n.nodeType === 1 && /^H[1-6]$/.test(n.tagName)) break;
          arr.push(n);
          n = next;
        }
        return arr;
      })();
      const compare = document.createElement("div");
      compare.className = "compare";
      const okCol = document.createElement("div");
      okCol.className = "compare__col compare__col--ok";
      const ngCol = document.createElement("div");
      ngCol.className = "compare__col compare__col--ng";
      const lbl = (txt, kind) => {
        const s = document.createElement("div");
        s.className = "compare__lbl";
        s.textContent = txt;
        return s;
      };
      okCol.appendChild(lbl("✓ " + (aIsOk ? aT : bT)));
      ngCol.appendChild(lbl("✗ " + (aIsOk ? bT : aT)));
      (aIsOk ? aItems : bItems).forEach(n => okCol.appendChild(n));
      (aIsOk ? bItems : aItems).forEach(n => ngCol.appendChild(n));
      a.replaceWith(compare);
      compare.parentNode.insertBefore(okCol, compare.nextSibling); // not used; we use append
      // Actually just append into compare
      compare.appendChild(okCol);
      compare.appendChild(ngCol);
      b.remove();
      i++; // consumed two
    }
  }

  // 3) Convert "（画像）" / "(画像)" placeholder paragraphs to styled image-placeholder blocks
  Array.from(wrap.querySelectorAll("p")).forEach(p => {
    const t = (p.textContent || "").trim();
    if (t === "（画像）" || t === "(画像)" || t === "画像") {
      const div = document.createElement("div");
      div.className = "img-ph";
      div.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
        <span>画像（図解はカリキュラムサイトを参照）</span>
      `;
      p.replaceWith(div);
    }
  });

  // 4) Promote leading "※" lines into note callouts
  Array.from(wrap.querySelectorAll("p")).forEach(p => {
    const txt = (p.textContent || "").trim();
    if (txt.startsWith("※") && txt.length > 4) {
      const co = document.createElement("div");
      co.className = "callout callout--note";
      const lbl = document.createElement("div");
      lbl.className = "callout__label";
      lbl.textContent = "NOTE";
      co.appendChild(lbl);
      const innerP = document.createElement("p");
      innerP.style.margin = "0";
      innerP.innerHTML = p.innerHTML;  // keep leading ※ visible
      co.appendChild(innerP);
      p.replaceWith(co);
    }
  });

  // 5) Promote starting paragraph as a "intro callout" if topic starts with overview text
  // (we leave as-is for now; could be added later if requested)

  // 5b) Group consecutive real-image <figure> elements into pair layout
  // (e.g., 雨/晴れ 撮影 comparison images that come back-to-back).
  Array.from(wrap.querySelectorAll(".docx-figure")).forEach(fig => {
    const next = fig.nextElementSibling;
    if (next && next.classList.contains("docx-figure") && !fig.closest(".docx-figure-pair")) {
      const pair = document.createElement("div");
      pair.className = "docx-figure-pair";
      fig.parentNode.insertBefore(pair, fig);
      pair.appendChild(fig);
      pair.appendChild(next);
    }
  });

  // 5c) Transform "（画像）" placeholders into context-aware concept tiles.
  // Strategy: classify each placeholder by the nearest preceding heading text,
  // pick a kind+icon, render a tile with the heading text. Deduplicate within
  // the same heading (only the first becomes a full tile; subsequent ones in
  // the same section are removed entirely to reduce noise).
  function classifyHeading(text) {
    const t = (text || "").toLowerCase();
    // Comparison
    if (/(比較|対比|ok|ng|良い例|悪い例|before|after|ビフォー|アフター|◯|×)/i.test(text)) {
      return { kind: "compare", lbl: "VISUAL", title: text || "比較イメージ", icon: "compare" };
    }
    // Flow / steps
    if (/(フロー|ステップ|step|順序|手順|流れ|タイム|スケジュール|工程)/i.test(text)) {
      return { kind: "flow", lbl: "FLOW", title: text || "ステップ図", icon: "flow" };
    }
    // Structure / hierarchy
    if (/(構造|階層|ピラミッド|3層|ファネル|3フック|モデル|組織|ツリー)/i.test(text)) {
      return { kind: "struct", lbl: "STRUCTURE", title: text || "構造図", icon: "struct" };
    }
    // Phone / SNS / 撮影
    if (/(撮影|リール|投稿|スマホ|画面|プロフィール|フィード|ストーリー|threads|instagram|sns)/i.test(text)) {
      return { kind: "phone", lbl: "MOCKUP", title: text || "投稿サンプル", icon: "phone" };
    }
    // Sheet / dashboard / KPI
    if (/(シート|ダッシュボード|kpi|管理|集計|テーブル|チャート|グラフ|計測)/i.test(text)) {
      return { kind: "sheet", lbl: "SHEET", title: text || "シート画面", icon: "sheet" };
    }
    // LP / page
    if (/(lp|ランディング|サービスページ|ページ|サイト|フォーム|テンプレ|スライド|資料)/i.test(text)) {
      return { kind: "example", lbl: "MOCKUP", title: text || "ページ例", icon: "page" };
    }
    // Money / payment / contract
    if (/(決済|契約|請求|料金|報酬|給料|単価|価格|キャッシュ|入金)/i.test(text)) {
      return { kind: "money", lbl: "EXAMPLE", title: text || "金額表", icon: "money" };
    }
    // Default
    return { kind: "example", lbl: "EXAMPLE", title: text || "イメージ図", icon: "image" };
  }

  function tileIconSvg(kind) {
    const M = {
      compare: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="m7 8-5 4 5 4"/><path d="m17 8 5 4-5 4"/></svg>',
      flow:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="9" width="6" height="6"/><rect x="15" y="9" width="6" height="6"/><path d="M9 12h6"/><path d="m13 10 2 2-2 2"/></svg>',
      struct:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4"/><rect x="3" y="18" width="6" height="4"/><rect x="15" y="18" width="6" height="4"/><path d="M12 6v6m-6 6v-3a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3v3"/></svg>',
      phone:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/></svg>',
      sheet:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>',
      page:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 7h8M8 11h8M8 15h5"/></svg>',
      money:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 9h6M9 12h6M11 7v10"/></svg>',
      image:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>'
    };
    return M[kind] || M.image;
  }

  // Convert (画像) placeholders into context-aware compact visualizations.
  // Each placeholder is classified by its surrounding heading + nearby text,
  // then rendered with one of ~13 SVG templates. Within each heading section
  // we cap to 2 visualizations (dedup'd by data-near) to control visual density.
  (function removePlaceholderVisuals() {
    // 内容を持たないプレースホルダー画像は理解の妨げになるため一律削除する。
    // 内容を反映した図解はDIAGRAMSレジストリ経由のfigXxx()で個別に注入される。
    wrap.querySelectorAll(".ph-img, .ph-vis").forEach(el => el.remove());
  })();

  // ----- Auto-visualize: numbered steps (under step-like headings) -----
  // For UL right after a heading whose text suggests sequence
  // (ステップ/手順/順序/順番/フロー/流れ/プロセス/進め方/Step), convert to
  // a vertical timeline (.v-timeline) with circular numbered badges.
  function autoNumberedSteps(wrap) {
    Array.from(wrap.querySelectorAll("h2, h3, h4, h5")).forEach(h => {
      const t = (h.textContent || "").trim();
      if (!/(ステップ|手順|順序|順番|フロー|流れ|プロセス|進め方|タイムライン|Step\b|STEP\b)/i.test(t)) return;
      // Look at next sibling that is UL (skip intermediate <p>)
      let n = h.nextElementSibling;
      while (n && n.tagName === "P") n = n.nextElementSibling;
      if (!n || n.tagName !== "UL" || !n.classList.contains("docx-list")) return;
      const items = Array.from(n.children).filter(c => c.tagName === "LI");
      if (items.length < 2 || items.length > 10) return;
      // Skip if any item too long (>200 chars) or has nested lists
      if (items.some(li => li.querySelector("ul, ol, table"))) return;
      const tooLong = items.some(li => (li.textContent || "").length > 220);
      if (tooLong) return;
      // Build v-timeline
      const tl = document.createElement("div");
      tl.className = "v-timeline";
      items.forEach(li => {
        const it = document.createElement("div");
        it.className = "v-timeline-item";
        it.innerHTML = li.innerHTML;
        tl.appendChild(it);
      });
      n.replaceWith(tl);
    });
  }
  autoNumberedSteps(wrap);

  // ----- Auto-visualize: convert short bullet lists into card grids -----
  // Heuristics (conservative):
  //   - List has 2–6 items, items are 6–80 chars each
  //   - No nested ul/ol
  //   - No file-name items (.docx etc.) and no anchor children
  //   - Skip lists inside ai-prompt or doc-link blocks
  // Cards rotate through 5 colors.
  function autoListToCards(wrap) {
    // Single accent color — chromatic noise reduction (was 7-color cycle)
    const COLORS = ["c-accent"];
    Array.from(wrap.querySelectorAll("ul.docx-list")).forEach(ul => {
      // Skip if inside special blocks
      if (ul.closest(".ai-prompt") || ul.closest(".doc-link")) return;
      const items = Array.from(ul.children).filter(c => c.tagName === "LI");
      if (items.length < 2 || items.length > 6) return;
      // Skip if nested
      if (items.some(li => li.querySelector("ul, ol, table"))) return;
      // Skip if contains links or filenames
      if (items.some(li => li.querySelector("a"))) return;
      if (items.some(li => /\.(docx|pdf|xlsx|html|csv|jpg|png)\s*$/i.test((li.textContent || "").trim()))) return;
      // Item length checks
      const ok = items.every(li => {
        const t = (li.textContent || "").trim();
        return t.length >= 6 && t.length <= 90;
      });
      if (!ok) return;
      // Items should be substantive, not "is-X" labels
      const meaningful = items.every(li => /[ぁ-んァ-ヶ一-龯]/.test(li.textContent || ""));
      if (!meaningful) return;

      // Determine column count for clean grids
      const grid = document.createElement("div");
      const cls = items.length === 3 ? "auto-cards auto-cards--3"
                : items.length === 4 ? "auto-cards auto-cards--4"
                : items.length === 5 ? "auto-cards auto-cards--5"
                : items.length === 6 ? "auto-cards auto-cards--6"
                : items.length === 7 ? "auto-cards auto-cards--7"
                : items.length === 8 ? "auto-cards auto-cards--8"
                : "auto-cards";
      grid.className = cls;
      items.forEach((li, i) => {
        const card = document.createElement("div");
        card.className = "auto-card " + COLORS[i % COLORS.length];
        card.innerHTML = `<span class="auto-card__num">${i + 1}</span>${li.innerHTML}`;
        grid.appendChild(card);
      });
      ul.replaceWith(grid);
    });
  }
  // autoListToCards(wrap);  // disabled: technical bullets like "画面長押し → AE/AFロック" don't need card styling

  // 5c2) External document links — convert specific filename/text mentions
  // into clickable cards (e.g., Google Docs templates).
  const DOC_LINKS = [
    {
      // CS 業務委託契約書 テンプレート（Google Docs）
      match: /カスタマーサクセス業務委託契約書\.docx/,
      title: "カスタマーサクセス業務委託契約書（テンプレート）",
      sub: "Google Docs ｜ コピーしてご使用ください",
      url: "https://docs.google.com/document/d/1wgruo2H1US84rUA_-tWJkyrqjIpBYY91/edit?usp=sharing&ouid=104380031236681937318&rtpof=true&sd=true",
      cta: "Google Docs を開く",
      kind: "doc"
    },
    {
      // CS進行管理シート（Google Sheets）
      match: /CS管理_進行シート/,
      title: "CS管理_進行シート（テンプレート）",
      sub: "Google スプレッドシート ｜ コピーしてご使用ください",
      url: "https://docs.google.com/spreadsheets/d/1ZACN9bq2Lc55P6US8OSLobKzl5BymLI-3WhR-e7Df9w/edit?usp=sharing",
      cta: "Google Sheets を開く",
      kind: "sheet"
    },
    {
      // 法人様用 申込書兼利用書（Google Docs）
      // Match must include the leading "(法人様用)" to differentiate from 個人様用
      match: /\(法人様用\)（サービス名）申込書兼利用書/,
      title: "（法人様用）申込書兼利用書（テンプレート）",
      sub: "Google Docs ｜ コピーしてご使用ください",
      url: "https://docs.google.com/document/d/1qKxgyOT4ZhH-BQI9lGY67-gDNCg6PMndGfxFUvqy4P4/edit?usp=sharing",
      cta: "Google Docs を開く",
      kind: "doc"
    },
    {
      // 〇〇事業_年間KPIシート（Google Sheets）
      match: /〇〇事業_年間KPIシート/,
      title: "〇〇事業_年間KPIシート（テンプレート）",
      sub: "Google スプレッドシート ｜ コピーしてご使用ください",
      url: "https://docs.google.com/spreadsheets/d/1o5PLgp-HJMQftuYomDujHcwc2ycXU-SRRLWF6C_iq20/edit?gid=1568791497#gid=1568791497",
      cta: "Google Sheets を開く",
      kind: "sheet"
    },
    {
      // 個人様用 申込書兼利用書（Google Docs）
      match: /\(個人様用\)（サービス名）申込書兼利用書/,
      title: "（個人様用）申込書兼利用書（テンプレート）",
      sub: "Google Docs ｜ コピーしてご使用ください",
      url: "https://docs.google.com/document/d/1zur4wGdcrpHecOa5a9FleNR4xzp0NB31F9B3OnSWEsI/edit?tab=t.0",
      cta: "Google Docs を開く",
      kind: "doc"
    },
    {
      // 契約 → マネーフォワード クラウド契約（standalone "契約" paragraph）
      match: /^\s*契約\s*$/,
      title: "マネーフォワード クラウド契約",
      sub: "マネーフォワード ｜ 電子契約サービス",
      url: "https://biz.moneyforward.com/contract/?ptn=2026_0254_01",
      cta: "サービスを開く",
      kind: "doc"
    },
    {
      // 請求書業務 → マネーフォワード クラウド請求書
      match: /^\s*請求書業務\s*$/,
      title: "マネーフォワード クラウド請求書",
      sub: "マネーフォワード ｜ 無料プランから始められます",
      url: "https://biz.moneyforward.com/invoice/",
      cta: "サービスを開く",
      kind: "doc"
    }
  ];
  function buildDocLink(d) {
    const safe = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    const isSheet = d.kind === "sheet";
    const iconSvg = isSheet
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h8M8 17h6"/></svg>';
    const kindCls = isSheet ? "doc-link--sheet" : "doc-link--doc";
    const lbl = isSheet ? "TEMPLATE / SHEET" : "TEMPLATE / DOC";
    return `
      <a class="doc-link ${kindCls}" href="${safe(d.url)}" target="_blank" rel="noopener">
        <div class="doc-link__icon">${iconSvg}</div>
        <div class="doc-link__main">
          <div class="doc-link__lbl">${lbl}</div>
          <div class="doc-link__title">${safe(d.title)}</div>
          <div class="doc-link__sub">${safe(d.sub)}</div>
        </div>
        <div class="doc-link__cta">
          <span>${safe(d.cta)}</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M7 7h10v10"/></svg>
        </div>
      </a>`;
  }
  // Walk paragraphs and list items; replace any whose text matches a doc link
  Array.from(wrap.querySelectorAll("p, li")).forEach(el => {
    const text = (el.textContent || "");
    for (const d of DOC_LINKS) {
      if (d.match.test(text)) {
        const tmp = document.createElement("div");
        tmp.innerHTML = buildDocLink(d);
        const card = tmp.firstElementChild;
        // For <li>: replace the li with the card AND ensure the surrounding ul stays valid
        if (el.tagName === "LI") {
          // Move the card outside the list to avoid invalid <a> inside <li>
          // structure breakage. Simplest: replace the parent ul if this is the only li.
          const ul = el.parentNode;
          if (ul && ul.tagName === "UL" && ul.children.length === 1) {
            ul.replaceWith(card);
          } else {
            el.replaceWith(card);
          }
        } else {
          el.replaceWith(card);
        }
        break;
      }
    }
  });

  // 5d) AI Prompt blocks (Claude AI 用の指示文をワンタップでコピー)
  // 3 specific known prompts:
  //   - KPI:     starts at paragraph "スクール教材資料を作成します。"
  //              ends at next dashed-line or heading
  //   - LP:      paragraph after "以下をそのままClaude AIに貼り付け、各項目を埋めて使用してください。"
  //              until next heading
  //   - 営業資料: paragraph after "以下をそのまま貼り付け、各項目を埋めて使用してください。"
  //              until next heading
  const PROMPT_TRIGGERS = [
    {
      includeTrigger: true,
      title: "Genspark / Manus ｜ スクール教材作成プロンプト",
      tag: "教材",
      isTrigger: t => t === "スクール教材資料を作成します。" || t.startsWith("スクール教材資料を作成します。"),
    },
    {
      includeTrigger: false,
      title: "Claude AI ｜ LP・法的4ページ作成プロンプト",
      tag: "LP",
      isTrigger: t => /^以下をそのままClaude AIに貼り付け/.test(t),
    },
    {
      includeTrigger: false,
      title: "Genspark / Manus ｜ 営業資料作成プロンプト",
      tag: "営業資料",
      isTrigger: t => /^以下をそのまま貼り付け/.test(t),
    },
  ];

  // Detect dashed-line paragraph (any paragraph that's just dashes / "ー" or "-")
  function isDashLine(t) {
    const s = (t || "").trim();
    if (!s) return false;
    return /^[ー\-―ー＿]{6,}$/.test(s);
  }

  // For each trigger, collect from start node until end condition
  PROMPT_TRIGGERS.forEach(rule => {
    // Find first paragraph matching the trigger
    const ps = Array.from(wrap.querySelectorAll("p"));
    let triggerEl = null;
    for (const p of ps) {
      const t = (p.textContent || "").trim();
      if (rule.isTrigger(t)) { triggerEl = p; break; }
    }
    if (!triggerEl) return;

    // Determine starting node for content collection
    const startNode = rule.includeTrigger ? triggerEl : triggerEl.nextElementSibling;
    if (!startNode) return;

    // Walk forward, collecting siblings until end condition
    const collected = [];
    let n = startNode;
    while (n) {
      // End conditions
      if (n.nodeType === 1) {
        if (/^H[1-6]$/.test(n.tagName)) break;
        const nt = (n.textContent || "").trim();
        if (isDashLine(nt)) break;
        // Skip image placeholders/figures inside the prompt
        if (n.classList && (n.classList.contains("ph-img") || n.classList.contains("docx-figure"))) {
          n = n.nextElementSibling; continue;
        }
      }
      collected.push(n);
      n = n.nextElementSibling;
    }
    if (!collected.length) return;

    // Build the plain-text version for the clipboard.
    const plainText = collected.map(c => {
      // Use textContent for plain text; for <ul>, prepend "- " per item
      if (c.tagName === "UL" || c.tagName === "OL") {
        return Array.from(c.children).map(li => "- " + (li.textContent || "").trim()).join("\n");
      }
      return (c.textContent || "").trim();
    }).filter(Boolean).join("\n");

    // Build the visual block: title bar + copy button + body
    const card = document.createElement("div");
    card.className = "ai-prompt";
    const titleEsc = rule.title.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    const tagEsc = rule.tag.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    const escAttr = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

    card.innerHTML = `
      <div class="ai-prompt__head">
        <div class="ai-prompt__title">
          <span class="ai-prompt__tag">${tagEsc}</span>
          <span class="ai-prompt__name">${titleEsc}</span>
        </div>
        <button class="ai-prompt__copy" type="button" data-copy="${escAttr(plainText)}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
          <span>プロンプトをコピー</span>
        </button>
      </div>
      <div class="ai-prompt__body"></div>
      <button class="ai-prompt__toggle" type="button" data-state="collapsed">全文を表示 ▼</button>
    `;
    const bodyEl = card.querySelector(".ai-prompt__body");

    // Capture parent + anchor BEFORE moving nodes. After collected nodes are
    // moved into bodyEl, triggerEl.parentNode would become bodyEl and the
    // card insert would form a cycle (HierarchyRequestError).
    const originalParent = triggerEl.parentNode;
    const insertAnchor = rule.includeTrigger ? triggerEl : triggerEl.nextSibling;

    originalParent.insertBefore(card, insertAnchor);
    collected.forEach(c => bodyEl.appendChild(c));

    if (!rule.includeTrigger && originalParent.contains(triggerEl)) {
      originalParent.removeChild(triggerEl);
    }
  });

  // ----- Auto-visualize: inline stat highlight -----
  // Wrap currency/percent/multiplier numbers in a pink pill to draw the eye.
  // Conservative: only one match per text node (the most prominent), and skip
  // text inside AI prompts, doc-links, diagrams, and code-like containers.
  function autoHighlightStats(wrap) {
    const STAT_RE = /([0-9０-９]+(?:,[0-9０-９]{3})*(?:[\.\-〜～][0-9０-９]+)?)\s*(兆円|億円|千万円|百万円|万円|円|%|％|割|倍)/;
    const SKIP_PARENT = ["AI-PROMPT","DOC-LINK","SVG-BOX","TABLE-WRAP","FIGURE","CODE","PRE","FIGCAPTION"];
    const SKIP_CLASS_RE = /(^|\s)(ai-prompt|doc-link|svg-box|data-table|table-wrap|docx-figure|stat-pull)(\s|$)/;
    function shouldSkip(p) {
      if (!p) return true;
      // Skip text inside skip-class ancestors
      let cur = p;
      while (cur) {
        if (cur.classList && SKIP_CLASS_RE.test(cur.className)) return true;
        cur = cur.parentElement;
      }
      // Only highlight in plain content tags, not headings
      const tag = p.tagName;
      return !["P", "LI", "STRONG", "EM", "DIV", "TD", "SPAN"].includes(tag);
    }
    // Collect text nodes first to avoid mutating during walk
    const walker = document.createTreeWalker(wrap, NodeFilter.SHOW_TEXT, {
      acceptNode: (n) => {
        if (!n.nodeValue || !n.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
        if (shouldSkip(n.parentElement)) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    const targets = [];
    let n;
    while ((n = walker.nextNode())) targets.push(n);
    targets.forEach(node => {
      const text = node.nodeValue;
      const m = text.match(STAT_RE);
      if (!m) return;
      const before = text.slice(0, m.index);
      const after = text.slice(m.index + m[0].length);
      const span = document.createElement("span");
      span.className = "stat-pull";
      span.textContent = m[0];
      const frag = document.createDocumentFragment();
      if (before) frag.appendChild(document.createTextNode(before));
      frag.appendChild(span);
      if (after) frag.appendChild(document.createTextNode(after));
      node.parentNode.replaceChild(frag, node);
    });
  }
  autoHighlightStats(wrap);

  // ----- Auto-visualize: 2-column tables with short rows → card grid -----
  // For data tables with exactly 2 columns and ≤6 rows where each cell is short
  // (≤80 chars), convert to a labeled card grid (left = label, right = value).
  function autoSmallTablesToCards(wrap) {
    Array.from(wrap.querySelectorAll(".table-wrap")).forEach(tw => {
      const table = tw.querySelector(".data-table");
      if (!table) return;
      const headRow = table.querySelector("thead tr");
      const headCells = headRow ? Array.from(headRow.children) : [];
      if (headCells.length !== 2) return;
      const rows = Array.from(table.querySelectorAll("tbody tr"));
      if (rows.length < 2 || rows.length > 6) return;
      const allShort = rows.every(r => {
        const cells = Array.from(r.children);
        if (cells.length !== 2) return false;
        return cells.every(c => (c.textContent || "").trim().length <= 90);
      });
      if (!allShort) return;
      const COLORS = ["c-accent"];
      const grid = document.createElement("div");
      const cls = rows.length === 3 ? "auto-cards auto-cards--3"
                : rows.length === 4 ? "auto-cards auto-cards--4"
                : rows.length === 5 ? "auto-cards auto-cards--5"
                : rows.length === 6 ? "auto-cards auto-cards--6"
                : rows.length === 7 ? "auto-cards auto-cards--7"
                : rows.length === 8 ? "auto-cards auto-cards--8"
                : "auto-cards";
      grid.className = cls;
      rows.forEach((r, i) => {
        const cells = Array.from(r.children);
        const card = document.createElement("div");
        card.className = "auto-card " + COLORS[i % COLORS.length];
        const label = cells[0].innerHTML;
        const value = cells[1].innerHTML;
        card.innerHTML = `<div style="font-weight:800;font-size:13.5px;color:var(--text);margin-bottom:4px">${label}</div><div style="color:var(--text-soft);font-size:12.5px;line-height:1.6">${value}</div>`;
        grid.appendChild(card);
      });
      tw.replaceWith(grid);
    });
  }
  autoSmallTablesToCards(wrap);

  // 6) Inject diagrams from the registry, anchored after a matching heading
  // (or pseudo-heading paragraph like "｜..." or "【...】" from docx).
  if (key && DIAGRAMS[key]) {
    DIAGRAMS[key].forEach(d => {
      let anchor = null;
      // Prefer real headings
      const headings = Array.from(wrap.querySelectorAll("h2, h3, h4, h5"));
      for (const h of headings) {
        if (d.after.test((h.textContent || "").trim())) {
          anchor = h; break;
        }
      }
      // Fall back to short paragraphs (pseudo-heading lines from docx)
      if (!anchor) {
        const paras = Array.from(wrap.querySelectorAll("p"));
        for (const p of paras) {
          const t = (p.textContent || "").trim();
          if (t.length <= 80 && d.after.test(t)) {
            anchor = p; break;
          }
        }
      }
      const figure = document.createElement("div");
      figure.innerHTML = d.fn().trim();
      const node = figure.firstElementChild;
      if (anchor) {
        anchor.parentNode.insertBefore(node, anchor.nextSibling);
      } else {
        wrap.insertBefore(node, wrap.firstChild);
      }
    });
  }

  return wrap.innerHTML;
}

function render() {
  const route = getRoute();
  if (route.name === "detail") {
    const g = GENRES.find(x => x.id === route.id);
    if (!g) { location.hash = "#/"; return; }
    // No topic in URL → show topic-card grid (level 2)
    // Topic in URL → show topic body view (level 3)
    if (!route.topic) {
      app.innerHTML = renderGenreCards(g);
      bindGenreCardsEvents();
    } else {
      app.innerHTML = renderTopicBody(g, route.topic);
      bindTopicBodyEvents();
    }
    window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });
  } else {
    app.innerHTML = renderHome();
    bindHomeEvents();
  }
}

let curriculumStarted = false;
window.bootCurriculum = function bootCurriculum() {
  if (curriculumStarted) return;
  curriculumStarted = true;
  window.addEventListener("hashchange", render);
  render();
};

function renderHome() {
  const guide = GENRES.find(g => g.pinned);
  const others = GENRES.filter(g => !g.pinned && !g.parent);
  const totalTopics = others.reduce((s,g) => s + (g.topics?.length || 0), 0);

  // Filter chips
  const chips = [
    { id: "all", label: "すべて" },
    { id: "open", label: "公開中" },
    { id: "coming", label: "準備中" }
  ];

  // Apply filter
  const q = state.query.trim().toLowerCase();
  const filtered = others.filter(g => {
    if (state.filter !== "all" && g.status !== state.filter) return false;
    if (!q) return true;
    return [g.label, g.title, g.sub, g.desc].join(" ").toLowerCase().includes(q);
  });

  const cardsHtml = filtered.map(g => cardHtml(g)).join("");
  const emptyHtml = filtered.length ? "" : `
    <div class="empty">
      <h3>該当するコースが見つかりませんでした</h3>
      <p>キーワードまたはフィルターを変更してお試しください。</p>
    </div>`;

  return `
    <div class="catalog-head">
      <div class="catalog-head__title">
        <h1>${others.length + 1}件のコース<small>URIBOH SCHOOL FC</small></h1>
        <p>スクール事業立ち上げ〜運営に必要なノウハウを、ジャンル別に体系化。複数の具体トピックで提供します。</p>
      </div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="コースを検索..." value="${escHtml(state.query)}" />
      </div>
    </div>

    <div class="chips-wrap">
      <div class="chips" id="chips">
        ${chips.map(c => `<button class="chip ${state.filter === c.id ? "is-active" : ""}" data-id="${c.id}">${c.label}</button>`).join("")}
      </div>
    </div>

    ${guide ? renderPinned(guide) : ""}

    <div class="grid-wrap">
      <div class="grid">${cardsHtml}</div>
      ${emptyHtml}
    </div>
  `;
}

function cardHtml(g, idx) {
  const isComing = g.status === "coming";
  const num = String(GENRES.indexOf(g)).padStart(2, "0");
  const numLabel = num === "00" ? "01" : num; // visual sequence
  const badgesHtml = isComing
    ? `<span class="card__cover-tag">準備中</span>`
    : `<span class="card__cover-tag">${escHtml(g.label)}</span>`;
  // For parent genres (subgenreIds), sum topic counts from all child genres
  const topicCount = (g.subgenreIds && g.subgenreIds.length)
    ? g.subgenreIds.reduce((sum, sid) => {
        const child = GENRES.find(x => x.id === sid);
        return sum + (child?.topics?.length || 0);
      }, 0)
    : (g.topics?.length || 0);
  const meta = isComing
    ? `<span class="card__meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>近日公開</span>`
    : `
       <span class="card__meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h20v14H2z"/><path d="M8 21h8M12 17v4"/></svg>${topicCount}トピック</span>
       <span class="card__meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h8M8 17h6"/></svg>資料</span>
       <span class="card__meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>公開中</span>
      `;
  const onclick = isComing ? "" : `data-href="#/g/${g.id}"`;
  const coverClass = g.thumb ? `card__cover card__cover--thumb` : `card__cover ${g.cov}`;
  const coverStyle = g.thumb ? ` style="background-image:url('${g.thumb}')"` : "";
  const coverMark = g.thumb
    ? `<div class="card__cover-mark"><div class="card__cover-mark__tag">FORSPECT</div><div class="card__cover-mark__name">URIBOH</div></div>`
    : `<div class="card__cover-mark">URIBOH</div>`;
  return `
    <article class="card ${isComing ? "is-coming" : ""}" ${onclick}>
      <div class="${coverClass}"${coverStyle}>
        <div class="card__cover-stripes"></div>
        ${badgesHtml}
        ${coverMark}
        <div class="card__cover-orb"></div>
        <div class="card__cover-num">${numLabel}</div>
      </div>
      <div class="card__body">
        <h3 class="card__title">${escHtml(g.title)}</h3>
        <p class="card__desc">${escHtml(g.desc || g.sub)}</p>
        <div class="card__meta">${meta}</div>
      </div>
    </article>
  `;
}

function bindHomeEvents() {
  document.querySelectorAll(".card[data-href]").forEach(el => {
    el.addEventListener("click", () => { location.hash = el.dataset.href; });
  });
  const chipsEl = document.getElementById("chips");
  if (chipsEl) {
    chipsEl.addEventListener("click", e => {
      const btn = e.target.closest(".chip");
      if (!btn) return;
      state.filter = btn.dataset.id;
      render();
    });
  }
  const search = document.getElementById("searchInput");
  if (search) {
    search.addEventListener("input", e => {
      state.query = e.target.value;
      // partial re-render of grid only would be ideal; full re-render keeps it simple
      const focus = document.activeElement === search;
      render();
      if (focus) {
        const s = document.getElementById("searchInput");
        if (s) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
      }
    });
  }
}

const SUB_ICONS = {
  "chart-up":   '<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>',
  "credit-card":'<rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>',

  "camera":     '<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>',

  "share2":     '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>',

};
function renderSubIcon(s) {
  if (s.icon && SUB_ICONS[s.icon]) {
    return `<svg viewBox="0 0 24 24" aria-hidden="true">${SUB_ICONS[s.icon]}</svg>`;
  }
  return escHtml(s.short || s.label.slice(0, 2).toUpperCase());
}

/* ---------- LEVEL 2: TOPIC CARDS GRID ---------- */
function renderGenreCards(g) {
  // Subgenre hub (e.g., SNS → Instagram / Threads / LINE)
  if (g.subgenreIds && g.subgenreIds.length) {
    const subs = g.subgenreIds.map(id => GENRES.find(x => x.id === id)).filter(Boolean);
    const subCards = subs.map(s => `
      <article class="tcard" data-href="#/g/${s.id}">
        <div class="tcard__bar ${s.cov}"></div>
        <div class="tcard__no ${s.cov}${(s.short && !s.icon) ? ' tcard__no--wide' : ''}">${renderSubIcon(s)}</div>
        <h3 class="tcard__title">${escHtml(s.label)}</h3>
        <p class="tcard__sub">${escHtml(s.sub || "")}</p>
        <div class="tcard__cta">
          <span>${s.topics?.length || 0}テーマ</span>
          <span class="tcard__cta-arrow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
          </span>
        </div>
      </article>`).join("");
    return `
      <section class="detail">
        <a href="#/" class="breadcrumb">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          <span>コース一覧に戻る</span>
        </a>
        <div class="detail-hero ${g.cov}">
          <div class="detail-hero__num">${escHtml(g.label.length <= 6 ? g.label : g.label.slice(0, 4))}</div>
          <span class="detail-hero__tag">${escHtml(g.label)}</span>
          <h1 class="detail-hero__title">${escHtml(g.title)}</h1>
          <p class="detail-hero__sub">${escHtml(g.sub)}</p>
          ${g.intro ? `<p class="detail-hero__sub" style="margin-top:14px">${escHtml(g.intro)}</p>` : ""}
        </div>
        <div class="detail-section">
          <h2 class="detail-section__title">媒体を選択</h2>
          <div class="tcards">${subCards}</div>
        </div>
      </section>`;
  }

  // Coming-soon genre — no topics
  if (!g.topics || !g.topics.length) {
    const backHref = g.parent ? `#/g/${g.parent}` : "#/";
    const backLabel = g.parent ? (GENRES.find(x => x.id === g.parent)?.label || "戻る") + "へ戻る" : "コース一覧に戻る";
    return `
      <section class="detail">
        <a href="${backHref}" class="breadcrumb">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          <span>${backLabel}</span>
        </a>
        <div class="detail-hero ${g.cov}">
          <span class="detail-hero__tag">${escHtml(g.label)}</span>
          <h1 class="detail-hero__title">${escHtml(g.title)}</h1>
          <p class="detail-hero__sub">${escHtml(g.sub)}</p>
        </div>
        <div class="empty"><h3>このコースは現在準備中です</h3><p>近日公開予定です。最新情報はFORSPECT本部からの通知をお待ちください。</p></div>
      </section>`;
  }

  // Extract h3/h4 (sub-section navigation targets) from body HTML
  // Skip "container-only" headings whose direct sibling content is just another heading
  // (e.g., 章タイトル h3 followed immediately by h4 with no content between)
  // Extract dropdown nav items
  // - 通常: h3 + h4 をフラットに並べる
  // - 見出し合計が DENSE_THRESHOLD 以上なら h3 のみ表示（密度を下げる）
  const DENSE_THRESHOLD = 13;
  const extractNav = (bodyHtml) => {
    if (!bodyHtml) return [];
    const tmp = document.createElement('div');
    tmp.innerHTML = bodyHtml;
    const CONTENT_TAGS = /^(P|UL|OL|FIGURE|TABLE|BLOCKQUOTE|PRE|DIV|HR)$/;
    const CONTENT_TAGS_INCL_H4 = /^(P|UL|OL|FIGURE|TABLE|BLOCKQUOTE|PRE|DIV|HR|H4|H5)$/;

    function hasContent(h, regex, stopRegex) {
      let n = h.nextElementSibling;
      while (n && !stopRegex.test(n.tagName)) {
        if (regex.test(n.tagName)) return true;
        n = n.nextElementSibling;
      }
      return false;
    }

    // まず h3+h4 の通常リストを作成（密度判定用）
    const STOP_ALL = /^H[1-6]$/;
    const fullList = Array.from(tmp.querySelectorAll('h3, h4'))
      .filter(h => {
        const text = (h.textContent || '').trim();
        if (!text || text.length > 80) return false;
        return hasContent(h, CONTENT_TAGS, STOP_ALL);
      });

    // 密度判定: 閾値以下なら通常の h3+h4 を返す
    if (fullList.length < DENSE_THRESHOLD) {
      return fullList.map(h => (h.textContent || '').trim());
    }

    // 密度高い → h3 のみ（h4 は本文内に残るが dropdown には出さない）
    const STOP_H123 = /^H[1-3]$/;
    return Array.from(tmp.querySelectorAll('h3'))
      .filter(h => {
        const text = (h.textContent || '').trim();
        if (!text || text.length > 80) return false;
        return hasContent(h, CONTENT_TAGS_INCL_H4, STOP_H123);
      })
      .map(h => (h.textContent || '').trim());
  };

  const cardsHtml = g.topics.map((t, i) => {
    const bodyKey = t.bodyKey || `${g.id}/${t.no}`;
    const body = (window.TOPIC_BODIES && window.TOPIC_BODIES[bodyKey]) || '';
    const hasBody = !!body;
    const navList = extractNav(body);
    const navCount = navList.length;
    const itemPicker = navCount > 0 ? `
        <select class="tcard__item-picker" data-genre="${g.id}" data-no="${escHtml(t.no)}" onclick="event.stopPropagation()">
          <option value="">— トピックを選んで開く —</option>
          ${navList.map(h => `<option value="${escHtml(h)}">${escHtml(h)}</option>`).join("")}
        </select>` : "";
    return `
      <article class="tcard" data-href="#/g/${g.id}/${t.no}">
        <div class="tcard__bar ${g.cov}"></div>
        <div class="tcard__no ${g.cov}">${escHtml(t.no)}</div>
        <h3 class="tcard__title">${escHtml(t.title)}</h3>
        <p class="tcard__sub">${escHtml(t.sub)}</p>
        ${itemPicker}
        <div class="tcard__cta">
          <span>${navCount > 0 ? navCount + "トピック" : "本文を読む"}${hasBody ? "" : "（準備中）"}</span>
          <span class="tcard__cta-arrow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
          </span>
        </div>
      </article>
    `;
  }).join("");

  const backHref = g.parent ? `#/g/${g.parent}` : "#/";
  const backLabel = g.parent ? (GENRES.find(x => x.id === g.parent)?.label || "戻る") + "へ戻る" : "コース一覧に戻る";
  return `
    <section class="detail">
      <a href="${backHref}" class="breadcrumb">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        <span>${backLabel}</span>
      </a>

      <div class="detail-hero ${g.cov}">
        <div class="detail-hero__num">${escHtml(g.label.length <= 6 ? g.label : g.label.slice(0,4))}</div>
        <span class="detail-hero__tag">${escHtml(g.label)}</span>
        <h1 class="detail-hero__title">${escHtml(g.title)}</h1>
        <p class="detail-hero__sub">${escHtml(g.sub)}</p>
        ${g.intro ? `<p class="detail-hero__sub" style="margin-top:14px">${escHtml(g.intro)}</p>` : ""}
        <div class="detail-hero__stats">
          <div class="detail-hero__stat"><div class="detail-hero__stat-num">${g.topics.length}</div><div class="detail-hero__stat-lbl">SECTIONS</div></div>
          <div class="detail-hero__stat"><div class="detail-hero__stat-num">${g.topics.reduce((s,t)=>s+(t.items?.length||0),0)}</div><div class="detail-hero__stat-lbl">TOPICS</div></div>
          <div class="detail-hero__stat"><div class="detail-hero__stat-num">${g.status === "open" ? "公開中" : "準備中"}</div><div class="detail-hero__stat-lbl">STATUS</div></div>
        </div>
      </div>

      <div class="detail-section">
        <div class="topic-list-header">
          <h2 class="detail-section__title">読みたいテーマを選択</h2>
          <div class="topic-picker-wrap">
            <label class="topic-picker-lbl">テーマを直接選ぶ</label>
            <select class="topic-picker" data-genre="${g.id}">
              <option value="">— テーマを選択 —</option>
              ${g.topics.map(tt => `<option value="${escHtml(tt.no)}">${escHtml(tt.no)}｜${escHtml(tt.title)}</option>`).join("")}
            </select>
          </div>
        </div>
        <div class="tcards">${cardsHtml}</div>
      </div>
    </section>
  `;
}

function bindGenreCardsEvents() {
  document.querySelectorAll(".tcard[data-href]").forEach(el => {
    el.addEventListener("click", () => { location.hash = el.dataset.href; });
  });
  // Topic picker dropdown — jump to selected topic body
  document.querySelectorAll(".topic-picker").forEach(sel => {
    sel.addEventListener("change", () => {
      const gid = sel.dataset.genre;
      const no = sel.value;
      if (gid && no) location.hash = `#/g/${gid}/${no}`;
    });
  });
  // Per-card item picker — navigate to topic AND scroll to selected item heading
  document.querySelectorAll(".tcard__item-picker").forEach(sel => {
    // Prevent dropdown clicks from triggering the article's click handler
    sel.addEventListener("click", e => e.stopPropagation());
    sel.addEventListener("mousedown", e => e.stopPropagation());
    sel.addEventListener("change", e => {
      e.stopPropagation();
      const gid = sel.dataset.genre;
      const no = sel.dataset.no;
      const itemText = sel.value;
      if (!gid || !no || !itemText) return;
      // Store the target item text in sessionStorage; will be read after topic body renders
      sessionStorage.setItem("scrollToItem", itemText);
      location.hash = `#/g/${gid}/${no}`;
    });
  });
}

/* ---------- LEVEL 3: TOPIC BODY VIEW ---------- */
function renderTopicBody(g, topicNo) {
  if (!g.topics || !g.topics.length) {
    location.hash = "#/g/" + g.id;
    return "";
  }
  const idx = Math.max(0, g.topics.findIndex(t => t.no === topicNo));
  const t = g.topics[idx];
  const prev = idx > 0 ? g.topics[idx - 1] : null;
  const next = idx < g.topics.length - 1 ? g.topics[idx + 1] : null;

  const bodyKey = t.bodyKey || `${g.id}/${t.no}`;
  const rawBody = (window.TOPIC_BODIES && window.TOPIC_BODIES[bodyKey]) ? window.TOPIC_BODIES[bodyKey] : "";
  const decoratedBody = rawBody ? decorateBody(rawBody, bodyKey) : "";
  const bodyOrEmpty = decoratedBody
    ? `<div class="body">${decoratedBody}</div>`
    : `<div class="empty"><h3>本セクションは準備中です</h3><p>近日、本部より公開予定です。</p></div>`;

  const itemsHtml = t.items?.length ? `
    <ul class="reader__items">
      <div class="reader__items-label">このセクションで扱うトピック</div>
      ${t.items.map(i => `<li>${escHtml(i)}</li>`).join("")}
    </ul>` : "";

  const navHtml = `
    <div class="reader__nav">
      <a class="reader__nav-btn ${prev ? "" : "is-disabled"}" ${prev ? `href="#/g/${g.id}/${prev.no}"` : ""}>
        <span class="reader__nav-lbl">← 前のテーマ</span>
        <span class="reader__nav-ttl">${prev ? escHtml(prev.no + " " + prev.title) : ""}</span>
      </a>
      <a class="reader__nav-btn reader__nav-btn--next ${next ? "" : "is-disabled"}" ${next ? `href="#/g/${g.id}/${next.no}"` : ""}>
        <span class="reader__nav-lbl">次のテーマ →</span>
        <span class="reader__nav-ttl">${next ? escHtml(next.no + " " + next.title) : ""}</span>
      </a>
    </div>
    <div class="reader__back-to-list">
      <a href="#/g/${g.id}" class="reader__back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 12l6-6M3 12l6 6"/></svg>
        テーマ一覧に戻る
      </a>
    </div>
  `;

  return `
    <section class="detail">
      <div class="breadcrumb">
        <a href="#/">コース一覧</a>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>
        <a href="#/g/${g.id}">${escHtml(g.label)}</a>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>
        <span>セクション ${escHtml(t.no)}</span>
      </div>

      <div class="detail-hero ${g.cov}">
        <div class="detail-hero__num">${escHtml(t.no)}</div>
        <span class="detail-hero__tag">${escHtml(g.label)} / セクション ${escHtml(t.no)}</span>
        <h1 class="detail-hero__title">${escHtml(t.title)}</h1>
        <p class="detail-hero__sub">${escHtml(t.sub)}</p>
        <div class="detail-hero__stats">
          <div class="detail-hero__stat detail-hero__stat--picker">
            <select class="detail-hero__picker" data-genre="${g.id}">
              ${g.topics.map(tt => `<option value="${escHtml(tt.no)}" ${tt.no === t.no ? "selected" : ""}>${escHtml(tt.no)}｜${escHtml(tt.title)}</option>`).join("")}
            </select>
            <div class="detail-hero__stat-lbl">テーマを選択（${idx + 1} / ${g.topics.length}）</div>
          </div>
          <div class="detail-hero__stat"><a class="detail-hero__stat-num" href="#/g/${g.id}" style="color:#fff;text-decoration:underline;text-underline-offset:4px">テーマ一覧へ ↑</a><div class="detail-hero__stat-lbl">BACK</div></div>
        </div>
      </div>

      <article class="reader__main">
        <div class="reader__topic-meta">
          <span class="reader__topic-no">${escHtml(t.no)}</span>
          <span class="reader__topic-tag">${escHtml(g.label)}</span>
        </div>
        <h2 class="reader__topic-title">${escHtml(t.title)}</h2>
        <p class="reader__topic-sub">${escHtml(t.sub)}</p>
        ${itemsHtml}
        ${bodyOrEmpty}
        ${navHtml}
      </article>
    </section>
  `;
}

function bindTopicBodyEvents() {
  // Theme picker dropdown — navigate to selected topic
  document.querySelectorAll(".detail-hero__picker").forEach(sel => {
    sel.addEventListener("change", () => {
      const gid = sel.dataset.genre;
      const no = sel.value;
      if (gid && no) location.hash = `#/g/${gid}/${no}`;
    });
  });

  // Item-scroll: if user picked an item on the topic-list page, scroll to its heading here
  const scrollTarget = sessionStorage.getItem("scrollToItem");
  if (scrollTarget) {
    sessionStorage.removeItem("scrollToItem");
    setTimeout(() => {
      const bodyEl = document.querySelector(".body");
      if (!bodyEl) return;
      // Normalize text for matching (collapse whitespace)
      const norm = s => (s || "").replace(/\s+/g, "").trim();
      const target = norm(scrollTarget);
      // Build candidate list of "section-like" elements
      const candidates = [
        ...bodyEl.querySelectorAll("h2, h3, h4, h5, h6"),
        ...bodyEl.querySelectorAll(".pat-card"),          // pat-card includes badge + title
        ...bodyEl.querySelectorAll(".pat-card__title"),
        ...bodyEl.querySelectorAll("p"),
        ...bodyEl.querySelectorAll("ul.docx-list > li"),
      ];
      // Score each candidate
      let best = null;
      let bestScore = 0;
      for (const el of candidates) {
        const txt = norm(el.textContent);
        if (!txt) continue;
        let score = 0;
        if (txt === target) score = 100;
        else if (txt.includes(target)) score = 80 - Math.min(40, txt.length - target.length);
        else if (target.includes(txt) && txt.length >= 6) score = 60 - Math.min(30, target.length - txt.length);
        if (score > bestScore) { best = el; bestScore = score; }
      }
      if (best) {
        // Scroll AFTER any pending scroll-to-top from render()
        requestAnimationFrame(() => {
          const rect = best.getBoundingClientRect();
          const top = window.scrollY + rect.top - 80;
          window.scrollTo({ top, behavior: "smooth" });
          // Brief highlight to draw attention
          const orig = best.style.background;
          best.style.transition = "background .4s";
          best.style.background = "#fef3c7";
          setTimeout(() => { best.style.background = orig; }, 2000);
        });
      } else {
        console.warn("scrollToItem: no match for", scrollTarget);
      }
    }, 300);
  }

  // Copy-to-clipboard for AI prompt cards (and any legacy prompt-card buttons)
  document.querySelectorAll(".ai-prompt__copy, .prompt-card__copy").forEach(btn => {
    btn.addEventListener("click", async () => {
      const text = btn.dataset.copy || "";
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          ta.remove();
        }
        btn.classList.add("is-copied");
        const span = btn.querySelector("span");
        const original = span ? span.textContent : "";
        if (span) span.textContent = "コピーしました ✓";
        setTimeout(() => {
          btn.classList.remove("is-copied");
          if (span) span.textContent = original || "コピー";
        }, 1500);
      } catch (err) {
        console.warn("Clipboard write failed:", err);
        const span = btn.querySelector("span");
        if (span) span.textContent = "コピー失敗";
      }
    });
  });

  // Expand/collapse toggle for AI prompt body
  document.querySelectorAll(".ai-prompt__toggle").forEach(btn => {
    btn.addEventListener("click", () => {
      const card = btn.closest(".ai-prompt");
      if (!card) return;
      const body = card.querySelector(".ai-prompt__body");
      const expanded = body.classList.toggle("is-expanded");
      btn.dataset.state = expanded ? "expanded" : "collapsed";
      btn.textContent = expanded ? "本文を折りたたむ ▲" : "全文を表示 ▼";
    });
  });
}
</script>
