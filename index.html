mg src=\"img/curriculum/business_04_df7e0fbd.png\" alt=\"商談進捗表\" loading=\"lazy\"></figure>\n<p>〇〇事業_年間KPIシート</p>", "business/05": "<p>サービス資料</p>\n<p><strong>｜</strong>サービス資料制作方法</p>\n<p>インタビューで言語化したものを【Genspark / Manus】 で教材化します。</p>\n<p>数章、数百ページにも及ぶ教材になるので、1つのタブでAIに指示をして作るのはNGです。</p>\n<p>1章毎にタブを分けて制作しないと容量が重くなりPCが止まる可能性があるので要注意です。</p>\n<div class=\"ph-img\" data-near=\"02｜なぜKPIシートが必要なのか\"></div>\n<p>プロンプトは、下記を使用してください。</p>\n<p>※別にあれば問題ないです。</p>\n<p>ーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーー</p>\n<p>スクール教材資料を作成します。</p>\n<p>添付したインタビュー資料の【　　　　】部分のみを作成してください。</p>\n<p>まず、4Pまで作成してください。トンマナや表現が適正か判断した上で進めるか否かを判断します。</p>\n<p># 目的</p>\n<p>この教材は、【受講者】を対象に、【学習テーマ】を学べるようにするためのものです。</p>\n<p># 前提条件</p>\n<p>- 添付したインタビュー資料を最優先の一次情報として扱ってください。</p>\n<p>- 内容を勝手な要約にしないのと、省くのをやめてください。</p>\n<p>- 話し言葉のニュアンスは活かしつつ、教材として読みやすい文章に整えてください。</p>\n<p>- 発言内容の意図や文脈を保ちながら整理してください。</p>\n<p>- 情報が不足している箇所は、断定的に補完せず、「補足説明」として一般化して記述してください。</p>\n<p>- インタビューの内容に基づく部分と、学習のために整理・補足した部分が自然につながるようにしてください。</p>\n<p>-タイトルとサブタイトルの作成もお願いします。</p>\n<p>#見る人の想定</p>\n<p>┗ </p>\n<p># デザイン指定</p>\n<p>┗</p>\n<p># 必ず含める要素</p>\n<p>可能な範囲で以下を含めてください。</p>\n<ul class=\"docx-list\"><li>この章で学ぶこと</li><li>インタビュー内容を踏まえた要点整理</li><li>実務・現場での意味づけ</li><li>具体例</li><li>受講者がつまずきやすいポイント</li><li>理解確認のための小まとめ</li></ul>\n<p># 教材としての再構成ルール</p>\n<p>- 単なるインタビューの書き起こしにはしないでください。</p>\n<p>- 受講者が理解しやすい順番に並び替えてください。</p>\n<p>- 重複表現や冗長な部分は整理してください。</p>\n<p>- 抽象的な話は、できるだけ具体例やケースに落とし込んでください。</p>\n<p>- 必要に応じて、箇条書き、表、比較整理、を使ってください。</p>\n<p>- 専門用語が出る場合は、やさしく説明してください。</p>\n<p># 品質要件</p>\n<p>- 教材としてそのまま使える完成度にしてください。</p>\n<p>- わかりやすさを最優先しつつ、内容の薄い一般論にしないでください。</p>\n<p>- 添付資料の価値が伝わるように、発言のエッセンスを活かしてください。</p>\n<p>- 読み手が「現場で使える」と感じる実践性を持たせてください。</p>\n<p>- 冗長な説明は避け、要点が自然に頭に入る構成にしてください。。</p>\n<p>ーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーー</p>", "business/06": "<p>使用するAIエージェントの使用方法</p>\n<h3>Genspark（ジェンスパーク）：初心者向け</h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/business_06_6033b27a.png\" alt=\"Genspark（ジェンスパーク）：初心者向け\" loading=\"lazy\"></figure>\n<p>【概要】</p>\n<p>GPT・Claude・Geminiなど9種以上のLLMと80以上の専門ツールを自動で組み合わせる「Mixture-of-Agents」型プラットフォーム。2025年4月のSuper Agentリリースにより、リサーチ→分析→スライド生成→電話代行まで一つの指示で完結できるオールインワンAIに進化しました。</p>\n<div class=\"ph-img\" data-near=\"運用の基本フロー\"></div>\n<p>【主な機能】</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/business_06_cf0a1682.png\" alt=\"Genspark（ジェンスパーク）【主な機能】\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>　・ディープリサーチ（複数ソース統合）</li><li>　・AIスライド自動生成→資料制作利用</li><li>　・画像・動画生成</li><li>　・電話代行・予約自動化</li><li>　・AI Sheets（スプレッドシート）</li><li>　・AI Drive（資料収集・整理）</li><li>　・ファクトチェック機能</li><li>　・リアルタイムWeb検索</li></ul>\n<div class=\"ph-img\" data-near=\"運用の基本フロー\"></div>\n<p>【向いている業務】</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/business_06_d1ce3a06.png\" alt=\"Genspark（ジェンスパーク）【向いている業務】\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li> 市場調査・競合分析</li></ul>\n<p>　複数ソースを横断した調査レポートを短時間で生成</p>\n<ul class=\"docx-list\"><li> 資料・プレゼン作成</li></ul>\n<p>　調査→スライド化まで一連で完結</p>\n<ul class=\"docx-list\"><li> コンテンツ制作</li></ul>\n<p>　SNS・広告用の画像・動画を内製化</p>\n<ul class=\"docx-list\"><li> アポ・予約管理</li></ul>\n<p>　電話代行AIでバックオフィス負担を削減</p>\n<ul class=\"docx-list\"><li> 新規事業リサーチ</li></ul>\n<p>　戦略レポート・事例分析を高速作成</p>\n<ul class=\"docx-list\"><li> マーケティングPDCA</li></ul>\n<p>　データ収集〜施策立案まで一貫自動化</p>\n<p>「調べる・まとめる・作る」を一気通貫でやりたい場合に最適です。複数ツールを行き来していた作業を1つに集約したい方に向いています。</p>\n<div class=\"ph-img\" data-near=\"運用の基本フロー\"></div>\n<h3>Manus（マヌス）：中級者向け</h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/business_06_77c3e529.png\" alt=\"Manus（マヌス）：中級者向け\" loading=\"lazy\"></figure>\n<p>【概要】</p>\n<p>2025年3月にリリースされ、2025年12月にMetaが約20億ドルで買収した完全自律型AIエージェント。指示を出した後は人間が見守らなくてもクラウド環境で処理が継続し、計画→実行→成果物納品まで自律完結します。GAIAベンチマークでOpenAIを上回る性能を記録しています。</p>\n<div class=\"ph-img\" data-near=\"運用の基本フロー\"></div>\n<p>【主な機能】</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/business_06_dc102081.png\" alt=\"Manus（マヌス）【主な機能】\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>　・完全自律タスク実行（バックグラウンド処理）</li><li>　・Webスクレイピング・データ収集</li><li>　・コード生成・ファイル操作</li><li>　・Playbook（定期タスク自動化）</li><li>　・Schedule Task（スケジュール実行）</li><li>　・Salesforce・Slack・Excel等との連携</li><li>　・財務モデリング・データ分析</li><li>　・プロセス可視化</li></ul>\n<div class=\"ph-img\" data-near=\"運用の基本フロー\"></div>\n<p>【向いている業務】</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/business_06_2cb12cca.png\" alt=\"Manus（マヌス）【向いている業務】\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li> 定期レポート自動化</li></ul>\n<p>　毎週・毎月の競合調査・売上レポートを自動生成</p>\n<ul class=\"docx-list\"><li> 財務・経営分析</li></ul>\n<p>　複数社の決算データ収集→比較レポート化</p>\n<ul class=\"docx-list\"><li> 採用・HR業務</li></ul>\n<p>　履歴書スクリーニング・面接日程調整の自動化</p>\n<ul class=\"docx-list\"><li> 営業支援</li></ul>\n<p>　CRMデータ分析・アプローチ提案の自動化</p>\n<ul class=\"docx-list\"><li> プロジェクト管理</li></ul>\n<p>　タスク自動作成・進捗更新</p>\n<ul class=\"docx-list\"><li> DX・業務自動化</li></ul>\n<p>　複数システムをまたぐ繰り返し作業の完全自動化</p>\n<p>「指示したら完成まで任せたい」複雑な長時間タスクに最適です。定型業務の自動化・DX推進を目指す場合の切り札になります。</p>\n<div class=\"ph-img\" data-near=\"運用の基本フロー\"></div>\n<h3>Claude AI（クロードAI）：上級者向け</h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/business_06_15048621.png\" alt=\"Claude AI（クロードAI）：上級者向け\" loading=\"lazy\"></figure>\n<p>【概要】</p>\n<p>Anthropic社が開発する大規模言語モデル型AIアシスタント。安全性・誠実性・思考の深さを設計思想の核に据えており、長文・複雑な文脈の理解と生成において高い精度を発揮します。対話を通じてタスクを進める「思考パートナー」としての用途に優れています。</p>\n<div class=\"ph-img\" data-near=\"運用の基本フロー\"></div>\n<p>【主な機能】</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/business_06_735dee91.png\" alt=\"Claude AI（クロードAI）【主な機能】\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>　・長文ドキュメントの読解・要約</li><li>　・文章・コピーライティング生成</li><li>　・コード生成・デバッグ</li><li>　・論理的思考・戦略立案</li><li>　・プロジェクトメモリ管理</li><li>　・API連携・開発支援</li><li>　・ロールプレイ・シミュレーション</li></ul>\n<div class=\"ph-img\" data-near=\"運用の基本フロー\"></div>\n<p>【向いている業務】</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/business_06_c8459671.png\" alt=\"Claude AI（クロードAI）\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li> 営業・セールス</li></ul>\n<p>　提案書・トークスクリプト・メール文面の作成</p>\n<ul class=\"docx-list\"><li> マーケティング</li></ul>\n<p>　LP文章・SNS投稿・広告コピーの生成</p>\n<ul class=\"docx-list\"><li> 戦略立案</li></ul>\n<p>　事業計画・競合整理・KPI設計の壁打ち</p>\n<ul class=\"docx-list\"><li> 教育・研修</li></ul>\n<p>　カリキュラム設計・テスト問題・解説文作成</p>\n<ul class=\"docx-list\"><li> エンジニアリング</li></ul>\n<p>　コード生成・レビュー・ドキュメント整備</p>\n<ul class=\"docx-list\"><li> 社内文書</li></ul>\n<p>　規定・マニュアル・議事録・報告書の作成</p>\n<p>「考える・書く・整理する」を軸にした業務に最も適しています。AIとの対話を通じて思考を深めたい場合使用します。</p>\n<p>Claude Designは高品質な資料を作成する事が可能です。\n</p>\n<div class=\"ph-img\" data-near=\"運用の基本フロー\"></div>", "payment/01": "<h3><strong>｜決済システムについて</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/payment_01_system.png\" alt=\"決済システムについて\" loading=\"lazy\"></figure>\n<p>スクール事業において、決済システムの選定は売上の安定性に直結する重要な経営判断です。「良いサービスを作り、集客し、成約できた」にもかかわらず、決済設計の甘さによってキャッシュフローが崩れるケースは珍しくありません。</p>\n<p>BtoC事業の構造上、受講料を分割払いで受け取ると、売上は立っているにもかかわらず実際の入金が数ヶ月後にずれ込みます。固定的な支出が毎月発生する場合は、売上と入金のタイミングのズレが積み重なると、黒字であってもキャッシュが回らない状況に陥ります。これがBtoC事業においてキャッシュフローが不安定になりやすい根本的な理由です。※事業が成り立たない可能性があります\n\n</p>\n<p>この問題を解消するのが、以下に紹介する決済サービスです。顧客側は分割払いで支払いができる一方、事業者側には販売価格が一括で入金される仕組みになっており、キャッシュフローを安定させながら顧客の購入ハードルを下げることが同時に実現できます。→受注率にも影響してきます\n</p>\n<p>また、決済サービスの選定においては、<strong>国内サービスを優先することを強く推奨します</strong>。海外決済サービスは機能面で優れているように見えますが、規約変更やリスク審査によって予告なくアカウントが停止（BAN）されるリスクがあります。売上の入金が突然止まる事態は事業継続に直結するため、サポート体制が整った国内サービスを基盤に据えることが安全です。</p>\n<div class=\"ph-img\" data-near=\"｜決済システムについて\"></div>\n<figure class=\"curriculum-img\"><img src=\"img/curriculum/payment_01_comparison.png\" alt=\"ユニバペイとマネフォの比較\" loading=\"lazy\"></figure><h4><strong>ユニバペイ（<a href=\"https://univapay.com/\" target=\"_blank\" rel=\"noopener\">https://univapay.com/</a>）</strong></h4>\n<p>国内のスクール事業者・コンサルタント・コーチング事業者を中心に広く利用されている決済サービスです。</p>\n<p>最大の特徴は、顧客が分割払いを選択した場合でも、事業者への入金が一括で完了する点です。通常の分割払いでは事業者も月々の入金を待つ必要がありますが、ユニバペイを利用することでその待ちが発生しません。高単価なスクールサービスにおいて、成約のタイミングで売上をそのままキャッシュに変えられる点は、資金繰りの安定に大きく寄与します。</p>\n<p>また、申込から入金までの処理がオンラインで完結するため、対面・非対面を問わず利用できます。セールス後にURLを送るだけで決済が完了する手軽さも、現場での運用コストを下げる要因です。</p>\n<p><strong>※手数料は変わっている場合があるので面談時等に聞いてみてください</strong></p>\n<h4><strong>マネーフォワード決済（<a href=\"https://mfkessai.co.jp/\" target=\"_blank\" rel=\"noopener\">https://mfkessai.co.jp/</a>）</strong></h4>\n<p>マネーフォワードが提供する国内決済サービスです。クレジットカード決済・口座振替・コンビニ払いなど複数の支払い手段に対応しており、顧客の決済手段の選択肢を広げることができます。</p>\n<p>ユニバペイ・ファーストペイメントとの大きな違いは、月額課金（サブスクリプション）や継続課金の管理に強い点です。スクール事業においてコミュニティ費用・月次サポート費用などの継続収益を設計する場合、マネーフォワード決済との組み合わせが有効です。</p>\n<p>また、マネーフォワードの会計・経費管理ツールとの連携がスムーズなため、売上データの管理・経理処理の効率化という観点でも導入メリットがあります。事業が拡大するにつれて煩雑になる経理業務を、早い段階から整備しておくことは経営上の優先事項の一つです。</p>\n<p><strong>※手数料は変わっている場合があるので面談時等に聞いてみてください</strong></p>\n<p>どれか一個あればいいというわけではないので、一応全て審査に通しましょう。</p>\n<div class=\"ph-img\" data-near=\"マネーフォワード決済（https://mfkessai.co.jp/）\"></div>", "payment/02": "<h3><strong>決済審査に必要な準備物</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/payment_02_prep.png\" alt=\"決済審査に必要な準備物\" loading=\"lazy\"></figure>\n<p>決済サービスの審査を通過するためには、事前に以下の3点を準備しておく必要があります。</p>\n<div class=\"ph-img\" data-near=\"決済審査に必要な準備物\"></div>\n<h4><strong>01｜サービスページ／LP（ランディングページ）</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/payment_02_lp.png\" alt=\"01｜サービスページ／LP（ランディングページ）\" loading=\"lazy\"></figure>\n<p>決済会社の審査では、サービスの実態を確認するためにLPの提出が求められます。その際、以下の法的ページが必ず必要になります。</p>\n<ul class=\"docx-list\"><li>特定商取引法に基づく表記</li><li>プライバシーポリシー</li><li>利用規約</li></ul>\n<p>LPを外注で制作する場合、費用は30万円〜が相場です。ただし、審査用途であればAIエージェントのClaude AIを使用することで、コストをかけずに作成できます。モードはSonnetで問題ありません。</p>\n<p><strong>Claude AIへの指示文（プロンプト）</strong></p>\n<p>以下をそのままClaude AIに貼り付け、各項目を埋めて使用してください。</p>\n<p>以下の情報をもとに、LP（ランディングページ）と法的4ページをHTMLで作成してください。</p>\n<ul class=\"docx-list\"><li> サービス情報</li></ul>\n<p>- サービス名：</p>\n<p>- サービス内容（一言で）：</p>\n<p>- ターゲット：</p>\n<p>- 受講・提供形式：</p>\n<p>- 料金：（表示する / しない）</p>\n<ul class=\"docx-list\"><li> 会社情報</li></ul>\n<p>- 販売事業者名：</p>\n<p>- 販売事業者所在地：</p>\n<p>- 運営統括責任者：</p>\n<p>- ホームページ：</p>\n<p>- メールアドレス：</p>\n<p>- 電話番号：</p>\n<p>- 設立：</p>\n<p>- 資本金：</p>\n<ul class=\"docx-list\"><li> デザイン</li></ul>\n<p>- カラーイメージ：</p>\n<p>- フォント指定あれば：</p>\n<p>- 絵文字：使用しない</p>\n<ul class=\"docx-list\"><li> LP構成（以下のセクションを全て作成）</li><li>ヘッダー（固定・ロゴ＋ナビ＋CTAボタン）</li><li>ファーストビュー（キャッチコピー＋サブテキスト＋統計3点＋右カラムカード）</li><li>こんな悩みはありませんか？（カード3枚）</li><li>本サービスが解決すること（VS比較表）</li><li>カリキュラム構成（カード6枚）</li><li>個別打ち合わせの流れ（STEP4つ）</li><li>受講者の声（カード3枚）</li><li>担当者プロフィール（実績カード3点＋プロフィール文）</li><li>受講プラン（Standard＋Optionの2カラム・価格は空欄）</li><li>よくある質問（8問・デフォルト全展開）</li><li>受講までの流れ（STEP4つ）</li><li>フッター（会社情報・リーガルリンク）</li><li> 法的4ページ（各ページ個別ファイルで作成）</li></ul>\n<p>- tokushoho.html：特定商取引法に基づく表記</p>\n<p>  　クーリングオフは赤枠・赤字で明示</p>\n<p>  　支払方法はクレジットカード・銀行振込のみ</p>\n<p>- privacy.html：プライバシーポリシー</p>\n<p>- terms.html：利用規約</p>\n<p>  　反社条項・成果保証しない旨・準拠法（東京地裁）を含む</p>\n<p>- company.html：会社概要</p>\n<ul class=\"docx-list\"><li> 技術要件</li></ul>\n<p>- 全5ファイル（index.html / tokushoho.html / privacy.html / terms.html / company.html）</p>\n<p>- 外部フォントはGoogle Fonts（Oswald・Noto Sans JP）</p>\n<p>- フェードインアニメーションは使用しない（opacity:1で常時表示）</p>\n<p>- Cloudflareのメール難読化が入らないよう、メールアドレスはhref=\"mailto:\"形式で記述</p>\n<p>- レスポンシブ対応（768px以下でモバイルレイアウト）</p>\n<p>- 各法的ページからindex.htmlに戻るリンクを設置</p>\n<p>- フッターに特商法・PP・利用規約・会社概要へのリンクを設置</p>\n<p>- Netlify Dropでそのまま公開できる状態で納品</p>\n<p>修正が必要な箇所は「〇番のセクションの〇〇を〜に変更して」とピンポイントで指示してください。</p>\n<div class=\"ph-img\" data-near=\"01｜サービスページ／LP（ランディングページ）\"></div>\n<h5><strong>LP作成後の公開手順</strong></h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/payment_02_lp_publish.png\" alt=\"LP作成後の公開手順\" loading=\"lazy\"></figure>\n<p>作成したHTMLファイルは、以下のフローで公開します。</p>\n<p><strong>STEP 1｜Netlifyへアップロード\n</strong> Netlify は無料で使用できるホスティングサービスです。作成したファイルをZip形式にまとめてアップロードするだけで、URLが発行されます。アカウント登録（メールアドレス）が必要です。</p>\n<p><strong>STEP 2｜人の目で最終確認</strong> 公開前に、表示崩れ・法的ページの記載漏れ・リンク切れがないか、必ず人の目で確認してください。\n</p>\n<p><strong>STEP 3｜決済会社へ審査提出</strong> 発行されたURLを決済会社の審査フォームに提出します。\n</p>\n<p><strong>STEP 4｜正式公開（デプロイ）</strong> 審査通過後、WebへのLPの一般公開作業（デプロイ）を行います。エンジニア作業が発生するため、外注をおすすめします。不明点は担当者までお問い合わせください。\n</p>\n<p>※事業によっては契約書の提出が必要なケースもあります。　詳細は法務・契約書のセクションで説明します。\n</p>\n<div class=\"ph-img\" data-near=\"01｜サービスページ／LP（ランディングページ）\"></div>", "payment/03": "<h4><strong>02｜契約書</strong></h4>\n<p>法務・契約書のセクションで別途説明します。</p>\n<div class=\"ph-img\" data-near=\"02｜契約書\"></div>", "payment/04": "<h4><strong>03｜営業資料</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/payment_04_sales_doc.png\" alt=\"サービス資料制作方法\" loading=\"lazy\"></figure>\n<p>営業資料は <strong>Genspark</strong> または <strong>Manus</strong> を使用して作成します。トンマナは、サービス資料で作成したものをテンプレートとして流用します。\n</p>\n<p>なお、BtoC商品における価格はすべて税込表示で記載することが必須です。</p>\n<div class=\"ph-img\" data-near=\"03｜営業資料\"></div>\n<p><strong>営業資料への指示文（プロンプト）</strong></p>\n<p>以下をそのまま貼り付け、各項目を埋めて使用してください。</p>\n<p>あなたはプロのビジネスデザイナーです。</p>\n<p>以下の仕様に基づき、サービス説明資料を作成してください。</p>\n<ul class=\"docx-list\"><li> 基本情報（穴埋め）</li></ul>\n<p>- 運営会社名：</p>\n<p>- サービス名：</p>\n<p>- サービスキャッチコピー：（例：〇〇を最短で習得する）</p>\n<p>- サービスサブキャッチ：（例：〇〇 × 〇〇 × 〇〇で現場に直結するスキルを体系的に構築）</p>\n<p>- ターゲット：（例：未経験者 / スキルをアップデートしたい社会人 / 法人向け）</p>\n<p>- 価格（ベースプラン）：（例：¥〇〇〇,000（税込））</p>\n<p>- 価格（上位プラン）：（例：+¥〇〇〇,000（税込））</p>\n<p>- 運営会社所在地：</p>\n<p>- 運営統括責任者：</p>\n<p>- ホームページURL：</p>\n<ul class=\"docx-list\"><li> デザイン仕様</li></ul>\n<p>- カラーパレット：（例：ダークネイビー×ホワイト×ゴールド）</p>\n<p>- フォント：（例：見出し＝Arial Black、本文＝Calibri）</p>\n<p>- トンマナ：（例：プロフェッショナル×信頼感 / 親しみやすい×実践的）</p>\n<p>- スライドサイズ：16:9</p>\n<ul class=\"docx-list\"><li> 表現ルール（必須）</li></ul>\n<p>以下の表現は一切使用しないこと：</p>\n<p>「稼ぐ」「稼げる」「収入アップ」「副業で〇万円」「月収〇万円」</p>\n<p>「不労所得」「権利収入」「資産形成」「お金の自由」</p>\n<p>「独立して〇〇万円」などの収益訴求</p>\n<p>「今すぐ始めれば遅くない」などの煽り表現</p>\n<p>代わりに以下の軸で価値を表現すること：</p>\n<p>- スキル習得・構築（「〇〇スキルを体系的に習得できる」）</p>\n<p>- 事業・活動の立ち上げ（「新しい事業領域に踏み出すための基盤をつくる」）</p>\n<p>- 実践力の獲得（「現場で即通用する実践力を身につける」）</p>\n<p>- 自律的なキャリア形成（「自分で判断・行動できる力を養う」）</p>\n<p>- 組織・チームへの貢献（「学んだことをチームや組織に還元できる」）</p>\n<ul class=\"docx-list\"><li> 必須セクション</li></ul>\n<p>表紙 / 市場背景 / 課題詳細 / バリュープロポジション / カリキュラム /</p>\n<p>料金プラン / 修了後のステップ・活動支援 / まとめ・次の一歩（CTA） /</p>\n<p>特定商取引法に基づく表記</p>\n<p>各セクションの詳細仕様：</p>\n<p>【表紙】</p>\n<p>サービス名・キャッチコピー・サブキャッチ・「サービス説明資料」のラベルを配置</p>\n<p>ダークカラー背景でプレミアム感を演出</p>\n<p>【市場背景】</p>\n<p>市場規模・需要トレンド・課題の深刻度・テクノロジーや環境変化のインパクトを数値で視覚化</p>\n<p>需要側と供給側のギャップ図を含める</p>\n<p>【課題詳細】</p>\n<p>スキル・知識不足 / プロセス・連携の不全 / テクノロジー活用の壁、の3軸で構成</p>\n<p>各課題にANALYSIS（現状・原因）/ SOLUTION（解決策）/ IMPACT（変化指標）を記載</p>\n<p>Before/Afterの対比レイアウトを活用</p>\n<p>【バリュープロポジション】</p>\n<p>3つの価値軸（実践力の習得 / スピード / 再現性 など）を上部に配置</p>\n<p>Before（現状の課題）→ After（習得・構築後の変化）を対比で表現</p>\n<p>「できるようになること」軸で記載し、収益訴求は使わない</p>\n<p>【カリキュラム】</p>\n<p>全体像（段階フロー）と各モジュール詳細を分けて掲載</p>\n<p>Module 0（共通土台）から応用・テクノロジー活用まで段階的に設計</p>\n<p>各モジュールにサブタイトルと主要トピック3点を記載</p>\n<p>【料金プラン】</p>\n<p>ベースプランと上位プランを並列表示</p>\n<p>各プランの含まれる内容・支払方法・提供方法を明記</p>\n<p>【修了後のステップ・活動支援】</p>\n<p>修了後に取り組める活動・事業領域をカード形式で紹介</p>\n<p>「できるようになること」「立ち上げられる活動領域」で表現</p>\n<p>収益金額・案件保証などの訴求は一切使わない</p>\n<p>【まとめ・次の一歩（CTA）】</p>\n<p>なぜ今このスキル・知識の習得が必要かを2〜3文で記載</p>\n<p>（「環境変化への対応」「新しい事業・活動の基盤づくり」軸）</p>\n<p>無料体験・個別相談・資料請求の3つのCTAをカード形式で配置</p>\n<p>【特定商取引法に基づく表記】</p>\n<p>販売事業者名・所在地・責任者・URL・連絡先</p>\n<p>価格・支払・引渡・クーリングオフに関する法定記載</p>\n<p>フッターに著作権表記</p>\n<ul class=\"docx-list\"><li> デザイン共通ルール</li></ul>\n<p>- 全スライドにサービス名をフッターまたはヘッダーに配置</p>\n<p>- 数値データは大きなフォント（60〜72pt）で強調表示</p>\n<p>- アイコン付き説明文はアイコン→太字見出し→説明文の3層構造</p>\n<p>- Before/After対比には色分け背景（課題=グレー系、解決=アクセントカラー）</p>\n<p>- 各スライドに英語サブタイトル（例：\"01 Market Trends\"）を左上に小さく配置</p>\n<p>- タイトル下のアクセントラインは使わず、余白で視覚的分離を行う</p>\n<p>- 表紙と締めスライドはダーク背景、中間スライドはライト背景（サンドイッチ構造）</p>\n<p>修正が必要な箇所は「〇Pの〇〇を〜に変更して」とピンポイントで指示してください。</p>", "hr/01": "<h3><strong>CS採用・給料設定について</strong></h3>\n<h4><strong>01｜給料設定</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/hr_01_salary.png\" alt=\"01｜給料設定\" loading=\"lazy\"></figure>\n<p>給料設定は、自社サービスの粗利率をどこに設定するか、および外注比率によって変わります。CSスタッフの経験・スキルレベルによって単価は異なりますが、採用初期の目安として時給2,000円からスタートするのが適切です。事業が軌道に乗り、スタッフの習熟度が上がった段階で単価を見直す形で問題ありません。\n</p>", "hr/02": "<h4><strong>ラダー（等級別）給料設計</strong></h4>\n<p>等級は業務の習熟度と担当できる範囲を基準に3段階で設計します。昇格の判断は、単純な在籍期間ではなく「できること」の範囲で行うことを推奨します。※下記はあくまで例になります\n</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>等級</strong></th><th><strong>呼称</strong></th><th><strong>時給目安</strong></th><th><strong>習熟度・担当範囲</strong></th></tr></thead><tbody><tr><td>Lv.1</td><td>ジュニアCS</td><td>¥2,000〜¥2,500</td><td>マニュアルに沿った対応ができる。受講生からの基本的な質問・進捗確認・連絡対応を担当。イレギュラーは上位者にエスカレーション</td></tr><tr><td>Lv.2</td><td>ミドルCS</td><td>¥2,500〜¥3,500</td><td>マニュアル外の対応が自己判断でできる。受講生の離脱兆候の検知・個別フォロー・アップセル提案の補助まで担当できる</td></tr><tr><td>Lv.3</td><td>シニアCS／リードCS</td><td>¥3,500〜¥5,000</td><td>CS全体の品質管理・ジュニアへの指導・マニュアル改善・KPI管理まで担当できる。実質的なCS責任者ポジション</td></tr></tbody></table></div>\n<div class=\"ph-img\" data-near=\"ラダー（等級別）給料設計\"></div>", "hr/03": "<h4><strong>02｜昇格の判断基準</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/hr_03_promotion.png\" alt=\"02｜昇格の判断基準\" loading=\"lazy\"></figure>\n<p>昇格は以下の基準を目安に判断してください。在籍期間だけで昇格を決めると、給与コストが上がるだけでパフォーマンスが変わらないケースが発生するため注意が必要です。</p>\n<p><strong>Lv.1 → Lv.2</strong></p>\n<ul class=\"docx-list\"><li>マニュアル対応の習熟が完了している</li><li>エスカレーション件数が月間で一定水準以下に収まっている</li><li>受講生からのクレームが発生していない</li><li>稼働開始から概ね1〜2ヶ月が目安</li></ul>\n<p><strong>Lv.2 → Lv.3</strong></p>\n<ul class=\"docx-list\"><li>担当受講生の継続率・満足度が安定している</li><li>アップセル提案の実績がある</li><li>ジュニアCSのフォローが自発的にできている</li><li>稼働開始から概ね3〜6ヶ月が目安</li></ul>\n<div class=\"ph-img\" data-near=\"02｜昇格の判断基準\"></div>", "hr/04": "<h4><strong>03｜CS採用方法</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/hr_04_cs_hiring.png\" alt=\"03｜CS採用方法\" loading=\"lazy\"></figure>\n<p>CSスタッフの採用には、主に以下の3つの方法があります。</p>\n<ul class=\"docx-list\"><li><strong>1. クラウドワークス</strong> 業務委託前提でスキルのある人材を探しやすく、稼働時間や単価の調整がしやすい点が特徴です。スクール事業のCS業務に適した人材が集まりやすい媒体です。\n</li><li><strong>2. 知り合いへの声がけ</strong> 信頼関係がある分、採用後のミスマッチが起きにくく、初期フェーズでは最もリスクの低い方法です。業務内容をある程度理解してもらいやすいため、立ち上げ期の採用として特におすすめです。\n</li><li><strong>3. 顧客・過去のお客さんへの声がけ</strong> サービスの内容を熟知しており、受講生目線でCSができる人材を確保できる点が強みです。サービスへの理解度が高いため、即戦力になりやすいです。\n</li><li><strong>4.採用媒体（求人サイト）について\n</strong>採用媒体を活用する方法もありますが、月額固定・160時間フル稼働前提の候補者や、時給単価が高い人材が集まりやすい傾向があります。業務委託・フレキシブルな稼働を前提とするスクール事業のCS採用においては、上記3つの方法を優先することをおすすめします。</li></ul>\n<p>ただし、正式な雇用契約として採用したい場合は、採用媒体の活用も選択肢の一つです。自社の採用方針に応じて判断してください。</p>\n<div class=\"ph-img\" data-near=\"03｜CS採用方法\"></div>", "hr/05": "<h4><strong>04｜採用後の契約手続き</strong></h4>\n<p>採用が決まったら、必ず業務委託契約書を締結してください。契約書のテンプレートを本カリキュラム内に添付しています。自社のサービス内容および給料単価の箇所を書き換えたうえで使用してください。</p>\n<p><strong>使用時の注意点</strong></p>\n<p>テンプレートを使用する際は、必ず元ファイルをコピーしてから編集してください。原本を直接編集しないようにしてください。</p>\n<p>カスタマーサクセス業務委託契約書.docx ※コピーで使用.docx</p>", "ig/01": "<figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_01_intro.png\" alt=\"はじめに ― 全体像と使い方\" loading=\"lazy\"></figure><p>Instagramについて</p>\n<p><strong>｜Instagram運用について</strong></p>\n<p><strong>はじめに ― 全体像と使い方</strong></p>\n<p>Instagramのリール運用による認知拡大から、ストーリーズを活用した信頼構築、セールス・CV設計に至るまでの全工程をカバーしております。</p>\n<p>Instagramで成果を出すための大原則は、<strong>「リールで人を集め、ストーリーズで売上に変換する」</strong> という役割分担を正しく理解することです。この順番と構造を理解した上で運用を進めてください。</p>\n<p>また、初期段階では数値目標を意識しすぎる必要はありません。まずは投稿することを最優先とし、反応を見ながら修正と改善を繰り返すことが、成果への最短ルートです。<strong>「まず投稿する」</strong> ― これが<strong>最重要指針</strong>です。うまくいってない人の9割が『投稿していない』事になります。これは弊社が支援してきた会社や個人の方でも、共通している点になります。\n\n\n</p>\n<div class=\"ph-img\" data-near=\"04｜採用後の契約手続き\"></div>\n<h3><strong>Instagram運用の原則</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_01_principles.png\" alt=\"Instagram運用の原則\" loading=\"lazy\"></figure>\n<p>Instagramの運用は、1本1本の投稿を感覚で積み上げるものではない。再現可能な勝ちパターンを発見し、量産するという一点に尽きる。サロンのオーナーが多忙な中でこのアカウント運用を成立させるためには、「なんとなく良さそう」ではなく「数字で判断する」運用姿勢が必須となる。</p>\n<h4><strong>運用で追うべき指標</strong></h4>\n<p>Instagramには多くの指標があるが、店舗アカウント運用で本当に見るべき指標は以下に絞られる。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>指標</strong></th><th><strong>意味</strong></th><th><strong>重要度</strong></th></tr></thead><tbody><tr><td>スキップ率</td><td>最初の数秒で離脱した人の割合</td><td>★★★</td></tr><tr><td>再生数</td><td>投稿が届いた回数</td><td>★★☆</td></tr><tr><td>保存数</td><td>「後で見たい／憧れる」と感じた数</td><td>★★☆</td></tr><tr><td>フォロワー増</td><td>その投稿経由で増えたフォロワー</td><td>★★★</td></tr><tr><td>いいね数</td><td>軽い好意を示す指標</td><td>★☆☆</td></tr><tr><td>コメント数</td><td>関心の深さを示す指標</td><td>★☆☆</td></tr></tbody></table></div>\n<h4><strong>見誤りやすい指標の読み方</strong></h4>\n<p><strong>再生数の平均値だけで運用を評価してはいけない</strong>。平均値は一部のバズ投稿に引っ張られるため、実態を反映しない。運用診断の本質は「中央値（真ん中の投稿の数字）」にある。</p>\n<p>例：投稿40本で総再生100万回、平均26,000回のアカウントでも、中央値は5,000回ということがある。これは「一部の当たり投稿が平均を引き上げているだけで、大半の投稿は5,000再生前後で停滞している」という意味。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>運用の本質</strong><br/>目標にすべきは平均ではなく中央値の上昇である。</th></tr></thead></table></div>\n<div class=\"ph-img\" data-near=\"見誤りやすい指標の読み方\"></div>\n<h4><strong>アカウントの成長ステージ</strong></h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>ステージ</strong></th><th><strong>フォロワー数</strong></th><th><strong>やるべきこと</strong></th></tr></thead><tbody><tr><td>初期</td><td>〜1,000</td><td>勝ちテンプレの発見に集中。ノウハウ投稿は封印</td></tr><tr><td>成長期</td><td>1,000〜5,000</td><td>勝ちテンプレの量産。安定して伸ばす</td></tr><tr><td>転換期</td><td>5,000〜20,000</td><td>テンプレ＋ノウハウ＋ブランド構築の混合</td></tr><tr><td>安定期</td><td>20,000〜</td><td>ジャンル拡張・収益化導線の本格化</td></tr></tbody></table></div>\n<p><strong>店舗アカウントの多くは初期〜成長期に該当する</strong>。このステージでは、知識系や店舗紹介系の投稿よりも、勝ちテンプレを発見して量産することが最優先となる。</p>", "ig/02": "<h3><strong>プロフィールで測る「転換率」という概念</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_02_conversion.png\" alt=\"プロフィールで測る「転換率」という概念\" loading=\"lazy\"></figure>\n<p>プロフィールは「見られる場所」ではなく、<strong>投稿からフォローへ転換させる場所</strong>である。どれだけ投稿がバズっても、プロフィールが弱ければフォロワーは増えない。</p>\n<h4><strong>フォロワー転換率の算出方法</strong></h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>転換率の公式</strong><br/>フォロワー転換率 = 投稿1本あたりのフォロワー増 ÷ その投稿の再生数</th></tr></thead></table></div>\n<p>この数字でプロフィール設計の良し悪しを客観的に判断できる。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>転換率</strong></th><th><strong>診断</strong></th><th><strong>原因</strong></th></tr></thead><tbody><tr><td>0.3%以上</td><td>優秀</td><td>投稿とプロフィールの一貫性あり</td></tr><tr><td>0.1〜0.3%</td><td>標準</td><td>プロフィール改善の余地あり</td></tr><tr><td>0.1%未満</td><td>課題あり</td><td>バズっても登録動機が生まれていない</td></tr></tbody></table></div>\n<h4><strong>重要な示唆</strong></h4>\n<p>再生数が最も多い投稿が、必ずしも転換率が高いとは限らない。例えば32万再生で転換率0.06%の投稿より、15万再生で転換率0.14%の投稿のほうが<strong>フォロワー獲得効率は約2倍高い</strong>というケースがある。再生数の派手さに惑わされず、転換率で判断する視点を持つ。</p>\n<h4><strong>プロフィール設計のチェック項目</strong></h4>\n<ul class=\"docx-list\"><li><strong>1行目（名前欄）</strong>：検索ヒット用の語を入れる（例：「〇〇駅 ネイル｜△△サロン」）</li><li><strong>肩書き</strong>：誰向けのサロンか1行で分かる</li><li><strong>実績数字</strong>：施術実績〇年／〇人／〇件など具体的な数字</li><li><strong>提供価値</strong>：お客様が得られる結果を1〜2行で</li><li><strong>行動導線</strong>：予約リンクまでの動線が明確</li></ul>\n<div class=\"ph-img\" data-near=\"プロフィール設計のチェック項目\"></div>\n<h4><strong>投稿とプロフィールの一貫性</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_02_consistency.png\" alt=\"投稿とプロフィールの一貫性\" loading=\"lazy\"></figure>\n<p>バズっても転換率が低い場合、<strong>投稿で興味を持った人がプロフィールで「違うサロンだった」と感じている</strong>可能性が高い。投稿で訴求した世界観とプロフィール文の雰囲気を合わせる。</p>\n<div class=\"ph-img\" data-near=\"投稿とプロフィールの一貫性\"></div>\n<p>プロフの重要性</p>\n<p>結論： フォローするかは“プロフ3秒”で決まる</p>\n<p>どれだけリールが伸びても、プロフが弱いとフォローされません。</p>\n<p>必要最低限の情報</p>\n<ul class=\"docx-list\"><li>誰向けか（ターゲット）</li><li>このアカウントをフォローしたら何が得られるか/どう変われるか（未来の提示）</li><li>信頼できるか（実績・根拠・数字で表す）</li></ul>\n<p>よくあるNG</p>\n<ul class=\"docx-list\"><li>「〇〇好きです」だけ（←価値がない、誰も興味ない）</li><li>情報が多すぎる（←読むのにうんざりされる）</li></ul>\n<p>OK例</p>\n<p>→「30代ママ向け｜5分でできる時短レシピ」</p>\n<p>→ 一瞬で“自分向け”とわかる</p>\n<figure class=\"docx-figure\"><img src=\"img/image6.jpg\" alt=\"投稿とプロフィールの一貫性\" loading=\"lazy\"/><figcaption>投稿とプロフィールの一貫性</figcaption></figure>\n<figure class=\"docx-figure\"><img src=\"img/image4.jpg\" alt=\"投稿とプロフィールの一貫性\" loading=\"lazy\"/><figcaption>投稿とプロフィールの一貫性</figcaption></figure>\n<p>※5行目以降は折りたたまれてしまうので、4行以内に詰めて記載するのがベストです！</p>\n<ul class=\"docx-list\"><li>アイコンのポイント</li></ul><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_02_icon.png\" alt=\"アイコンのポイント\" loading=\"lazy\"></figure>\n<p>“誰か分かる or 何のアカウントか分かる”が最優先</p>\n<p>ポイント</p>\n<ul class=\"docx-list\"><li>顔出し → 明るい・アップ・背景シンプル</li><li>顔なし → テーマが一発で伝わる（例：イラストならイラスト）</li><li>色は2〜3色に絞る（ごちゃつくと弱い）</li></ul>\n<p>NG</p>\n<ul class=\"docx-list\"><li>文字</li><li>暗い写真</li><li>何のアカウントか不明</li></ul>\n<div class=\"ph-img\" data-near=\"投稿とプロフィールの一貫性\"></div>\n<ul class=\"docx-list\"><li>ユーザーIDのポイント</li></ul><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_02_userid.png\" alt=\"ユーザーIDのポイント\" loading=\"lazy\"></figure>\n<p>検索されやすさ＋覚えてもらいやすさ</p>\n<p>理想</p>\n<p>→「ジャンル＋名前」</p>\n<p>例：diet_yume / illustration_yume</p>\n<ul class=\"docx-list\"><li>アカウント名のポイント</li></ul>\n<p>ここは名前＋検索ワードを入れる場所</p>\n<p>例</p>\n<p>× ゆめ</p>\n<ul class=\"docx-list\"><li> ゆめ ⋮ 繊細さんの愛される働き方</li></ul>\n<p>これで「繊細さん」や「働き方」と</p>\n<p>検索したときに表示されやすくなる</p>\n<div class=\"ph-img\" data-near=\"投稿とプロフィールの一貫性\"></div>", "ig/03": "<h4><strong>撮影の重要点</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_03_shooting_point.png\" alt=\"撮影の重要点\" loading=\"lazy\"></figure><h3><strong>冒頭1秒の撮影設計</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_03_first_second_design.png\" alt=\"冒頭1秒の撮影設計\" loading=\"lazy\"></figure>\n<p>Instagramリールで最も重要な映像は<strong>冒頭1秒</strong>である。ここで視聴者が離脱すれば、その後の映像がどれだけ作り込まれていても見られない。</p>\n<div class=\"ph-img\" data-near=\"冒頭1秒の撮影設計\"></div>\n<h4><strong>冒頭1秒で伝えるべき2つの情報</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_03_first_second_info.png\" alt=\"冒頭1秒で伝えるべき2つの情報\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li><strong>誰向けの動画か</strong>（視聴者が自分ごと化できるか）</li><li><strong>何が起こる動画か</strong>（結末への期待を作れるか）</li></ul>\n<p>この2つが冒頭1秒で伝わらない投稿は、視聴者が即座にスワイプして離脱する。</p>\n<div class=\"ph-img\" data-near=\"冒頭1秒で伝えるべき2つの情報\"></div>\n<h4><strong>冒頭1秒の撮影パターン</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_03_first_second_pattern.png\" alt=\"冒頭1秒の撮影パターン\" loading=\"lazy\"></figure>\n<h5><strong>パターン①：ビフォーを最初に映す</strong></h5>\n<ul class=\"docx-list\"><li>施術前の状態を0.5秒で映す → 視聴者が「これがどう変わるのか」と期待して止まる</li><li>NG例：「こんにちは」から始める／サロン入口を映す／ロゴを映す</li></ul>\n<h5><strong>パターン②：驚きの瞬間を先頭に持ってくる</strong></h5>\n<ul class=\"docx-list\"><li>動画のクライマックス（仕上がりの瞬間、喜びの表情など）を冒頭に0.5秒だけ挟む</li><li>その後本編に戻る構成</li></ul>\n<h5><strong>パターン③：テロップで状況を即提示する</strong></h5>\n<ul class=\"docx-list\"><li>冒頭から大きめのテロップで「〇〇なお客様、〇時間の施術」など状況を即提示</li><li>映像が弱くても言葉で視聴者を止められる</li></ul>\n<div class=\"ph-img\" data-near=\"パターン③：テロップで状況を即提示する\"></div>\n<h4><strong>スキップ率という撮影の通信簿</strong></h4>\n<p>撮影と編集の品質は、公開後のスキップ率で判定する。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>スキップ率</strong></th><th><strong>判定</strong></th><th><strong>アクション</strong></th></tr></thead><tbody><tr><td>30%未満</td><td>冒頭設計成功</td><td>このパターンを再利用</td></tr><tr><td>30〜40%</td><td>合格ライン</td><td>冒頭をさらに磨く</td></tr><tr><td>40〜50%</td><td>要改善</td><td>冒頭の映像・テロップを見直す</td></tr><tr><td>50%超</td><td>失敗</td><td>同じテーマは2度撮らない</td></tr></tbody></table></div>\n<p>目安として、<strong>同じアカウントでもスキップ率が10ポイント下がれば再生数は数倍変わる</strong>ことが実データで確認されている。撮影の上達はスキップ率で定量化できる。</p>\n<h4><strong>避けるべき撮影パターン</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_03_avoid_pattern.png\" alt=\"避けるべき撮影パターン\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>最初の3秒にサロンロゴを静止表示</li><li>挨拶（「こんにちは、〇〇サロンです」）から始める</li><li>長い前置き（「今日はこんなお客様でした」などの説明）</li><li>BGMと無関係な環境音（レジ音・水音・雑音）</li><li>手ブレの多い冒頭カット</li></ul>\n<div class=\"ph-img\" data-near=\"避けるべき撮影パターン\"></div>\n<ul class=\"docx-list\"><li>天候とか、時間とか、その他条件の整理</li></ul><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_03_conditions.png\" alt=\"天候・時間・その他条件の整理\" loading=\"lazy\"></figure>\n<p>結論： “明るさの安定”が最優先</p>\n<p>時間帯</p>\n<ul class=\"docx-list\"><li>ベスト → 朝〜午前中（7〜11時）</li></ul>\n<p>→ 光が柔らかい＋影が出にくい</p>\n<ul class=\"docx-list\"><li>夕方</li></ul>\n<p>→ 雰囲気は出るが“日によってブレる”ので初心者は非推奨</p>\n<ul class=\"docx-list\"><li>夜</li></ul>\n<p>→ 照明ないとほぼNG</p>\n<p>天候</p>\n<ul class=\"docx-list\"><li>◎ 晴れ or 薄曇り</li></ul>\n<p>→ 光が安定</p>\n<ul class=\"docx-list\"><li>× 雨・暗い日</li></ul>\n<p>→ 画質が一気に落ちる</p>\n<div class=\"ph-img\" data-near=\"避けるべき撮影パターン\"></div>\n<div class=\"img-compare\"><figure class=\"img-compare__col\"><div class=\"img-compare__cap\"><span class=\"img-compare__badge img-compare__badge--rain\">雨の日</span>に撮影した動画</div><img src=\"img/image5.jpg\" alt=\"雨の日に撮影した動画\" loading=\"lazy\"/></figure><figure class=\"img-compare__col\"><div class=\"img-compare__cap\"><span class=\"img-compare__badge img-compare__badge--sun\">晴れの日</span>に撮影した動画</div><img src=\"img/image2.jpg\" alt=\"晴れの日に撮影した動画\" loading=\"lazy\"/></figure></div>\n<p>おすすめ撮影道具</p>\n<ul class=\"docx-list\"><li>撮影はスマホ（iPhone13）、たまにipad</li><li>ライト</li></ul>\n<p><a href=\"https://amzn.asia/d/02oxseMq\" target=\"_blank\" rel=\"noopener\">https://amzn.asia/d/02oxseMq</a></p>\n<ul class=\"docx-list\"><li>三脚</li></ul>\n<p><a href=\"https://amzn.asia/d/09tvDjaS\" target=\"_blank\" rel=\"noopener\">https://amzn.asia/d/09tvDjaS</a></p>\n<ul class=\"docx-list\"><li>卓上スマホスタンド</li></ul>\n<p><a href=\"https://amzn.asia/d/03ndQUo2\" target=\"_blank\" rel=\"noopener\">https://amzn.asia/d/03ndQUo2</a></p>\n<ul class=\"docx-list\"><li>マグネットスマホスタンド（鏡などに張り付けられる、出先に便利）</li></ul>\n<p><a href=\"https://item.rakuten.co.jp/nicoselection/mid-2025019/?scid=wi_ich_iphoneapp_item_share\" target=\"_blank\" rel=\"noopener\">https://item.rakuten.co.jp/nicoselection/mid-2025019/?scid=wi_ich_iphoneapp_item_share</a></p>\n<ul class=\"docx-list\"><li>アフレコ用のマイク</li></ul>\n<p><a href=\"https://amzn.asia/d/0iJXWFTE\" target=\"_blank\" rel=\"noopener\">https://amzn.asia/d/0iJXWFTE</a></p>\n<ul class=\"docx-list\"><li>ASMR用のピンマイク</li></ul>\n<p><a href=\"https://amzn.asia/d/02Lo1cYU\" target=\"_blank\" rel=\"noopener\">https://amzn.asia/d/02Lo1cYU</a></p>\n<ul class=\"docx-list\"><li>カメラ(iPhoneのおすすめ設定)</li><li>設定 → カメラ →</li></ul><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_03_camera.png\" alt=\"カメラ（iPhoneのおすすめ設定）\" loading=\"lazy\"></figure>\n<p>　- 4K / 30fps（基本これ）</p>\n<p>　- HDRオン</p>\n<p>撮影時</p>\n<ul class=\"docx-list\"><li>画面長押し → AE/AFロック（明るさ固定）</li><li>基本“外カメラ”</li></ul>\n<p>　内カメより外カメのほうが画質が良い</p>\n<div class=\"ph-img\" data-near=\"避けるべき撮影パターン\"></div>\n<ul class=\"docx-list\"><li>カット、テンポ感、画角の言語化→理由も</li></ul><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_03_cut_tempo.png\" alt=\"カット、テンポ感、画角の言語化\" loading=\"lazy\"></figure>\n<p>→被写体は携帯を並行にして撮影する、同じシーンは同じ方向から撮影する...などなど</p>\n<ul class=\"docx-list\"><li>カット</li><li>1〜2秒でカット（早いと感じるくらいがちょうどいい）</li><li>2.5秒以上同じシーンNG→離脱に繋がる</li><li> テンポ</li></ul>\n<p>無駄な間＝全部カット！</p>\n<ul class=\"docx-list\"><li>言い淀み</li><li>動きが止まる瞬間</li><li>1秒まで全部削る（つまんないと思わせる時間をすべて排除）</li><li>画角</li><li>被写体は“画面の中央〜やや上”（テロップに被らない位置）</li><li>スマホは地面と平行にする（撮影の段階で調整する）</li><li>同じシーンは同じ方向から撮る</li></ul>\n<p>　右側から撮ったら右側からのみ撮影。（方向が変化すると視聴者がストレスを感じるため）</p>\n<ul class=\"docx-list\"><li>寄り（アップ）と引き（全体）を両方撮る</li></ul>\n<div class=\"ph-img\" data-near=\"避けるべき撮影パターン\"></div>\n<ul class=\"docx-list\"><li>重要点</li><li>冒頭をかなり集中的に</li></ul>\n<p>むしろそれのみを最初はやり切る</p>\n<ul class=\"docx-list\"><li>テンポ良く音を付ける</li></ul>\n<p>おすすめサウンドエフェクト</p>\n<p>→Swish音（風を切る音）、クリック音、ピコンなどの注意喚起音、</p>\n<p>　きらーんやしゃきーんなどの完成音、タイピング音（vlogにおすすめ）</p>\n<ul class=\"docx-list\"><li>ズームを上手く使う</li></ul>\n<p>→ 単調防止</p>\n<ul class=\"docx-list\"><li>環境音は消して、後から音つける</li></ul>\n<p>→ ノイズ消える＝クオリティ上がる</p>\n<ul class=\"docx-list\"><li>同じ構図で3テイク以上撮る</li></ul>\n<p>→ 一番いい表情や動きを選べる</p>\n<div class=\"ph-img\" data-near=\"避けるべき撮影パターン\"></div>", "ig/04": "<h3><strong>リール</strong></h3>\n<p><strong>リール運用 ― 認知拡大の設計</strong></p>\n<h5>【Instagramのセンターピンはリール】</h5>\n<p>Instagram初期段階における最重要施策は、リールへの集中です。認知拡大のためには、まずリールに注力することが最優先となります。フォロワーが少ない段階でストーリーズの作り込みに時間をかけるよりも、リールで新規の方に見ていただける状態を先につくることが重要です。</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_01_centerpin_reel.png\" alt=\"Instagramのセンターピンはリール\" loading=\"lazy\"></figure>\n<div class=\"ph-img\" data-near=\"避けるべき撮影パターン\"></div>\n<h5>【リサーチが最初のステップ】</h5>\n<p>リール作成において最初に行うべきことはリサーチです。自身の販売したい商品ジャンルで伸びている投稿を徹底的に調査し、構成を真似ることから始めてください。</p>\n<p>リサーチの具体的な基準は以下の通りです。</p>\n<ul class=\"docx-list\"><li>アカウント全体ではなく、動画単体で探すこと※ベンチマークはリールはこの人、リールはこの人,,,といったように機能別に分けるのがベスト。必ずしもリールが上手い人がストーリーが上手いわけではない\n</li><li>フォロワー数に対する再生数の比率で「伸びている動画」を判断すること（例：フォロワー10万人のアカウントであれば、100万再生規模の動画が対象）</li><li>直近1ヶ月以内に伸びている投稿を参考にすること（古い投稿は避ける）</li></ul><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_04_research.png\" alt=\"リサーチが最初のステップ\" loading=\"lazy\"></figure>\n<div class=\"ph-img\" data-near=\"避けるべき撮影パターン\"></div>\n<h5>【TTP-丸パクリの正しい定義】</h5>\n<p>「徹底的にパクる」とは、色合いや画角といった表面的な要素を真似ることではありません。「動画の構成」を真似ることが本質です。構成を参考にしながら、内容は必ず自分のジャンルに合わせて置き換えてください。</p>\n<h5>【リール動画の構成と冒頭の重要性】</h5>\n<p>リール動画の基本構成は「疑問・問題定義・解決策・CTA(動画による)」の流れです。この構成の中で最もこだわるべき箇所が「冒頭」です。冒頭の映像と言葉の質が再生数を大きく左右します。スキップ率が30%以下であれば、100万再生を狙える可能性が高まります。冒頭への徹底的なこだわりが、リール運用のセンターピンです。</p>\n<h5>【リール動画のアルゴリズム評価基準】</h5>\n<p>優先度の高い順に、①滞在時間（視聴維持率・視聴完了率・平均再生時間）、②スキップ率となります。具体的なパーセンテージよりも、これらの指標の重要性を理解することが本質です。いかに最後まで見ていただけるか、いかにスキップされないかを常に意識して動画を設計してください。</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_04_ttp.png\" alt=\"TTP（丸パクリ）の正しい定義\" loading=\"lazy\"></figure>\n<div class=\"ph-img\" data-near=\"避けるべき撮影パターン\"></div>\n<h3><strong>伸びるリールの構造 ——「3フック理論」</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_04_3hooks.png\" alt=\"伸びるリールの構造 ——「3フック理論」\" loading=\"lazy\"></figure>\n<p>伸びるリールには、共通する3つの要素（フック）が含まれている。この3要素のうち<strong>2つ以上を冒頭で同時提示</strong>することが、再現性のある投稿設計の核となる。</p>\n<div class=\"ph-img\" data-near=\"伸びるリールの構造 ——「3フック理論」\"></div>\n<h4><strong>フック①：関係性のフック</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_04_cb4d1e68.png\" alt=\"フック①：関係性のフック\" loading=\"lazy\"></figure>\n<p><strong>「誰との話か」を明示する要素。</strong></p>\n<p>人間は「知らない人の日常」には興味がないが、特定の関係性を持つ相手とのエピソードには瞬時に自分ごと化する。</p>\n<p>美容サロンで使える関係性の例：</p>\n<ul class=\"docx-list\"><li><strong>お客様属性</strong>：結婚式まで〇日の花嫁／成人式を控えた新成人／第一子妊娠中のプレママ／産後〇ヶ月のママ</li><li><strong>お客様の周辺人物</strong>：旦那・彼氏・子ども・義母・同僚・同窓会・転職面接</li><li><strong>変化軸</strong>：10年間〇〇だった方／5年ぶりの来店／初めての〇〇に挑戦するお客様</li><li><strong>サロン側</strong>：開業以来の常連〇年／最年長のお客様</li></ul>\n<div class=\"ph-img\" data-near=\"フック①：関係性のフック\"></div>\n<h4><strong>フック②：数字のフック</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_04_fe6fd207.png\" alt=\"フック②：数字のフック\" loading=\"lazy\"></figure>\n<p><strong>具体的な数字を含む要素。</strong>抽象的な形容詞を数字に変換するだけで、視聴者の脳は反射的に反応する。</p>\n<p>数字フックの強度を上げる3原則：</p>\n<ul class=\"docx-list\"><li><strong>日常を逸脱した数字ほど強い</strong>：「3時間の施術」より「8時間の大改造」</li><li><strong>意外な単位を使う</strong>：「〇時間」より「〇分」「〇本」「〇cm」など</li><li><strong>2つの数字を組み合わせる</strong>：「結婚式まで30日、6回で仕上げた花嫁」</li></ul>\n<div class=\"ph-img\" data-near=\"フック②：数字のフック\"></div>\n<p>美容サロンの数字フック例：</p>\n<ul class=\"docx-list\"><li>施術時間（90分・2時間・4時間）</li><li>期限までの日数（3日・1週間・30日）</li><li>変化の数値（10cm・5年ぶり・〇回目）</li><li>装着本数・使用量（250本・〇g）</li></ul><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_04_11472255.png\" alt=\"美容サロンの数字フック例\" loading=\"lazy\"></figure>\n<div class=\"ph-img\" data-near=\"フック②：数字のフック\"></div>\n<h4><strong>フック③：対比構造のフック</strong></h4>\n<p><strong>AとBの二項対立を含む構造。</strong>脳は対比を検知すると強制的に注意を向ける。</p>\n<p>対比の4類型：</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>類型</strong></th><th><strong>構造</strong></th><th><strong>例</strong></th></tr></thead><tbody><tr><td>時間の対比</td><td>AしていたのにB</td><td>10年ボブだった人がロングに</td></tr><tr><td>同時進行の対比</td><td>AしているうちにB</td><td>子どもが寝ている90分で施術</td></tr><tr><td>感情の対比</td><td>AなのにB</td><td>失恋の翌日にイメチェン</td></tr><tr><td>期待の対比</td><td>Aのはずが結果C</td><td>時短希望で来たのに3時間話した日</td></tr></tbody></table></div>\n<h4><strong>3フックを揃える効果</strong></h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>フック数</strong></th><th><strong>スキップ率の目安</strong></th><th><strong>結果</strong></th></tr></thead><tbody><tr><td>3フック全て揃う</td><td>30%未満</td><td>再生数が跳ね上がる</td></tr><tr><td>2フック揃う</td><td>30〜40%</td><td>安定して伸びる</td></tr><tr><td>1フックのみ</td><td>40〜50%</td><td>頭打ち</td></tr><tr><td>0フック</td><td>50%超</td><td>沈む</td></tr></tbody></table></div>\n<h4><strong>リールの翻訳公式</strong></h4>\n<p>美容サロンの投稿は、以下の型に実エピソードを流し込むことで量産できる。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>翻訳公式</strong><br/>〇〇（関係性のある人物・状況）が〇〇している時に／〇〇の状態で、〇〇（具体的な数字）で〇〇した</th></tr></thead></table></div>\n<h4><strong>業態別の企画例</strong></h4>\n<h5><strong>ネイルサロン</strong></h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_04_28944c9d.png\" alt=\"業態別の企画例 ネイルサロン\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>子どもが寝ている90分で仕上げたママのネイル</li><li>結婚式まで3日、悩み抜いた花嫁の2時間</li><li>旦那の出張中に10年ぶりに入れた派手色ネイル</li></ul>\n<div class=\"ph-img\" data-near=\"ネイルサロン\"></div>\n<h5><strong>美容室</strong></h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_04_93396b1b.png\" alt=\"業態別の企画例 美容室\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>入学式まで1週間、傷みきった髪を4時間で復活させた話</li><li>5年間ボブだった方を90分でロングのかき上げにした日</li><li>同窓会前日に飛び込んできたお客様、3時間のイメチェン</li></ul>\n<div class=\"ph-img\" data-near=\"美容室\"></div>\n<h5><strong>エステ・脱毛</strong></h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_04_bc010942.png\" alt=\"業態別の企画例 エステ・脱毛\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>結婚式まで30日、背中ニキビに悩む花嫁を6回で救った記録</li><li>産後3ヶ月のママが15分だけ自分時間で受けたフェイシャル</li><li>10年間剃刀で処理してきた方の、初VIO脱毛3回目の変化</li></ul>\n<div class=\"ph-img\" data-near=\"エステ・脱毛\"></div>\n<h5><strong>まつ毛・眉毛サロン</strong></h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_04_37bc2bf7.png\" alt=\"業態別の企画例 まつ毛・眉毛サロン\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>旦那さんが出張の3日間に、7年ぶりに作り直した眉毛</li><li>子どもを保育園に預けた40分で済ませるまつ毛パーマ</li></ul>\n<div class=\"ph-img\" data-near=\"まつ毛・眉毛サロン\"></div>\n<h4><strong>リール運用の投稿頻度</strong></h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>ステージ</strong></th><th><strong>頻度</strong></th><th><strong>重視点</strong></th></tr></thead><tbody><tr><td>フォロワー〜1,000</td><td>週3〜4本</td><td>勝ちテンプレの発見</td></tr><tr><td>フォロワー〜5,000</td><td>週4〜5本</td><td>勝ちテンプレの量産</td></tr><tr><td>フォロワー〜20,000</td><td>週5〜7本</td><td>テンプレ＋ノウハウ混合</td></tr></tbody></table></div>\n<p>「毎日投稿すれば伸びる」は誤解。<strong>負けパターンの投稿で枠を埋めるより、勝ちテンプレだけを週4本出すほうが結果が出る</strong>。</p>\n<h4><strong>リールの投稿時間</strong></h4>\n<p>ターゲット層によって最適時間は変わるが、美容サロンの主要ターゲット（働く女性・主婦・ママ層）の場合は以下が候補：</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>時間帯</strong></th><th><strong>想定ターゲット</strong></th></tr></thead><tbody><tr><td>11:00前後</td><td>主婦・ママ層（家事の合間）</td></tr><tr><td>13:00前後</td><td>会社員（昼休み）</td></tr><tr><td>20:00〜21:00</td><td>全般（最も反応が取れる時間）</td></tr></tbody></table></div>\n<p>実データでは、<strong>21:00以降はスキップ率が上がり再生数が落ちる</strong>傾向がある。遅くとも20:00台に投下する運用が無難。</p>\n<p>アカウントコンセプトの設計</p>\n<p><strong>アカウントコンセプトの設計</strong></p>\n<h5>【ジャンル設定の考え方】</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_04_ed987978.png\" alt=\"【ジャンル設定の考え方】\" loading=\"lazy\"></figure>\n<p>競合が多いジャンルは「需要がある」証拠です。狭い領域で勝負しようとせず、大元のジャンルは広く設定した上で、アプローチの仕方によってアカウントの個性を出すことを推奨します。例えばダイエットというジャンルであれば、筋トレ・食事制限・メンタルなど、アプローチ軸によってアカウントの色付けを行ってください。</p>\n<div class=\"ph-img\" data-near=\"リールの投稿時間\"></div>\n<h5>【コンセプトはガチガチに決めすぎない】</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_04_d060ec27.png\" alt=\"【コンセプトはガチガチに決めすぎない】\" loading=\"lazy\"></figure>\n<p>初期段階からコンセプトを細かく固めすぎる必要はありません。まず投稿し、反応を分析しながら修正と改善を繰り返すことで、需要のあるアカウントに育てていくことが重要です。完璧な設計を待って動き出すよりも、動きながら最適化していく姿勢が成果への近道です。</p>\n<div class=\"ph-img\" data-near=\"リールの投稿時間\"></div>\n<h5>【ビジネス系コンテンツの注意点】</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_04_6246b202.png\" alt=\"【ビジネス系コンテンツの注意点】\" loading=\"lazy\"></figure>\n<p>ビジネス系に寄りすぎたコンテンツはインプレッションが伸びにくく、使い古された印象になりやすい傾向があります。商材感を出しすぎず、個性を押し出した発信の方向性を意識してください。アカウントのコンセプトに沿った「嘘をつかない」発信が、長期的な信頼構築につながります。</p>\n<div class=\"ph-img\" data-near=\"リールの投稿時間\"></div>\n<h5>【初期投稿への向き合い方】</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_04_b1f14023.png\" alt=\"【初期投稿への向き合い方】\" loading=\"lazy\"></figure>\n<p>初期投稿は100再生程度が通常です。数字を見て落ち込む必要はありません。成果を期待しすぎず、数を打つことで伸びる感覚を掴んでいくことが重要です。バズっていない段階で数値目標を意識しすぎると、本質ではない部分に意識が向いてしまいます。まずはコンテンツの本質に集中することを優先してください。</p>\n<div class=\"ph-img\" data-near=\"リールの投稿時間\"></div>", "ig/05": "<h3><strong>設計上のコンセプトと実働するフックの違い</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_05_c397a2db.png\" alt=\"設計上のコンセプトと実働するフックの違い\" loading=\"lazy\"></figure>\n<p>アカウント設計で決めたコンセプト（例：「繊細さん向け」「忙しいママ向け」）と、<strong>実際に視聴者を掴むフック（関係性・数字・対比）は別物</strong>である。この区別を理解していないと、コンセプト通りの投稿をしているのに伸びない、という状態に陥る。</p>\n<h4><strong>設計コンセプトが果たす役割</strong></h4>\n<ul class=\"docx-list\"><li>プロフィール文・世界観の軸</li><li>投稿全体の一貫性を担保する指針</li><li>フォロワーが「なぜフォローし続けるか」の理由</li></ul>\n<h4><strong>実働フックが果たす役割</strong></h4>\n<ul class=\"docx-list\"><li>冒頭1秒で視聴者を止める</li><li>発見フィードで選ばれる</li><li>新規リーチを拡大する</li></ul>\n<div class=\"ph-img\" data-near=\"実働フックが果たす役割\"></div>\n<h4><strong>2つをどう両立させるか</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_05_3c0f1a88.png\" alt=\"2つをどう両立させるか\" loading=\"lazy\"></figure>\n<p><strong>コンセプトを捨てる必要はない</strong>。しかし投稿のタイトルや冒頭セリフには、コンセプトの抽象概念（例：「繊細さん」「忙しい日常」）ではなく、具体的な関係性×数字×対比を入れる。</p>\n<h5><strong>悪い例（コンセプトをそのまま冒頭に出す）</strong></h5>\n<ul class=\"docx-list\"><li>「繊細さん向けの美髪ケア」→ 抽象的で伝わらない</li><li>「忙しいママのための施術」→ 誰向けか分かるが数字と対比がない</li></ul>\n<h5><strong>良い例（コンセプトは世界観、冒頭は具体）</strong></h5>\n<ul class=\"docx-list\"><li>冒頭：「子どもを保育園に預けた90分、ママの髪がこう変わった」</li><li>本編・プロフィール：「忙しいママ向けサロン」の世界観を一貫させる</li></ul>\n<div class=\"ph-img\" data-near=\"良い例（コンセプトは世界観、冒頭は具体）\"></div>\n<h4><strong>コンセプト設計のチェック項目</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_05_c638ea64.png\" alt=\"コンセプト設計のチェック項目\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>ペルソナが<strong>具体的な行動・状況で描けるか</strong>（「繊細さん」ではなく「日曜の夜に不安になる30代」など）</li><li>ペルソナの<strong>関係性</strong>が想像できるか（彼氏がいる／子どもがいる／会社員／etc.）</li><li>視聴者が<strong>どんな結果を得られるか</strong>が1行で言えるか</li></ul>\n<div class=\"ph-img\" data-near=\"コンセプト設計のチェック項目\"></div>\n<h4><strong>コンセプトと投稿のズレが起きたときの判断</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_05_173b49e8.png\" alt=\"コンセプトと投稿のズレが起きたときの判断\" loading=\"lazy\"></figure>\n<p>コンセプトは強いのに投稿が伸びない場合、<strong>コンセプトを変えるのではなく、投稿の冒頭設計を3フック基準で作り直す</strong>。投稿が伸びるのにフォロワーが増えない場合は、コンセプト側（プロフィール・世界観）の修正が必要。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>", "ig/06": "<h3><strong>ストーリーズ①</strong></h3>\n<p><strong>ストーリーズ運用 基礎編</strong></p>\n<h5>【ストーリーズが「信頼構築ツール」である理由】</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_bd6ef6fa.png\" alt=\"【ストーリーズが「信頼構築ツール」である理由】\" loading=\"lazy\"></figure>\n<p>リールが「知っていただく（認知拡大）」ためのツールであるのに対し、ストーリーズは「信頼を積む → ファン化 → CV（集客・販売）」を担う最重要ツールです。</p>\n<p>リールで集めた「数」を、ストーリーズで「売上」に変換する ― これがInstagram運用の基本構造です。ストーリーズなしにセールスを行っても売上にはつながりません。教育（信頼構築）→ セールスという順番を必ず守るようにしてください。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>【親密度アルゴリズム（ストーリーズの表示順位）】</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_95de3590.png\" alt=\"【親密度アルゴリズム（ストーリーズの表示順位）】\" loading=\"lazy\"></figure>\n<p>ストーリーズは時系列ではなく「親密度」が高い順に左から表示されます。左端1〜3番目に入らないと、そもそもご覧いただけません。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>シグナル</strong></th><th><strong>重要度</strong></th><th><strong>例</strong></th></tr></thead><tbody><tr><td>滞在時間</td><td>★★★</td><td>長文を読む、写真をじっくり見る</td></tr><tr><td>タップ・操作</td><td>★</td><td>プロフィールへ移動する、前後移動</td></tr><tr><td>スタンプ反応</td><td>★★</td><td>アンケート回答、スライダー操作</td></tr><tr><td>DM・返信</td><td>★★★★（最重視）</td><td>メッセージ送信、シェア</td></tr></tbody></table></div>\n<p>施策としては、アンケートでスタンプ反応を獲得し、DM返信を促す構成で親密度を高めることを目指してください。これが表示順位を上げる最も効果的な方法となります。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>【ストーリーズのアルゴリズム評価基準】</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_de47c9d7.png\" alt=\"【ストーリーズのアルゴリズム評価基準】\" loading=\"lazy\"></figure>\n<p>優先度の高い順に、①DM・リアクション（最重視）、②滞在時間、③スタンプ（いいね）、④タップ・操作となります。滞在時間を伸ばすためには、長く読んでいただける・長く見ていただけるコンテンツ設計が重要です。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>【DMを促す仕掛けの設計】</h5>\n<p>DMを送った相手のストーリーズはアルゴリズム上「親しい」と認識され、左端に優先表示されます。質問箱の設置やリアクションボタンの活用など、DMを送りたくなる仕掛けをストーリーズ内に意図的に組み込んでください。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>【品質方程式】</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_7aff87db.png\" alt=\"【品質方程式】\" loading=\"lazy\"></figure>\n<p>ストーリーズの品質は以下の3要素で決まります。</p>\n<p>ビジュアライズ力：話題に合った素材を事前に撮影するようにしてください。フリー素材は使用せず、ご自身のリアルな写真・動画が最も効果的です。</p>\n<p>ライティング力：物語的アプローチが正解です。日常→教育→マネタイズという自然な流れを意識してください。質問への回答は、想像を超えるボリュームでお届けすることが重要です。</p>\n<p>デザイン力：レイアウト・配色・フォントの統一感を保ってください。余白を活かし、伝えたいことが一目でわかるように設計してください。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>【デザインの基本ルール】</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_25dc0fb9.png\" alt=\"【デザインの基本ルール】\" loading=\"lazy\"></figure>\n<p>ストーリーズは見る側にストレスを与えないデザインが大前提です。以下の点に注意してください。</p>\n<ul class=\"docx-list\"><li>白背景に白文字など、見づらい色の組み合わせは避けること</li><li>投稿画像の色をスポイトで抽出して使用すると統一感が生まれること</li><li>文章の長さ・量・レイアウトにも配慮すること</li><li>参考アカウントとして「セナデザイン」を推奨（画像に明るさを落として白文字を入れるスタイル）</li></ul>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>【コンテンツバランスの目安】</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_cd3a4184.png\" alt=\"【コンテンツバランスの目安】\" loading=\"lazy\"></figure>\n<p>商品関連の内容を8割、プライベートネタを2割の比率で投稿することが効果的です。発信者自身を好きになっていただくことでファン化が進みますが、プライベートに比重を置きすぎると商品への興味につながりにくくなります。失敗談やNG集など、共感を生みながらも商品の文脈に沿ったコンテンツが特に有効です。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>【継続投稿の重要性】</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_f050601c.png\" alt=\"【継続投稿の重要性】\" loading=\"lazy\"></figure>\n<p>常にストーリーズが「光っている状態」を維持することで、プロフィールを訪問した方に対して更新頻度が高い印象を与え、フォロー率の向上につながります。理想は毎日2〜5件の投稿、最低でも週3日以上の更新を目標にしてください。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>【「糸」のストーリーズ（最重要テクニック）】</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_8b84ae86.png\" alt=\"【「糸」のストーリーズ（最重要テクニック）】\" loading=\"lazy\"></figure>\n<p>核心ルールは、点ではなく「糸」のように繋げることです。1トピック ＝ 最低3ストーリーズを意識してください。10本連続で糸のストーリーズが作れるようになれば、マスター級といえます。</p>\n<p>糸のストーリーズ × 教育7ステップ ＝ 最強の組み合わせです。各教育ステップを「糸」で繋いで3〜5本にすることで、教育効果が最大化します。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<p><strong>｜ストーリーズ × 教育7ステップ</strong></p>\n<h5>【教育7ステップ全体構造】</h5>\n<p>教育なしにセールスを行っても売上にはつながりません。教育の順序と深度が売上を決めます。</p>\n<p>順番のルールとして、①目的→②問題→③手段は基本的にこの順番を守るようにしてください。④⑤⑥は状況に応じて組み合わせていただいて構いません。⑦信用は常時・全ステップに織り込むようにしてください。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>STEP 1：目的の教育 ― 理想の未来をイメージさせる</h5>\n<p>核心：商品の品質以前に、理想の未来をお見せしなければ購入にはつながりません。人は「手段（商品）」ではなく「未来」を求めています。</p>\n<p>HARM法則（人が深く悩む4分野）を活用して訴求してください。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>頭文字</strong></th><th><strong>分野</strong></th><th><strong>例</strong></th></tr></thead><tbody><tr><td>H</td><td>Health（健康・美容）</td><td>痩せたい、肌を綺麗にしたい</td></tr><tr><td>A</td><td>Ambition（キャリア・将来）</td><td>スキルアップ、独立したい</td></tr><tr><td>R</td><td>Relation（人間関係・恋愛）</td><td>モテたい、パートナーが欲しい</td></tr><tr><td>M</td><td>Money（お金）</td><td>収入を増やしたい、自由になりたい</td></tr></tbody></table></div>\n<p>理想のゴール（こうなりたい）と最悪のゴール（こうはなりたくない）の両面をお見せください。1つの商品でもHARMの複数軸から多角的に訴求するようにしてください。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>STEP 2：問題の教育 ― 理想を阻む「壁」を認識させる</h5>\n<p>核心：「自力で解決できる」とお感じになっている方は購入されません。壁を認識していただいて初めて、商品の必要性が生まれます。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>商品タイプ</strong></th><th><strong>設定する壁</strong></th></tr></thead><tbody><tr><td>マンツーマン指導</td><td>体質は人それぞれ異なるため正解も異なる → 個別対応が必要</td></tr><tr><td>コミュニティ講座</td><td>失敗の原因はモチベーション継続 → 1人では難しく、仲間が必要</td></tr><tr><td>簡易商品</td><td>運動や食事制限は続かない → 簡単なことから始めるべき<br/>（画像）</td></tr></tbody></table></div>\n<h5>STEP 3：手段の教育 ― 最適な解決手段を納得させる</h5>\n<p>核心：フォロワーの方にとって、理想を叶える手段は複数存在します。「自分の商品が最適である」とご納得いただくことが重要です。伝える3つの視点は、①具体性、②効果、③納得感（他との比較）です。</p>\n<ul class=\"docx-list\"><li>問題と③手段はセットで設計してください。問題教育で「今のままではいけない」という認識を持っていただき、手段教育で「これを実践すればよい」という方向性をお示しします。②で外れた選択肢の代替として、③で自社の商品をご提案する流れが基本となります。</li></ul>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>STEP 4：投資重要性の教育 ― お金を出す価値を感じさせる</h5>\n<p>核心：「節約・無料志向」を崩してください。「投資しないことがリスクである」とお感じいただくことが目的です。</p>\n<p>投資するメリット：スキルアップ→収入増加→時間確保という流れをお伝えください。ご自身が投資によって変化された体験談も非常に有効です。</p>\n<p>投資しないデメリット：機会損失・時間浪費・後悔という観点からお伝えください。独学で多大な時間とコストを無駄にしてしまった実体験なども、説得力のあるコンテンツになります。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>STEP 5：再現性の教育 ―</h5>\n<p>「自分にもできる」と感じさせる</p>\n<p>核心：「この手段であれば自分も成功できる」とお感じいただくことが目的です。口コミ・利用者の声（最も効果的）、Before/After写真（期間の明示）、具体的な数字と感想、段階的な成長の過程などをご活用ください。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>STEP 6：行動の教育 ― 迷ったら行動しようと感じさせる</h5>\n<p>核心：行動することが当たり前であるというマインドを形成します。①行動した先の良い未来（エピソードとタイムライン）、②行動しなかった先の悪い未来（後悔・機会損失）の2パターンでお伝えください。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>STEP 7：信用の教育（常時） ― すべての土台</h5>\n<p>核心：①〜⑥すべての土台となるステップです。信用がなければ、どのような教育も響きません。</p>\n<ul class=\"docx-list\"><li>実績・数字の開示（売上、フォロワー増加数、成功事例数）</li><li>専門性の証明（資格、経験年数、独自メソッド）</li><li>一貫性のある発信（ブレない価値観）</li><li>第三者からの評価（口コミ、メディア掲載、コラボ実績）</li></ul>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h3><strong>ストーリーズ②</strong></h3>\n<p><strong>人格設計・文化醸成・ハイライト</strong></p>\n<h5>【人格設計（先生 × 身近のバランス）】</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_625d2228.png\" alt=\"【人格設計（先生 × 身近のバランス）】\" loading=\"lazy\"></figure>\n<p>ストーリーズでは「先生（権威性）」と「身近な存在（親近感）」の2つの人格を使い分けてください。先生一辺倒では近寄りがたい印象になり、身近一辺倒では商品を購入していただく理由が生まれません。</p>\n<p>先生（権威性）6つの方法：①専門知識の発信　②実績・数字の開示　③Before/Afterの提示　④他者からの評価・口コミ　⑤学び続ける姿勢　⑥教育ストーリーズの定期投稿 →「この方はプロだ」＝ 信頼</p>\n<p>身近（親近感）6つの方法：①日常の裏側をお見せする　②感情を素直に共有する　③弱みや失敗談をお話しする　④フォロワーとの双方向交流　⑤趣味・プライベートの共有　⑥ユーモア →「この方は自分と同じだ」＝ 共感</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>【週間バランスの目安】</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_b8b701b2.png\" alt=\"【週間バランスの目安】\" loading=\"lazy\"></figure>\n<p>商品関連の内容を8割、プライベートネタを2割の比率が基本です。週7日のうち、商品・専門性関連（先生）を5〜6日、プライベート・身近ネタを1〜2日を目安にしてください。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>曜日</strong></th><th><strong>種別</strong></th><th><strong>内容例</strong></th></tr></thead><tbody><tr><td>月</td><td>先生</td><td>教育ストーリーズ（4本以上の「糸」）</td></tr><tr><td>火</td><td>先生</td><td>専門知識・実績共有</td></tr><tr><td>水</td><td>身近</td><td>裏側・オフショット・失敗談</td></tr><tr><td>木</td><td>先生</td><td>口コミシェア・Before/After</td></tr><tr><td>金</td><td>先生</td><td>教育ストーリーズ（4本以上の「糸」）</td></tr><tr><td>土</td><td>先生</td><td>フォロワー交流・Q&amp;A回答シェア</td></tr><tr><td>日</td><td>身近</td><td>プライベート・趣味</td></tr></tbody></table></div>\n<p>教育ストーリーズは2〜3日に1回を目安にしてください。毎日投稿するとくどくなりすぎてしまいます。日常の中に教育要素を自然に織り込めるようになれば、上級者といえます。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>【文化醸成4ステップ】</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_90ff823a.png\" alt=\"【文化醸成4ステップ】\" loading=\"lazy\"></figure>\n<p>文化を作らなければ、ストーリーズを攻略することはできません。文化とは、フォロワーの方が「この方のストーリーズは毎回チェックする」と習慣化している状態のことを指します。</p>\n<p>教育ストーリーズ：2〜3日に1回、4本以上の「糸」で投稿してください。</p>\n<p>DMシェア：「参考になりました」というDMをストーリーズでシェアしてください（権威性と双方向性の両方に効果があります）。</p>\n<p>実利の提供：ポジションを活かして、具体的なメリットをフォロワーの方にお届けください。</p>\n<p>毎日継続：理想は毎日2〜5件、最低でも週3日以上は投稿し、ストーリーズが「光っている状態」を保ってください。</p>\n<p>Bパターン（避けるべきルート）として、「収益を優先してクオリティの低いPRを引き受ける」という流れは信頼の毀損につながります。必ずAパターン（良い商品→満足→対価）で進めるようにしてください。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>【インタラクティブ機能】</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_57a8395c.png\" alt=\"【インタラクティブ機能】\" loading=\"lazy\"></figure>\n<p>1回のタップはアルゴリズム上の1ポイントになります。「指を動かしていただく」ことが、親密度を上げる最も効率的な方法です。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>機能</strong></th><th><strong>用途</strong></th><th><strong>使い方</strong></th></tr></thead><tbody><tr><td>アンケート（2択）</td><td>最もハードルが低く、タップで親密度を高められる</td><td>メイン活用</td></tr><tr><td>質問箱（Q&amp;A）</td><td>悩みの引き出し→信頼構築。回答シェアで教育にも活用可能</td><td>週1回程度</td></tr><tr><td>絵文字スライダー</td><td>直感的な反応を促しやすく、気軽にご参加いただける</td><td>ローテーション</td></tr><tr><td>リンクスタンプ</td><td>外部サイトへの直接導線（CV刈り取り）</td><td>教育完了後のみ</td></tr></tbody></table></div>\n<p>頻度の目安として、全種合計で週2〜3回にとどめてください。毎日使用すると飽きられてしまい、回答率が低下します。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h5>【ハイライト設計（24時間を永久資産に変える）】</h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_8121b1e7.png\" alt=\"【ハイライト設計（24時間を永久資産に変える）】\" loading=\"lazy\"></figure>\n<p>各ハイライトは3〜5枚にまとめるようにしてください。10枚以上になると点線表示となり、離脱につながりますのでご注意ください。</p>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<p><strong>｜PR・セールス設計</strong></p><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_384a6eb9.png\" alt=\"PR・セールス設計\" loading=\"lazy\"></figure>\n<h5>【セールスストーリーズの構成（5〜8本の糸）】</h5>\n<p>教育7ステップの①〜⑥が完了し、フォロワーの方の中に信頼・再現性・行動意欲が育った状態で投下するようにしてください。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>枚目</strong></th><th><strong>役割</strong></th><th><strong>内容</strong></th></tr></thead><tbody><tr><td>1</td><td>共感</td><td>「◯◯でお悩みの方、実は多いんですよね」</td></tr><tr><td>2</td><td>問題提起</td><td>「なぜ変われないかご存知ですか？」</td></tr><tr><td>3</td><td>解決策</td><td>「実は◯◯をすれば解決できます」</td></tr><tr><td>4</td><td>証拠</td><td>実績・口コミ・Before/Afterをご提示</td></tr><tr><td>5</td><td>限定感</td><td>「残り◯名」「本日まで」</td></tr><tr><td>6</td><td>CTA</td><td>「LINEのリンクから追加してください」</td></tr></tbody></table></div>\n<div class=\"ph-img\" data-near=\"コンセプトと投稿のズレが起きたときの判断\"></div>\n<h3><strong>ストーリーズ③</strong></h3>\n<h3><strong>リール投稿との役割分担</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_b516577a.png\" alt=\"リール投稿との役割分担\" loading=\"lazy\"></figure>\n<p>リールが<strong>「新規リーチ獲得」</strong>の場であるのに対し、ストーリーズは<strong>「既存フォロワーとの関係深化」</strong>の場である。役割が違うので、投稿の型も変える。</p>\n<div class=\"ph-img\" data-near=\"リール投稿との役割分担\"></div>\n<h4><strong>ストーリーズで機能するコンテンツ</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_9b0ad3fa.png\" alt=\"ストーリーズで機能するコンテンツ\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>施術当日の舞台裏(予約〜完成までの流れ)</li><li>お客様との会話・やり取り(許可必須)</li><li>質問箱への回答</li><li>ビフォーアフターの詳細プロセス(リールでは伝えきれない部分)</li><li>「今週のサロン」「本日の空き枠」などの業務情報</li></ul>\n<div class=\"ph-img\" data-near=\"ストーリーズで機能するコンテンツ\"></div>\n<h4><strong>ストーリーズでやらない方がいいこと</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_0a84a3d6.png\" alt=\"ストーリーズでやらない方がいいこと\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>作り込んだテンプレ投稿(リールの役割)</li><li>ノウハウ解説(保存されにくい形式)</li><li>長尺コンテンツ(15秒×複数枚で離脱が早い)</li></ul>\n<div class=\"ph-img\" data-near=\"ストーリーズでやらない方がいいこと\"></div>\n<h4><strong>リール→ストーリーズ→予約の導線</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_208e144a.png\" alt=\"リール→ストーリーズ→予約の導線\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li><strong>リール</strong>：3フック構造で発見される</li><li><strong>プロフィール</strong>：世界観で「このサロンを知りたい」と思わせる</li><li><strong>ストーリーズ</strong>：日常や舞台裏で「このサロンに行きたい」に変える</li><li><strong>ハイライト</strong>：予約・メニュー・アクセスへの誘導</li></ul>\n<div class=\"ph-img\" data-near=\"リール→ストーリーズ→予約の導線\"></div>\n<p>ストーリーズ単体で予約に繋げようとせず、<strong>リールで発見された人がストーリーズで関係を深め、予約に至る</strong>という導線全体で設計する。</p><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_06_75790a71.png\" alt=\"ストーリーズ単体で予約に繋げようとせず\" loading=\"lazy\"></figure>\n<h4><strong>ストーリーズの更新頻度</strong></h4>\n<ul class=\"docx-list\"><li><strong>理想</strong>：毎日2〜5件</li><li><strong>最低ライン</strong>：週3日は更新</li><li><strong>24時間で消えるため</strong>、止まると「活動していないサロン」に見える</li></ul>\n<div class=\"ph-img\" data-near=\"ストーリーズの更新頻度\"></div>", "ig/07": "<h2><strong>投稿分析と改善</strong></h2>\n<h3><strong>投稿分析の目的</strong></h3>\n<p>Instagramの運用は「作って終わり」ではない。<strong>毎投稿の24時間後の数字を記録し、勝ちパターンと負けパターンを言語化する</strong>ことで、運用は加速する。感覚運用と数値運用の差は、3ヶ月で圧倒的な差になって現れる。</p>\n<div class=\"ph-img\" data-near=\"投稿分析の目的\"></div>\n<h3><strong>分析で見るべき最低限の5指標</strong></h3>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>指標</strong></th><th><strong>計算方法</strong></th><th><strong>目安</strong></th></tr></thead><tbody><tr><td>スキップ率</td><td>Instagramインサイトで確認</td><td>40%未満を目指す</td></tr><tr><td>保存率</td><td>保存数 ÷ 再生数</td><td>0.3%以上で良好</td></tr><tr><td>転換率</td><td>フォロワー増 ÷ 再生数</td><td>0.1〜0.3%以上</td></tr><tr><td>フック数</td><td>関係性・数字・対比の有無</td><td>2以上を目指す</td></tr><tr><td>投稿時間</td><td>時間帯別の再生平均</td><td>自店舗の最適時間を特定</td></tr></tbody></table></div>\n<h3><strong>投稿計測シートの構成</strong></h3>\n<p>毎投稿の24時間後に、以下の項目を記録する。Googleスプレッドシートやエクセルで管理する。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>項目</strong></th><th><strong>記入タイミング</strong></th></tr></thead><tbody><tr><td>投稿No.・投稿日・投稿時間・曜日</td><td>投稿時</td></tr><tr><td>テーマ(タイトル)</td><td>投稿時</td></tr><tr><td>冒頭1秒のセリフ／テロップ</td><td>投稿時</td></tr><tr><td>関係性フック(何)</td><td>投稿時</td></tr><tr><td>数字フック(何)</td><td>投稿時</td></tr><tr><td>対比構造(何と何)</td><td>投稿時</td></tr><tr><td>フック数(0〜3)</td><td>投稿時</td></tr><tr><td>24h後：再生数</td><td>24h後</td></tr><tr><td>24h後：いいね数</td><td>24h後</td></tr><tr><td>24h後：保存数</td><td>24h後</td></tr><tr><td>24h後：コメント数</td><td>24h後</td></tr><tr><td>24h後：スキップ率</td><td>24h後</td></tr><tr><td>24h後：フォロワー増</td><td>24h後</td></tr><tr><td>保存率(保存÷再生)</td><td>24h後</td></tr><tr><td>転換率(FW増÷再生)</td><td>24h後</td></tr><tr><td>合否判定(◎○△×)</td><td>24h後</td></tr><tr><td>振り返りメモ</td><td>24h後</td></tr></tbody></table></div>\n<h3><strong>投稿の合否判定基準</strong></h3>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>判定</strong></th><th><strong>条件</strong></th><th><strong>アクション</strong></th></tr></thead><tbody><tr><td>◎</td><td>スキップ率30%未満 × 転換率0.3%以上</td><td>勝ちテンプレとして量産する</td></tr><tr><td>○</td><td>スキップ率30〜40%</td><td>合格。冒頭をさらに磨く</td></tr><tr><td>△</td><td>スキップ率40〜50%</td><td>要改善。次回は冒頭を見直す</td></tr><tr><td>×</td><td>スキップ率50%超</td><td>同じテーマは2度出さない</td></tr></tbody></table></div>\n<h3><strong>週次振り返りの運用</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_07_8c006131.png\" alt=\"週次振り返りの運用\" loading=\"lazy\"></figure>\n<p>毎週日曜日(または任意の曜日)に30分確保し、以下を点検する。</p>\n<ul class=\"docx-list\"><li>今週の再生数中央値は先週より上がったか</li><li>スキップ率40%未満の投稿の割合は何%か(目標：70%以上)</li><li>◎判定の投稿はあったか。あれば来週量産計画を立てる</li><li>×判定の投稿の共通点は何か。今後の禁止事項に追加する</li><li>転換率0.3%以上の投稿はあったか。プロフィール・世界観との一貫性を確認する</li></ul>\n<div class=\"ph-img\" data-near=\"週次振り返りの運用\"></div>\n<h3><strong>避けるべき3つの負けパターン</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_07_d7baa609.png\" alt=\"避けるべき3つの負けパターン\" loading=\"lazy\"></figure>\n<h4><strong>負けパターン①：「ルーティーン系／日常紹介系」</strong></h4>\n<ul class=\"docx-list\"><li>❌「朝のサロン準備ルーティーン」「開店前の私の過ごし方」</li><li>❌「〇〇が大好きな店長のある日」</li><li>市場飽和ジャンルで、3フックがどれも満たされないため沈む</li></ul>\n<div class=\"ph-img\" data-near=\"負けパターン①：「ルーティーン系／日常紹介系」\"></div>\n<h4><strong>負けパターン②：「自己紹介・自分語り系」(初期ステージでは)</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_07_54d3f319.png\" alt=\"負けパターン②：「自己紹介・自分語り系」\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>❌「開業した理由」「独立までの道のり」</li><li>❌「サロンの内装紹介」「こだわりのインテリア」</li><li>発見フィード視聴者は、知らない誰かの自己紹介に関心を持たない</li><li>例外：フォロワー5,000以上で月1回程度なら有効</li></ul>\n<div class=\"ph-img\" data-near=\"負けパターン②：「自己紹介・自分語り系」(初期ステージでは)\"></div>\n<h4><strong>負けパターン③：「単発ノウハウ」(初期ステージでは)</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_07_1fa2f84c.png\" alt=\"負けパターン③：「単発ノウハウ」\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>❌「美髪を保つ3つのコツ」「ネイルを長持ちさせる方法」</li><li>ノウハウは「誰が言っているか」の権威性が固まってから刺さる</li><li>フォロワー5,000未満では、同じ情報でも保存されない</li></ul>\n<div class=\"ph-img\" data-near=\"負けパターン③：「単発ノウハウ」(初期ステージでは)\"></div>\n<h3><strong>3ヶ月で辿るべきロードマップ</strong></h3>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>期間</strong></th><th><strong>目標</strong></th></tr></thead><tbody><tr><td>1ヶ月目</td><td>3フック2つ以上の投稿を週4本・計16本投下。スキップ率40%未満を50%以上達成</td></tr><tr><td>2ヶ月目</td><td>◎判定投稿を2本以上出す。再生中央値を1ヶ月目の2倍に</td></tr><tr><td>3ヶ月目</td><td>テンプレを3種類以上確立。転換率0.3%以上の投稿を定常化</td></tr></tbody></table></div>\n<h3><strong>運用を続ける覚悟</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/ig_07_420b2402.png\" alt=\"運用を続ける覚悟\" loading=\"lazy\"></figure>\n<p><strong>最低20〜30本は同じテンプレを磨き続ける</strong>必要がある。3〜5本で判断してはいけない。伸びるアカウントの多くは、40〜50本目で一気に加速する。投稿頻度を落とさず、データを記録し続けることが、店舗アカウントが勝つ唯一の道である。</p>\n<div class=\"ph-img\" data-near=\"運用を続ける覚悟\"></div>\n<h2><strong>全セクションを貫く一行指針</strong></h2>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>核心メッセージ</strong><br/>「良い投稿」を目指すのではなく、「3フック(関係性・数字・対比)が揃った勝ちテンプレ」を発見し、スキップ率40%未満を量産する。負けパターン(ルーティーン系・自己紹介・単発ノウハウ)を排除しながら、毎投稿の数字を記録し続けることで、3ヶ月後に中央値が数倍に上がる。</th></tr></thead></table></div>\n<p>Theads</p>\n<p><strong>｜Threads集客設計</strong> </p>\n<p>導線設計 → DM → CTA投稿 → 分析改善</p>\n<p>「投稿はできるが、売上に繋がらない」を解決する 集客導線の設計から分析改善までの完全ガイドです。</p>\n<div class=\"ph-img\" data-near=\"全セクションを貫く一行指針\"></div>\n<p><strong>目的</strong></p>\n<p>集客の絞り込み構造設計 → DM導線 → 分析改善</p>\n<p>を自分で回せるようになるためのものです。「投稿した後、どうやって売上につなげるか」に集中しています。</p>\n<p>すべての内容は、実際に集客につながったThreadsアカウント運用（6ヶ月間）の実績データをもとに書かれています。</p>\n<div class=\"ph-img\" data-near=\"全セクションを貫く一行指針\"></div>\n<p><strong>用語集</strong></p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>用語</strong></th><th><strong>意味</strong></th></tr></thead><tbody><tr><td>IMP</td><td>インプレッション。投稿が表示された回数</td></tr><tr><td>ENG率</td><td>エンゲージメント率。(いいね+コメント+再投稿) ÷ IMP × 100</td></tr><tr><td>CVR</td><td>コンバージョン率。ある行動から次の行動に進んだ割合</td></tr><tr><td>CTA</td><td>Call To Action。「DMしてね」「リンクから見てね」など行動を促す文言</td></tr><tr><td>集客の絞り込み構造</td><td>認知→興味→検討→成約へと人数が段階的に絞られていく集客の構造</td></tr><tr><td>ゴースト投稿</td><td>24時間で自動削除される投稿。反応テストに最適</td></tr></tbody></table></div>", "threads/01": "<h3><strong>Threadsという戦場の特性を理解する</strong></h3>\n<p>Instagramがリールとビジュアルで勝負する世界であるのに対し、Threadsは<strong>文字と構文で勝負する別種のSNS</strong>である。同じ会社(Meta)のプロダクトでも、アルゴリズムも視聴者の行動も投稿の勝ち筋も全く異なる。</p>\n<p>Instagramでの運用ノウハウをそのまま持ち込むと、ほぼ確実に沈む。Threadsに勝つには、Threadsの構造を理解したうえで、専用のテンプレを習得する必要がある。</p>\n<div class=\"ph-img\" data-near=\"Threadsという戦場の特性を理解する\"></div>\n<h3><strong>Threadsの3つの特性</strong></h3>\n<h4><strong>特性①：「初速15分」で全てが決まる</strong></h4>\n<p>Threadsのアルゴリズムは、投稿直後の反応速度を極端に重視する。<strong>投稿15分以内に閲覧・いいね・返信が取れなければ、その後いくら時間が経っても伸びない</strong>。Instagramのように「数日後にバズる」という現象は起きにくい。</p>\n<p>これは運用上、以下を意味する：</p>\n<ul class=\"docx-list\"><li>投稿時間帯を厳密に選ぶ必要がある</li><li>一度失敗した投稿は、同じ内容で再投稿しても2度目は伸びない</li><li>同じパターンを時間をずらして再投下すると、むしろ意図的に抑制される可能性がある</li></ul>\n<div class=\"ph-img\" data-near=\"特性①：「初速15分」で全てが決まる\"></div>\n<h4><strong>特性②：「読ませない」SNS</strong></h4>\n<p>Threadsは一見、長文が書けるSNSに見える。しかし実データは真逆を示す。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>文字数</strong></th><th><strong>閲覧平均</strong></th><th><strong>閲覧中央値</strong></th><th><strong>FW増平均</strong></th></tr></thead><tbody><tr><td>〜20字(超短文)</td><td>21,996</td><td>2,522</td><td>48.2</td></tr><tr><td>21〜50字(短文)</td><td>20,518</td><td>1,402</td><td>48.3</td></tr><tr><td>51〜100字(中文)</td><td>2,477</td><td>320</td><td>3.8</td></tr><tr><td>101〜150字(長文)</td><td>1,085</td><td>512</td><td>0.7</td></tr><tr><td>151字以上(超長文)</td><td>602</td><td>413</td><td>0.5</td></tr></tbody></table></div>\n<ul class=\"docx-list\"><li>100字を超えた瞬間に閲覧が10分の1に激減</li><li>150字超の投稿はFW増平均0.5。<strong>20投稿で1フォロワーしか増えない</strong></li><li><strong>Threadsは「書き込む」ではなく「一文で突き刺す」SNS</strong></li></ul>\n<p>店舗オーナーにとっての示唆：サロンの魅力を丁寧に書こうとすればするほど届かなくなる。伝えたいことを1つに絞り、20〜30字のフレーズに削ぎ落とす技術が必要。</p>\n<h4><strong>特性③：画像5枚で世界が変わる</strong></h4>\n<p>Threadsは画像添付の有無と枚数で、リーチに決定的な差が出る。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>画像枚数</strong></th><th><strong>本数</strong></th><th><strong>閲覧平均</strong></th><th><strong>閲覧中央値</strong></th><th><strong>FW増平均</strong></th></tr></thead><tbody><tr><td>画像なし</td><td>283</td><td>1,690</td><td>364</td><td>1.7</td></tr><tr><td>画像1枚</td><td>12</td><td>1,906</td><td>2,026</td><td>1.9</td></tr><tr><td>画像2〜4枚</td><td>19</td><td>3,861</td><td>2,538</td><td>9.3</td></tr><tr><td>画像5枚以上</td><td>26</td><td>66,005</td><td>14,000</td><td>152.5</td></tr></tbody></table></div>\n<p>ある先行事例のデータでは、<strong>画像5枚以上の投稿26本(全投稿の7.6%)が、フォロワー獲得の85%を生み出した</strong>。画像5枚以上の閲覧中央値14,000は、画像なしの364の約38倍。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>結論</strong><br/>Threadsで勝つには、文章だけでなく「画像5枚のスライド形式」を活用することが必須条件となる。</th></tr></thead></table></div>\n<h3><strong>Threadsで追うべき指標</strong></h3>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>指標</strong></th><th><strong>意味</strong></th><th><strong>見るタイミング</strong></th></tr></thead><tbody><tr><td>閲覧数</td><td>投稿が届いた回数</td><td>投稿直後・24h後</td></tr><tr><td>閲覧中央値(月次)</td><td>運用の健全性</td><td>月次振り返り</td></tr><tr><td>いいね率(いいね÷閲覧)</td><td>投稿の質</td><td>個別投稿ごと</td></tr><tr><td>再投稿数</td><td>拡散力の指標</td><td>個別投稿ごと</td></tr><tr><td>FW増加数</td><td>新規リーチからの転換</td><td>個別投稿ごと</td></tr><tr><td>応募連絡数</td><td>集客投稿の成果</td><td>集客投稿ごと</td></tr></tbody></table></div>\n<p>重要なのは<strong>閲覧数の平均ではなく中央値</strong>で見ること。平均値は一部のバズ投稿に引きずられるため、実態を反映しない。</p>\n<h3><strong>覚悟すべきこと：Threadsは「バズ寡占型」SNS</strong></h3>\n<p>ある先行事例データでは、全投稿340本中、閲覧5万超はわずか10本(2.9%)。しかしその10本だけでフォロワー獲得の80%を占めた。</p>\n<p>つまり<strong>Threadsは、「コツコツ積み上げ型」ではなく「限定的な勝ち投稿に結果が集中する」極端な寡占構造</strong>である。凡庸な投稿を量産しても、評価はほぼ累積しない。勝ち投稿を作る技術に集中投下する覚悟が必要。</p>\n<div class=\"ph-img\" data-near=\"覚悟すべきこと：Threadsは「バズ寡占型」SNS\"></div>", "threads/02": "<h3><strong>Threadsのアカウント設計は「3層構造」で作る</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_02_66f18f25.png\" alt=\"Threadsのアカウント設計は「3層構造」で作る\" loading=\"lazy\"></figure>\n<p>Threadsのアカウントは、役割の違う3種類の投稿を分離して設計する必要がある。この分離ができていないアカウントは、どれだけ投稿してもフォロワーも集客も伸びない。</p>\n<div class=\"ph-img\" data-near=\"Threadsのアカウント設計は「3層構造」で作る\"></div>\n<h3><strong>3層のコンテンツ設計</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_02_9742b127.png\" alt=\"3層のコンテンツ設計\" loading=\"lazy\"></figure>\n<h4><strong>第1層：リーチ獲得層(全体の60〜70%)</strong></h4>\n<ul class=\"docx-list\"><li><strong>目的</strong>：新規層にアカウントを発見させ、閲覧数を稼ぐ</li><li><strong>特徴</strong>：広く刺さるテーマ、画像5枚スライド、短文フック</li><li><strong>美容業界での例</strong>：「失恋の翌日にイメチェンした女性の5つの共通点」「結婚式まで30日の花嫁が必ずやる準備5選」</li></ul>\n<div class=\"ph-img\" data-near=\"第1層：リーチ獲得層(全体の60〜70%)\"></div>\n<h4><strong>第2層：信頼構築層(全体の20〜30%)</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_02_ae69ebf6.png\" alt=\"第2層：信頼構築層(全体の20〜30%)\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li><strong>目的</strong>：フォロワーに「このサロンは信頼できる」と認識させる</li><li><strong>特徴</strong>：サロンの視点・哲学・お客様とのエピソード</li><li><strong>美容業界での例</strong>：「10年目の美容師だから言える髪の真実」「年間500件の施術で見えた、失敗するカラー剤の見分け方」</li></ul>\n<div class=\"ph-img\" data-near=\"第2層：信頼構築層(全体の20〜30%)\"></div>\n<h4><strong>第3層：集客層(全体の5〜10%)</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_02_8ef85557.png\" alt=\"第3層：集客層(全体の5〜10%)\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li><strong>目的</strong>：実際の来店・問い合わせに転換する</li><li><strong>特徴</strong>：明確なオファー、限定性、応募方法の明瞭化</li><li><strong>美容業界での例</strong>：「【モニター募集】新メニュー3名限定で半額体験」</li></ul>\n<div class=\"ph-img\" data-near=\"第3層：集客層(全体の5〜10%)\"></div>\n<h3><strong>コンセプト設計のよくある失敗</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_02_73bcd347.png\" alt=\"コンセプト設計のよくある失敗\" loading=\"lazy\"></figure>\n<h5><strong>失敗①：3層を混ぜた投稿を作る</strong></h5>\n<p>1投稿に「リーチ狙い」と「集客狙い」を両立させようとすると、どちらの目的も達成できない。<strong>役割を1投稿1役に絞る</strong>のが鉄則。</p>\n<div class=\"ph-img\" data-near=\"失敗①：3層を混ぜた投稿を作る\"></div>\n<h5><strong>失敗②：第2層だけで運用する</strong></h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_02_223fc29e.png\" alt=\"失敗②：第2層だけで運用する\" loading=\"lazy\"></figure>\n<p>「うちのサロンの世界観を伝えたい」という思いが強いと、信頼構築層だけで投稿を埋めてしまう。結果、新規リーチが来ず閉じたアカウントになる。</p>\n<div class=\"ph-img\" data-near=\"失敗②：第2層だけで運用する\"></div>\n<h5><strong>失敗③：第3層ばかり投稿する</strong></h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_02_6a9206a3.png\" alt=\"失敗③：第3層ばかり投稿する\" loading=\"lazy\"></figure>\n<p>集客したい気持ちが先走ると、募集投稿ばかりになる。<strong>募集投稿は全体の5〜10%</strong>に抑えないと、フォロワーが「営業アカウント」と認識して離れていく。</p>\n<div class=\"ph-img\" data-near=\"失敗③：第3層ばかり投稿する\"></div>\n<h3><strong>アカウント設計で決めるべき5項目</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_02_ce98b60a.png\" alt=\"アカウント設計で決めるべき5項目\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li><strong>ターゲットの1人像</strong>(年齢・職業・悩み・サロンに来る動機を具体的に)</li><li><strong>ターゲットが反応するテーマ領域</strong>(3〜5個に絞る)</li><li><strong>3層の投稿比率</strong>(例：リーチ60％／信頼30％／集客10%)</li><li><strong>差別化できる切り口</strong>(他サロンのThreadsにない視点)</li><li><strong>投稿頻度のベースライン</strong>(毎日か、週5か、週3か)</li></ul>\n<div class=\"ph-img\" data-near=\"アカウント設計で決めるべき5項目\"></div>\n<h3><strong>運用途中のコンセプト転換は命取り</strong></h3>\n<p>ある先行事例では、運用2〜3ヶ月目で「勝ちテンプレが見えた段階で別テーマに転換」した結果、閲覧数が<strong>10分の1に激減</strong>した記録がある。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>期間</strong></th><th><strong>主テーマ</strong></th><th><strong>閲覧平均</strong></th><th><strong>FW増合計</strong></th></tr></thead><tbody><tr><td>1〜2ヶ月目</td><td>心理・メンタル系</td><td>31,982</td><td>3,044</td></tr><tr><td>3ヶ月目</td><td>自ジャンル(ノウハウ)系に転換</td><td>393</td><td>15</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>運用の鉄則</strong><br/>コンセプト転換は、伸びているアカウントほど慎重に。バズテーマは捨てずに、集客層の投稿をそこに混ぜ込む形で転換するのが正解。</th></tr></thead></table></div>", "threads/03": "<h3><strong>Threadsでバズる投稿の構造</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_0018953c.png\" alt=\"Threadsでバズる投稿の構造\" loading=\"lazy\"></figure>\n<p>認知・PR投稿(第1層＝リーチ獲得層)の目的は、<strong>バズを発生させて新規リーチを拡大すること</strong>。そのためには、Threadsのアルゴリズムと視聴者心理の両方に最適化された「型」が存在する。</p>\n<div class=\"ph-img\" data-near=\"Threadsでバズる投稿の構造\"></div>\n<h3><strong>最強テンプレ：「画像5枚 × 30字以内キャッチコピー」</strong></h3>\n<p>ある先行事例のデータから、最も勝率が高いテンプレが明確に特定されている。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>条件</strong></th><th><strong>本数</strong></th><th><strong>閲覧平均</strong></th><th><strong>閲覧中央値</strong></th><th><strong>FW増平均</strong></th></tr></thead><tbody><tr><td>画像5枚以上 × 30字以内</td><td>23</td><td>74,374</td><td>24,000</td><td>171.4</td></tr><tr><td>画像5枚以上 × 31字以上</td><td>3</td><td>1,846</td><td>1,508</td><td>7.7</td></tr><tr><td>画像なし × 30字以内</td><td>130</td><td>2,755</td><td>1,690</td><td>7.0</td></tr><tr><td>画像なし × 31字以上</td><td>184</td><td>1,737</td><td>396</td><td>2.4</td></tr></tbody></table></div>\n<p><strong>画像5枚 × 30字以内の閲覧中央値は24,000</strong>。他の条件と比べて15〜60倍の差。文字数が31字を超えると、同じ画像5枚でも閲覧は1/16に激減する。</p>\n<h3><strong>バズ投稿の4要素</strong></h3>\n<p>実データから、バズ投稿には以下4つの共通要素がある。</p>\n<h4><strong>要素①：誰向けかを冒頭で即明示</strong></h4>\n<p>「〇〇な人は」「〇〇すぎる人は」「〇〇がちな人は」という構文で、<strong>冒頭1〜3字で視聴者が自分ごと化できる</strong>設計。</p>\n<p>美容業界での例：</p>\n<ul class=\"docx-list\"><li>❌「髪の毛のケア方法を紹介」</li><li>⭕「髪がパサつく人は必ずやっている5つのこと」</li></ul>\n<h4><strong>要素②：「〇つの〇〇」という数字フレーズ</strong></h4>\n<p>「5つの心理状態」「3つの罠」「4step」など、<strong>数字が入ったフレーズが含まれる投稿は閲覧中央値が2.6倍高い</strong>。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>数字フレーズ</strong></th><th><strong>本数</strong></th><th><strong>閲覧平均</strong></th><th><strong>閲覧中央値</strong></th><th><strong>FW増平均</strong></th></tr></thead><tbody><tr><td>あり</td><td>23</td><td>13,197</td><td>1,297</td><td>44.0</td></tr><tr><td>なし</td><td>317</td><td>8,287</td><td>492</td><td>16.5</td></tr></tbody></table></div>\n<p>美容業界での例：</p>\n<ul class=\"docx-list\"><li>結婚式前に花嫁が絶対やるべき3つの頭皮ケア</li><li>30代女性の髪が老ける5つの原因</li><li>失敗しないサロン選びの4つの質問</li></ul>\n<h4><strong>要素③：カギカッコによる視覚的フック</strong></h4>\n<p>「｣」や「」」で中核ワードを強調する投稿は、<strong>閲覧中央値が54%、FW増平均が3倍高い</strong>。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>カギカッコ</strong></th><th><strong>本数</strong></th><th><strong>閲覧平均</strong></th><th><strong>閲覧中央値</strong></th><th><strong>FW増平均</strong></th></tr></thead><tbody><tr><td>あり</td><td>73</td><td>12,844</td><td>712</td><td>36.2</td></tr><tr><td>なし</td><td>267</td><td>6,994</td><td>463</td><td>11.8</td></tr></tbody></table></div>\n<p>美容業界での例：</p>\n<ul class=\"docx-list\"><li>30代女性がなりやすい｢髪の老化｣の5つの兆候</li><li>結婚式前に絶対やるべき｢プレ花ケア｣</li><li>美容師しか知らない｢シャンプー選び｣の正解</li></ul>\n<h4><strong>要素④：画像5枚のスライド構成</strong></h4>\n<p>画像5枚は以下の構成で設計すると反応が取れる：</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>画像</strong></th><th><strong>役割</strong></th></tr></thead><tbody><tr><td>1枚目</td><td>タイトル(本文と同じかシンプル化したコピー)</td></tr><tr><td>2枚目</td><td>1つ目の項目＋簡潔な説明</td></tr><tr><td>3枚目</td><td>2つ目の項目＋簡潔な説明</td></tr><tr><td>4枚目</td><td>3つ目の項目＋簡潔な説明</td></tr><tr><td>5枚目</td><td>まとめ／CTA(プロフィールへの誘導など)</td></tr></tbody></table></div>\n<p>画像のデザインは、ユーザーがスワイプしたくなる視認性の高さが最重要。文字数は画像1枚あたり30〜50字を上限にする。</p>\n<h3><strong>美容業界向けバズテンプレ例</strong></h3>\n<h4><strong>ネイルサロン</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_1e4a75b1.png\" alt=\"ネイルサロン\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>爪が弱い人がやってしまっている｢5つのNG習慣｣</li><li>ネイリストが教える｢長持ちネイル｣3つの秘訣</li><li>結婚式までに整えたい｢花嫁の爪｣4つのステップ</li></ul>\n<div class=\"ph-img\" data-near=\"ネイルサロン\"></div>\n<h4><strong>美容室</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_a1e0aa8c.png\" alt=\"美容室\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>30代女性の髪が急に老ける｢5つの兆候｣</li><li>美容師が自分の家族には絶対勧めない｢3つのヘアケア｣</li><li>カラーが1週間で色落ちする人の｢4つの共通点｣</li></ul>\n<div class=\"ph-img\" data-near=\"美容室\"></div>\n<h4><strong>エステ・脱毛</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_70760ca1.png\" alt=\"エステ・脱毛\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>背中ニキビが治らない人がやっている｢5つのNG｣</li><li>プロが教える｢VIO脱毛｣3つの真実</li><li>40代でも肌が綺麗な人の｢4つの習慣｣</li></ul>\n<div class=\"ph-img\" data-near=\"エステ・脱毛\"></div>\n<h4><strong>まつ毛・眉毛サロン</strong></h4><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_68663c3d.png\" alt=\"まつ毛・眉毛サロン\" loading=\"lazy\"></figure>\n<ul class=\"docx-list\"><li>眉毛が不自然になる人の｢5つの特徴｣</li><li>まつ毛が抜けやすい人がやっている｢3つのNG｣</li><li>10歳若く見える｢眉毛の黄金バランス｣4つのポイント</li></ul>\n<div class=\"ph-img\" data-near=\"まつ毛・眉毛サロン\"></div>\n<h3><strong>伸びないパターン(避けるべき)</strong></h3>\n<p>実データから、以下の投稿は<strong>確実にリーチが取れない</strong>ことが分かっている。</p>\n<h5><strong>負けパターン①：お金・稼ぐ・投資系</strong></h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_cbc7da2b.png\" alt=\"負けパターン①：お金・稼ぐ・投資系\" loading=\"lazy\"></figure>\n<p>「胡散臭い」と直感的に判断され、投稿冒頭で離脱される。美容業界での類例：「月100万売れる美容師の働き方」など、収入軸で訴求する投稿。</p>\n<div class=\"ph-img\" data-near=\"負けパターン①：お金・稼ぐ・投資系\"></div>\n<h5><strong>負けパターン②：他者批判・業界批判</strong></h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_6335e36a.png\" alt=\"負けパターン②：他者批判・業界批判\" loading=\"lazy\"></figure>\n<p>「〇〇は間違い」「〇〇の嘘」という否定構文は、実データでは閲覧が著しく低い。視聴者は<strong>攻撃的な投稿より建設的な投稿を好む</strong>。</p>\n<div class=\"ph-img\" data-near=\"負けパターン②：他者批判・業界批判\"></div>\n<h5><strong>負けパターン③：抽象的な自己論</strong></h5><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_03_7981b0f0.png\" alt=\"負けパターン③：抽象的な自己論\" loading=\"lazy\"></figure>\n<p>「大切なことは〇〇」「本質は〇〇」という抽象論は、具体性がないため離脱される。<strong>具体的な数字・状況・エピソードに落とし込んでから投稿する</strong></p>\n<p>（画像）。</p>\n<h3><strong>投稿時間：曜日と時間帯の最適化</strong></h3>\n<p>実データでの曜日別結果：</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>曜日</strong></th><th><strong>閲覧平均</strong></th><th><strong>FW増平均</strong></th><th><strong>判定</strong></th></tr></thead><tbody><tr><td>土</td><td>21,825</td><td>41.5</td><td>最強</td></tr><tr><td>水</td><td>8,406</td><td>20.1</td><td>強い</td></tr><tr><td>木</td><td>8,646</td><td>12.0</td><td>強い</td></tr><tr><td>日</td><td>8,145</td><td>27.2</td><td>強い</td></tr><tr><td>月</td><td>6,000</td><td>19.9</td><td>中</td></tr><tr><td>火</td><td>6,398</td><td>5.7</td><td>中</td></tr><tr><td>金</td><td>1,012</td><td>1.2</td><td>壊滅</td></tr></tbody></table></div>\n<ul class=\"docx-list\"><li><strong>土曜日がゴールデン</strong>。金曜の約22倍の閲覧平均</li><li>金曜投稿は壊滅的。避けるべき曜日</li><li>時間帯は平日19〜21時／週末10〜12時が反応良し</li></ul>", "threads/04": "<h3><strong>集客投稿は「1本に賭ける」設計にする</strong></h3><figure class=\"curriculum-img\"><img src=\"img/curriculum/threads_04_23368262.png\" alt=\"集客投稿は「1本に賭ける」設計にする\" loading=\"lazy\"></figure>\n<p>集客投稿(第3層)は、バズ用投稿と全く別の設計思想で作る必要がある。数を打つのではなく、<strong>勝ちパターンを月1〜2本に絞って投下する</strong>のが正解。</p>\n<div class=\"ph-img\" data-near=\"集客投稿は「1本に賭ける」設計にする\"></div>\n<h3><strong>実データが示す集客投稿の真実</strong></h3>\n<p>ある先行事例の集客投稿13本の結果：</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>成果の分布</strong></th><th><strong>投稿本数</strong></th><th><strong>応募合計</strong></th><th><strong>割合</strong></th></tr></thead><tbody><tr><td>勝ち投稿(1本)</td><td>1本</td><td>68件</td><td>82%</td></tr><tr><td>準勝ち投稿(4本)</td><td>4本</td><td>15件</td><td>18%</td></tr><tr><td>空振り投稿</td><td>8本</td><td>0件</td><td>0%</td></tr></tbody></table></div>\n<p><strong>13本投稿して、応募の82%をたった1投稿が叩き出した</strong>。残り12投稿の応募は合計15件。</p>\n<h3><strong>勝った集客投稿の共通構造</strong></h3>\n<p>応募を獲得できた5投稿に共通する4要素：</p>\n<h4><strong>要素①：「無料」「モニター」「限定」という訴求軸</strong></h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>CTA文言</strong></th><th><strong>成果</strong></th><th><strong>判定</strong></th></tr></thead><tbody><tr><td>「プロデュースします」(有料)</td><td>アポ2件</td><td>△</td></tr><tr><td>「モニター募集」(無料)</td><td>アポ25件</td><td>◎</td></tr></tbody></table></div>\n<p><strong>「有料案内」より「モニター(無料)」が圧倒的に反応が高い</strong>。</p>\n<p>美容業界での応用：</p>\n<ul class=\"docx-list\"><li>「新メニューモニター3名限定」</li><li>「新規限定・初回施術半額キャンペーン」</li><li>「SNS撮影モデル募集(施術無料)」</li></ul>\n<h4><strong>要素②：人数の明確な限定性</strong></h4>\n<ul class=\"docx-list\"><li>「10名限定」「3名限定」「先着5名」など具体的な人数</li><li>「限定」という言葉だけでなく、<strong>具体的な数字で限定性を担保</strong>する</li></ul>\n<h4><strong>要素③：実績の具体性</strong></h4>\n<ul class=\"docx-list\"><li>「過去の生徒は0から月90万達成」「事業集客数が3倍に上昇」など</li><li><strong>数字で実績を提示する</strong>ことで信頼と期待を同時に作る</li></ul>\n<p>美容業界での応用：</p>\n<ul class=\"docx-list\"><li>「過去モニター10名中8名が『人生で一番気に入った』と回答」</li><li>「新メニュー体験者の80%がリピート予約」</li><li>「施術後の写真を見た人の半数が『どこで切りましたか』と質問」</li></ul>\n<h4><strong>要素④：応募方法の明瞭さ</strong></h4>\n<ul class=\"docx-list\"><li>「この投稿のコメントに『希望』とコメント → DMにメッセージ」</li><li><strong>応募者が迷わない、具体的なステップの明示</strong></li></ul>\n<p>美容業界での応用：</p>\n<ul class=\"docx-list\"><li>「この投稿に『モニター希望』とコメント → DMでご案内します」</li><li>「プロフィールのリンクから予約ページへ」</li></ul>\n<h3><strong>集客投稿のタイミング設計：4段階投下</strong></h3>\n<p>実データから、集客投稿は<strong>4段階のタイミングで投下する</strong>のが最も効果的と分かっている。</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th><strong>段階</strong></th><th><strong>タイミング</strong></th><th><strong>狙い</strong></th></tr></thead><tbody><tr><td>① 募集開始</td><td>キャンペーン初日</td><td>認知獲得・初動応募</td></tr><tr><td>② 社会的証明</td><td>募集開始から2〜3日後</td><td>「既に〇名申込」で勢いを演出</td></tr><tr><td>③ 希少性喚起</td><td>締切5日前</td><td>「残り〇名」で焦りを作る</td></tr><tr><td>④ 緊急性喚起</td><td>締切前日・当日</td><td>「最終日・残り時間」で背中を押す</td></tr></tbody></table></div>\n<p><strong>重要なのは、締切直前の投稿は閲覧数自体は取れない</strong>こと。実データでは締切当日の投稿は閲覧150程度。<strong>既にプロフィールを見てくれている層・固定フォロワー層への最後の一押し</strong>として機能する。</p>\n<h3><strong>集客投稿のテンプレート構造</strong></h3>\n<h4><strong>テンプレA：募集開始投稿</strong></h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th>【〇〇募集】<br/>〇名限定で[具体的オファー]<br/>過去の[実績・数字]<br/>応募方法：この投稿に「〇〇」とコメント → DMでご案内</th></tr></thead></table></div>\n<p>美容業界での例：</p>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th>【モニター募集】<br/>3名限定で新メニュー「〇〇ケア」を通常価格の半額で体験<br/>過去モニター10名中9名が「人生で一番良かった」と回答<br/>応募方法：この投稿に「モニター希望」とコメント → DMでご案内</th></tr></thead></table></div>\n<h4><strong>テンプレB：社会的証明投稿</strong></h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th>公開〇日で既に〇名以上の申し込みが。<br/>[ターゲット]だけに伝えたい[価値]<br/>応募は締切日の〇月〇日まで</th></tr></thead></table></div>\n<h4><strong>テンプレC：希少性投稿</strong></h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th>残り〇名／残り〇日<br/>[ターゲット]の最後のチャンス<br/>[具体的オファー再掲]</th></tr></thead></table></div>\n<h4><strong>テンプレD：緊急性投稿</strong></h4>\n<div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th>本日締切／残り〇時間<br/>[ターゲット]、今日で最後<br/>まだ間に合う[オファー]</th></tr></thead></table></div>\n<h3><strong>集客投稿の失敗パターン</strong></h3>\n<h5><strong>失敗①：集客投稿ばかり投稿する</strong></h5>\n<p>店舗オーナーは集客したいあまり、集客投稿の比率を上げてしまう。しかし<strong>集客投稿は全体の5〜10%が適正</strong>。比率を超えるとフォロワーが「営業アカウント」と認識し離脱する。</p>\n<h5><strong>失敗②：抽象的な訴求</s
